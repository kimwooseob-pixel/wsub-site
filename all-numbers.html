<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모두의 저장 번호 — Wsub</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{ --bg:#0d0f1c; --card:#161a2c; --line:rgba(255,255,255,0.08); --text:#f1eee4; --muted:#969cb6; --gold:#e6c068; --red:#f87171; --green:#5ad19a;
    --display:"Fraunces",Georgia,serif; --sans:"Pretendard",-apple-system,system-ui,sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:520px;margin:0 auto;padding:40px 22px 80px;}
  h1{font-family:var(--display);font-weight:500;font-size:1.7rem;margin-bottom:6px;}
  .lead{color:var(--muted);font-size:0.92rem;margin-bottom:28px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;}
  label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:7px;}
  input{width:100%;padding:12px 13px;border-radius:9px;border:1px solid var(--line);background:#0d0f1c;color:var(--text);font-size:15px;font-family:inherit;}
  input:focus{outline:none;border-color:var(--gold);}
  .btn{width:100%;padding:13px;border-radius:9px;border:none;background:var(--gold);color:#1a1505;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:600;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .field{margin-bottom:14px;}
  .nums{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .nums input{text-align:center;padding:12px 4px;font-weight:700;font-size:16px;}
  .err{color:var(--red);font-size:0.85rem;margin-top:10px;min-height:18px;}
  .ok{color:var(--green);font-size:0.9rem;margin-top:10px;}
  .cur{background:rgba(230,192,104,0.08);border:1px solid rgba(230,192,104,0.25);border-radius:10px;padding:12px 14px;font-size:0.92rem;margin-bottom:18px;}
  .cur b{color:var(--gold);}
  .who{font-size:0.85rem;color:var(--muted);}
  .who b{color:var(--gold);}
  .hidden{display:none;}
  .hint{font-size:0.78rem;color:var(--muted);margin-top:6px;}
  .gsec{margin-top:16px;}
  .gtitle{font-size:0.95rem;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;gap:8px;align-items:center;}
  .gtitle span{font-size:0.8rem;color:var(--muted);font-weight:500;}
  .grow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#0d0f1c;margin-bottom:6px;flex-wrap:wrap;}
  .grow .who{font-size:0.75rem;color:var(--muted);min-width:40px;font-family:monospace;}
  .grow .balls{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
  .grow .ball{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--gold);color:#1a1505;font-size:12px;font-weight:700;}
  .grow .date{font-size:0.72rem;color:var(--muted);}
  .allhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 모두의 저장 번호</h1>
  <p class="lead">모든 게임의 저장 번호 · 관리자 전용</p>
  <a href="/admin.html" style="display:inline-block;margin:-4px 0 8px;color:var(--muted);font-size:0.85rem;text-decoration:none;">← 당첨번호 관리로</a>

  <!-- 로그인 -->
  <div class="card" id="loginCard">
    <div class="field">
      <label>관리자 이메일</label>
      <input type="email" id="email" placeholder="utmost@wsub.app" autocomplete="username" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn">로그인</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- 권한 없음 -->
  <div class="card hidden" id="denyCard">
    <p>이 계정은 관리자가 아니에요.<br />관리자 계정으로 다시 로그인해 주세요.</p>
    <button class="btn ghost" id="denyLogout" style="margin-top:14px;">로그아웃</button>
  </div>

  <!-- 관리자 패널 -->
  <div class="hidden" id="adminPanel">
    <div class="card">
      <div class="row" style="margin-bottom:16px;">
        <span class="who">로그인: <b id="whoEmail">-</b></span>
        <button class="btn ghost" id="logoutBtn" style="width:auto;padding:7px 14px;margin:0;">로그아웃</button>
      </div>
      <div class="allhead">
        <h2 style="font-size:1rem;color:var(--gold);margin:0;">📋 모두의 저장 번호</h2>
        <button class="btn ghost" id="loadAllBtn" style="width:auto;padding:8px 14px;margin:0;">새로고침</button>
      </div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;">Firebase에 저장된 모든 게임의 저장 번호예요. 관리자만 볼 수 있어요.</div>
      <div id="allList" style="color:var(--muted);font-size:0.85rem;">불러오는 중…</div>
    </div>
  </div>
</div>

<script>
(function(){
  var ADMIN_UID = "7CqoqswxDsNQzP8yV7yqG75D2V93";
  var firebaseConfig = {
    apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
    authDomain: "ai-lottosolutions.firebaseapp.com",
    databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ai-lottosolutions",
    storageBucket: "ai-lottosolutions.firebasestorage.app",
    messagingSenderId: "616782090306",
    appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
  };
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.database();
  function $(id){ return document.getElementById(id); }
  function show(id){ $(id).classList.remove("hidden"); }
  function hide(id){ $(id).classList.add("hidden"); }

  // ===== 로그인 =====
  $("loginBtn").addEventListener("click", function(){
    var email=$("email").value.trim(), pw=$("pw").value;
    $("loginErr").textContent="";
    if(!email||!pw){ $("loginErr").textContent="이메일과 비밀번호를 입력해 주세요."; return; }
    auth.signInWithEmailAndPassword(email, pw).catch(function(e){
      $("loginErr").textContent = authErr(e);
    });
  });
  $("pw").addEventListener("keydown", function(e){ if(e.key==="Enter") $("loginBtn").click(); });
  $("logoutBtn").addEventListener("click", function(){ auth.signOut(); });
  $("denyLogout").addEventListener("click", function(){ auth.signOut(); });

  function authErr(e){
    var c=(e&&e.code)||"";
    if(c==="auth/invalid-email") return "이메일 형식이 올바르지 않아요.";
    if(c==="auth/invalid-credential"||c==="auth/wrong-password"||c==="auth/user-not-found") return "이메일 또는 비밀번호가 올바르지 않아요.";
    if(c==="auth/too-many-requests") return "잠시 후 다시 시도해 주세요.";
    return "로그인에 실패했어요. 다시 시도해 주세요.";
  }

  // ===== 인증 상태 =====
  auth.onAuthStateChanged(function(user){
    if(user && user.uid===ADMIN_UID){
      hide("loginCard"); hide("denyCard"); show("adminPanel");
      $("whoEmail").textContent = user.email || "관리자";
      loadAll();
    } else if(user){
      hide("loginCard"); show("denyCard"); hide("adminPanel");
    } else {
      show("loginCard"); hide("denyCard"); hide("adminPanel");
    }
  });

  // ===== 모두의 저장 번호 (관리자 전용) =====
  var GAME_NAME = { saju:"🔮 사주 로또", iching:"🀄 주역 로또", dangsaju:"🎴 당사주 로또", tojeong:"🌙 토정비결 로또", ohaeng:"💑 오행궁합 로또", biorhythm:"📈 바이오리듬 로또", montecarlo:"🎲 몬테카를로 로또", tarot:"🃏 타로 로또", dart:"🎯 원판 다트 로또", spin:"🎡 원판 돌리기 로또", predict:"📊 흐름예측 로또", brick:"🧱 벽돌깨기 로또" };
  function pad2(n){ return n<10 ? "0"+n : ""+n; }
  function escTxt(s){ return String(s).replace(/[&<>"']/g,function(m){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m]; }); }
  function loadAll(){
      var box = $("allList"); box.textContent = "불러오는 중…";
      db.ref("wsub_saved").once("value").then(function(snap){
        var all = snap.val() || {};
        var byGame = {};
        Object.keys(all).forEach(function(uid){
          var recs = all[uid] || {};
          Object.keys(recs).forEach(function(k){
            var r = recs[k]; if(!r || !r.numbers) return;
            var g = r.game || "기타";
            (byGame[g] = byGame[g] || []).push({
              numbers: String(r.numbers),
              savedAt: Number(r.savedAt) || 0,
              who: r.nick ? r.nick : uid.slice(0,4)
            });
          });
        });
        var keys = Object.keys(byGame).sort();
        if(keys.length === 0){ box.textContent = "아직 저장된 번호가 없어요."; return; }
        var total = 0; keys.forEach(function(g){ total += byGame[g].length; });
        var html = '<div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">총 ' + total + '건</div>';
        keys.forEach(function(g){
          var arr = byGame[g].sort(function(a,b){ return b.savedAt - a.savedAt; });
          html += '<div class="gsec"><div class="gtitle">' + (GAME_NAME[g] || escTxt(g)) + ' <span>' + arr.length + '개</span></div>';
          arr.forEach(function(it){
            var ds = "";
            if(it.savedAt){ var d = new Date(it.savedAt); ds = d.getFullYear()+"."+pad2(d.getMonth()+1)+"."+pad2(d.getDate()); }
            var balls = it.numbers.split(",").map(function(n){ return '<span class="ball">'+escTxt(n.trim())+'</span>'; }).join("");
            html += '<div class="grow"><span class="who">'+escTxt(it.who)+'</span><span class="balls">'+balls+'</span><span class="date">'+ds+'</span></div>';
          });
          html += '</div>';
        });
        box.innerHTML = html;
      }).catch(function(e){
        console.error(e);
        box.textContent = "불러오지 못했어요. 보안규칙에 관리자 읽기 권한이 있는지 확인해 주세요.";
      });
  }
  var allBtn = document.getElementById("loadAllBtn");
  if(allBtn) allBtn.addEventListener("click", loadAll);
})();
</script>
</body>
</html>
