<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>내 번호 모아보기 · Wsub</title>

<!-- 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<!-- Firebase (compat SDK 10.12.2) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root{
    --bg:#0d0f1c;
    --bg-raised:#14172a;
    --gold:#e6c068;
    --gold-soft:#b89b54;
    --muted:#969cb6;
    --line:rgba(255,255,255,.08);
    --ball:#f3e7c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:#eef0f7;
    font-family:"Pretendard",system-ui,-apple-system,sans-serif;
    min-height:100dvh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 로그인 바 ── */
  #wsubAuthBar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 16px;
    background:var(--bg-raised);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  #wsubAuthBar .who{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #wsubAuthBar .who b{color:var(--gold);font-weight:600;}
  .authbtn{
    flex:none;border:1px solid var(--line);background:transparent;color:#eef0f7;
    font-family:inherit;font-size:13px;font-weight:600;
    padding:7px 14px;border-radius:999px;cursor:pointer;
  }
  .authbtn.primary{background:var(--gold);color:#1a1405;border-color:var(--gold);}
  .authbtn:active{transform:scale(.97);}

  /* ── 헤더 ── */
  header.page{padding:30px 20px 8px;text-align:center;}
  header.page h1{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:27px;margin:0;letter-spacing:-.01em;
    background:linear-gradient(180deg,#fbf0d2,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  header.page p{margin:6px 0 0;font-size:13px;color:var(--muted);}

  main{max-width:560px;margin:0 auto;padding:14px 16px 60px;}

  /* ── 상태 메시지 ── */
  .state{
    text-align:center;color:var(--muted);font-size:14px;
    padding:54px 18px;line-height:1.7;
  }
  .state .ico{font-size:34px;display:block;margin-bottom:10px;}
  .state .cta{
    display:inline-block;margin-top:16px;
    background:var(--gold);color:#1a1405;font-weight:700;
    padding:10px 22px;border-radius:999px;cursor:pointer;font-size:14px;
  }

  /* ── 게임 그룹 ── */
  .group{margin-top:26px;}
  .group:first-child{margin-top:10px;}
  .group-head{
    display:flex;align-items:center;gap:8px;
    font-family:"Fraunces",serif;font-size:17px;font-weight:600;
    color:#f4eccf;margin-bottom:12px;padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .group-head .emoji{font-size:19px;}
  .group-head .count{
    margin-left:auto;font-family:"Pretendard",sans-serif;
    font-size:12px;font-weight:500;color:var(--muted);
  }

  /* ── 저장 카드 ── */
  .card{
    background:var(--bg-raised);
    border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .card .date{
    font-size:12px;color:var(--muted);min-width:78px;
    font-variant-numeric:tabular-nums;
  }
  .balls{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
  .ball{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#2a2208;
    font-variant-numeric:tabular-nums;
    background:radial-gradient(circle at 32% 28%,#fbf3d8,var(--ball) 55%,var(--gold-soft));
    box-shadow:inset 0 -2px 3px rgba(120,90,20,.35);
    flex:none;
  }
  .badge{
    flex:none;font-size:11px;font-weight:700;
    color:#ffb4b4;background:rgba(217,107,107,.14);
    border:1px solid rgba(217,107,107,.35);
    padding:3px 9px;border-radius:999px;letter-spacing:.02em;
  }
  /* 만료된 카드 */
  .card.expired{opacity:.45;}
  .card.expired .ball{filter:grayscale(.55);}

  /* ── 모달 ── */
  #wsubModal{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;padding:20px;
    background:rgba(5,6,14,.72);backdrop-filter:blur(3px);
  }
  #wsubModal.open{display:flex;}
  .modal-box{
    width:100%;max-width:340px;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:18px;padding:24px 22px;
  }
  .modal-box h2{
    font-family:"Fraunces",serif;font-size:20px;font-weight:600;
    margin:0 0 4px;color:#f4eccf;
  }
  .modal-box .sub{font-size:13px;color:var(--muted);margin:0 0 18px;}
  .field{margin-bottom:12px;}
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:12px 13px;color:#eef0f7;
    font-family:inherit;font-size:15px;
  }
  .field input:focus{outline:none;border-color:var(--gold-soft);}
  .modal-box .err{color:#ff9a9a;font-size:12.5px;min-height:17px;margin:2px 2px 10px;}
  .submit{
    width:100%;background:var(--gold);color:#1a1405;border:none;
    font-family:inherit;font-weight:700;font-size:15px;
    padding:13px;border-radius:11px;cursor:pointer;
  }
  .submit:active{transform:scale(.99);}
  .toggle{
    text-align:center;margin-top:14px;font-size:13px;color:var(--muted);
  }
  .toggle button{
    background:none;border:none;color:var(--gold);font-family:inherit;
    font-size:13px;font-weight:600;cursor:pointer;padding:0 2px;
  }
  .modal-close{
    position:absolute;top:18px;right:20px;background:none;border:none;
    color:var(--muted);font-size:24px;cursor:pointer;line-height:1;
  }
</style>
</head>
<body>

<!-- ───── 로그인 바 ───── -->
<div id="wsubAuthBar">
  <div class="who" id="wsubWho">로그인하면 저장한 번호를 볼 수 있어요</div>
  <button class="authbtn primary" id="wsubAuthBtn" onclick="wsubOpenModal()">로그인</button>
</div>

<header class="page">
  <h1>내 번호 모아보기</h1>
  <p>게임별로 저장한 예상 번호를 한곳에서 확인하세요</p>
</header>

<main id="wsubMain">
  <div class="state" id="wsubState">
    <span class="ico">🔒</span>
    로그인하면 저장한 예상 번호가<br />여기에 게임별로 모입니다.
    <br /><span class="cta" onclick="wsubOpenModal()">로그인 / 회원가입</span>
  </div>
</main>

<!-- ───── 로그인 모달 ───── -->
<div id="wsubModal">
  <div class="modal-box" style="position:relative;">
    <button class="modal-close" onclick="wsubCloseModal()">&times;</button>
    <h2 id="wsubModalTitle">로그인</h2>
    <p class="sub" id="wsubModalSub">이메일과 비밀번호로 로그인하세요</p>
    <div class="field"><input type="email" id="wsubEmail" placeholder="이메일" autocomplete="email" /></div>
    <div class="field"><input type="password" id="wsubPw" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" /></div>
    <div class="err" id="wsubErr"></div>
    <button class="submit" id="wsubSubmit" onclick="wsubSubmit()">로그인</button>
    <div class="toggle" id="wsubToggle">
      계정이 없으신가요? <button onclick="wsubToggleMode()">회원가입</button>
    </div>
  </div>
</div>

<script>
/* ===== Firebase 초기화 (ai-lottosolutions) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
  authDomain: "ai-lottosolutions.firebaseapp.com",
  databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ai-lottosolutions",
  storageBucket: "ai-lottosolutions.firebasestorage.app",
  messagingSenderId: "616782090306",
  appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
};
firebase.initializeApp(firebaseConfig);
const wsubAuth = firebase.auth();
const wsubDb = firebase.database();

/* ===== 게임 메타 (아이콘 + 이름, 표시 순서) ===== */
const GAME_META = {
  saju:       { emoji:"🔮", name:"사주 로또" },
  iching:     { emoji:"🀄", name:"주역 로또" },
  dangsaju:   { emoji:"🎴", name:"당사주 로또" },
  tojeong:    { emoji:"🌙", name:"토정비결 로또" },
  ohaeng:     { emoji:"💑", name:"오행궁합 로또" },
  biorhythm:  { emoji:"📈", name:"바이오리듬 로또" },
  montecarlo: { emoji:"🎲", name:"몬테카를로 로또" },
  tarot:      { emoji:"🃏", name:"타로 로또" },
  dart:       { emoji:"🎯", name:"원판 다트 로또" },
  spin:       { emoji:"🎡", name:"원판 돌리기 로또" }
};
const GAME_ORDER = Object.keys(GAME_META);
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

/* ===== 로그인 상태 감지 ===== */
let wsubMode = "login"; // login | signup
wsubAuth.onAuthStateChanged(function(user){
  const who = document.getElementById("wsubWho");
  const btn = document.getElementById("wsubAuthBtn");
  if (user) {
    who.innerHTML = '<b>' + escapeHtml(user.email || "로그인됨") + '</b>';
    btn.textContent = "로그아웃";
    btn.classList.remove("primary");
    btn.onclick = wsubLogout;
    wsubCloseModal();
    loadMyNumbers(user.uid);
  } else {
    who.textContent = "로그인하면 저장한 번호를 볼 수 있어요";
    btn.textContent = "로그인";
    btn.classList.add("primary");
    btn.onclick = wsubOpenModal;
    renderLoggedOut();
  }
});

/* ===== 데이터 읽기 & 렌더 ===== */
function loadMyNumbers(uid){
  const main = document.getElementById("wsubMain");
  main.innerHTML = '<div class="state"><span class="ico">⏳</span>불러오는 중…</div>';

  wsubDb.ref("wsub_saved/" + uid).once("value").then(function(snap){
    const val = snap.val();
    if (!val) { renderEmpty(); return; }

    // game별 그룹화
    const groups = {};
    Object.keys(val).forEach(function(key){
      const item = val[key] || {};
      const g = item.game || "unknown";
      if (!groups[g]) groups[g] = [];
      groups[g].push({
        numbers: String(item.numbers || ""),
        savedAt: Number(item.savedAt) || 0
      });
    });

    const now = Date.now();
    let html = "";
    let total = 0;

    GAME_ORDER.forEach(function(g){
      const list = groups[g];
      if (!list || !list.length) return;
      list.sort(function(a, b){ return b.savedAt - a.savedAt; }); // 최신순
      const meta = GAME_META[g];
      total += list.length;

      html += '<section class="group">';
      html += '<div class="group-head"><span class="emoji">' + meta.emoji + '</span>' +
              escapeHtml(meta.name) +
              '<span class="count">' + list.length + '개</span></div>';

      list.forEach(function(rec){
        const expired = rec.savedAt > 0 && (now - rec.savedAt) > WEEK_MS;
        html += '<div class="card' + (expired ? ' expired' : '') + '">';
        html += '<span class="date">' + fmtDate(rec.savedAt) + '</span>';
        html += '<div class="balls">' + renderBalls(rec.numbers) + '</div>';
        if (expired) html += '<span class="badge">만료</span>';
        html += '</div>';
      });
      html += '</section>';
    });

    // 메타에 없는 게임도 있으면 뒤에 추가
    Object.keys(groups).forEach(function(g){
      if (GAME_ORDER.indexOf(g) !== -1) return;
      const list = groups[g];
      list.sort(function(a, b){ return b.savedAt - a.savedAt; });
      total += list.length;
      html += '<section class="group">';
      html += '<div class="group-head"><span class="emoji">🎯</span>' + escapeHtml(g) +
              '<span class="count">' + list.length + '개</span></div>';
      list.forEach(function(rec){
        const expired = rec.savedAt > 0 && (now - rec.savedAt) > WEEK_MS;
        html += '<div class="card' + (expired ? ' expired' : '') + '">';
        html += '<span class="date">' + fmtDate(rec.savedAt) + '</span>';
        html += '<div class="balls">' + renderBalls(rec.numbers) + '</div>';
        if (expired) html += '<span class="badge">만료</span>';
        html += '</div>';
      });
      html += '</section>';
    });

    document.getElementById("wsubMain").innerHTML =
      total ? html : emptyHtml();
  }).catch(function(e){
    document.getElementById("wsubMain").innerHTML =
      '<div class="state"><span class="ico">⚠️</span>번호를 불러오지 못했어요.<br />잠시 후 다시 시도해 주세요.</div>';
    console.error(e);
  });
}

function renderBalls(numStr){
  const nums = numStr.split(",").map(function(s){ return s.trim(); }).filter(Boolean);
  return nums.map(function(n){ return '<span class="ball">' + escapeHtml(n) + '</span>'; }).join("");
}

function fmtDate(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  return y + "." + mo + "." + da;
}

function emptyHtml(){
  return '<div class="state"><span class="ico">🗒️</span>' +
         '아직 저장한 번호가 없어요.<br />게임에서 번호를 뽑고 저장해 보세요.</div>';
}
function renderEmpty(){ document.getElementById("wsubMain").innerHTML = emptyHtml(); }

function renderLoggedOut(){
  document.getElementById("wsubMain").innerHTML =
    '<div class="state"><span class="ico">🔒</span>' +
    '로그인하면 저장한 예상 번호가<br />여기에 게임별로 모입니다.' +
    '<br /><span class="cta" onclick="wsubOpenModal()">로그인 / 회원가입</span></div>';
}

/* ===== 로그인 모달 로직 ===== */
function wsubOpenModal(){
  document.getElementById("wsubErr").textContent = "";
  document.getElementById("wsubModal").classList.add("open");
}
function wsubCloseModal(){
  document.getElementById("wsubModal").classList.remove("open");
}
function wsubToggleMode(){
  wsubMode = (wsubMode === "login") ? "signup" : "login";
  const isSignup = wsubMode === "signup";
  document.getElementById("wsubModalTitle").textContent = isSignup ? "회원가입" : "로그인";
  document.getElementById("wsubModalSub").textContent =
    isSignup ? "이메일과 비밀번호로 계정을 만드세요" : "이메일과 비밀번호로 로그인하세요";
  document.getElementById("wsubSubmit").textContent = isSignup ? "회원가입" : "로그인";
  document.getElementById("wsubToggle").innerHTML =
    isSignup
      ? '이미 계정이 있으신가요? <button onclick="wsubToggleMode()">로그인</button>'
      : '계정이 없으신가요? <button onclick="wsubToggleMode()">회원가입</button>';
  document.getElementById("wsubErr").textContent = "";
}
function wsubSubmit(){
  const email = document.getElementById("wsubEmail").value.trim();
  const pw = document.getElementById("wsubPw").value;
  const err = document.getElementById("wsubErr");
  err.textContent = "";
  if (!email || !pw) { err.textContent = "이메일과 비밀번호를 입력해 주세요."; return; }

  const p = (wsubMode === "signup")
    ? wsubAuth.createUserWithEmailAndPassword(email, pw)
    : wsubAuth.signInWithEmailAndPassword(email, pw);

  p.catch(function(e){ err.textContent = authErrMsg(e); });
}
function wsubLogout(){ wsubAuth.signOut(); }

function authErrMsg(e){
  const c = (e && e.code) || "";
  if (c === "auth/invalid-email") return "이메일 형식이 올바르지 않아요.";
  if (c === "auth/missing-password" || c === "auth/weak-password") return "비밀번호는 6자 이상이어야 해요.";
  if (c === "auth/email-already-in-use") return "이미 가입된 이메일이에요. 로그인해 주세요.";
  if (c === "auth/invalid-credential" || c === "auth/wrong-password" || c === "auth/user-not-found")
    return "이메일 또는 비밀번호가 올바르지 않아요.";
  if (c === "auth/too-many-requests") return "잠시 후 다시 시도해 주세요.";
  return "문제가 발생했어요. 다시 시도해 주세요.";
}

/* ===== 유틸 ===== */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){
    return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[m];
  });
}

// 모달 배경 클릭 시 닫기
document.getElementById("wsubModal").addEventListener("click", function(e){
  if (e.target === this) wsubCloseModal();
});
</script>
</body>
</html>
