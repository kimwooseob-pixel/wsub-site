<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>바이오리듬 로또</title>
<style>
  :root { --cyan:#00ffff; --purple:#cc00ff; --gold:#ffd700; --green:#00ff00; --bg:#0a0a1a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); }
  body {
    font-family:'Courier New',ui-monospace,monospace; color:#fff; min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,255,255,0.08), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(204,0,255,0.08), transparent 40%),
      var(--bg);
    padding:18px 14px 40px; overflow-x:hidden;
  }
  .wrap { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  .eyebrow { font-size:11px; letter-spacing:4px; color:var(--cyan); opacity:.8; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:1px; text-shadow:0 0 12px var(--cyan),0 0 24px rgba(0,255,255,.4); }
  .sub { font-size:12px; color:#8aa; letter-spacing:1px; }
  .card {
    background:#0d0d2b; border:1px solid rgba(0,255,255,.25); border-radius:14px;
    padding:16px; margin-bottom:16px;
    box-shadow:0 0 18px rgba(0,255,255,.12), inset 0 0 30px rgba(0,255,255,.03);
  }
  .label { font-size:12px; letter-spacing:2px; color:var(--cyan); margin-bottom:10px; text-transform:uppercase; }
  .date-row { display:flex; gap:8px; }
  .date-row .fld { flex:1; }
  .date-row .fld.d3 { flex:1.3; }
  .fld small { display:block; font-size:10px; color:#789; margin-bottom:4px; letter-spacing:1px; }
  select {
    width:100%; background:#07071a; border:1px solid rgba(0,255,255,.3); color:#cdeeee;
    border-radius:9px; padding:11px 8px; font-family:inherit; font-size:15px; appearance:none;
    text-align:center;
  }
  select:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 10px rgba(0,255,255,.4); }
  .run-btn {
    width:100%; margin-top:14px; background:linear-gradient(180deg,#0a0a2e,#07071a);
    border:1.5px solid var(--cyan); color:#fff; border-radius:12px; padding:16px;
    font-family:inherit; font-size:17px; font-weight:bold; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 20px rgba(0,255,255,.35); text-shadow:0 0 10px var(--cyan); transition:all .15s;
  }
  .run-btn:active { transform:scale(.98); }

  .scores { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:6px; }
  .score { text-align:center; background:#07071a; border-radius:10px; padding:12px 6px; border:1px solid rgba(255,255,255,.08); }
  .score .nm { font-size:11px; letter-spacing:1px; color:#9ab; }
  .score .vl { font-size:22px; font-weight:bold; margin-top:4px; }
  .score.phys .vl { color:var(--cyan); text-shadow:0 0 10px var(--cyan); }
  .score.emo .vl { color:var(--purple); text-shadow:0 0 10px var(--purple); }
  .score.intel .vl { color:var(--gold); text-shadow:0 0 10px var(--gold); }
  .cond { text-align:center; margin:10px 0 4px; font-size:14px; color:#cde; letter-spacing:1px; }
  .cond b { font-size:26px; color:var(--gold); text-shadow:0 0 12px var(--gold); }
  .graph-wrap { background:rgba(0,0,0,.25); border-radius:10px; padding:8px; margin-top:8px; }
  .legend { display:flex; justify-content:center; gap:14px; font-size:11px; margin-top:8px; }
  .legend span { display:inline-flex; align-items:center; gap:4px; color:#9ab; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }

  .balls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:6px 0 4px; }
  .ball {
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:bold; color:var(--bg); animation:pop .4s ease backwards;
  }
  .ball.hi { background:var(--gold); box-shadow:0 0 14px var(--gold),0 0 28px rgba(255,215,0,.4); }
  .ball.lo { background:var(--cyan); box-shadow:0 0 12px var(--cyan); }
  .ball:nth-child(1){animation-delay:.05s}.ball:nth-child(2){animation-delay:.12s}
  .ball:nth-child(3){animation-delay:.19s}.ball:nth-child(4){animation-delay:.26s}
  .ball:nth-child(5){animation-delay:.33s}.ball:nth-child(6){animation-delay:.40s}
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .meta { text-align:center; font-size:12px; color:#9ab; letter-spacing:1px; margin-top:4px; }
  .meta b { color:var(--cyan); }
  .save-btn {
    width:100%; margin-top:14px; background:#0a0a2e; border:1.5px solid var(--gold); color:var(--gold);
    border-radius:12px; padding:14px; font-family:inherit; font-size:15px; letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,215,0,.3); text-shadow:0 0 8px rgba(255,215,0,.6); transition:all .15s;
  }
  .save-btn:active { transform:scale(.98); }
  .save-btn.done { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(0,255,0,.3); text-shadow:0 0 8px var(--green); }
  .hidden { display:none !important; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#0d0d2b;
    border:1px solid var(--cyan); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px;
    letter-spacing:1px; box-shadow:0 0 18px rgba(0,255,255,.4); opacity:0; transition:opacity .25s; z-index:50;
  }
  .toast.show { opacity:1; }
.ball.power{background:#ff2d55;color:#fff;box-shadow:0 0 14px #ff2d55,0 0 30px rgba(255,45,85,.5);}
  .plus{color:#ff2d55;font-size:22px;font-weight:bold;align-self:center;text-shadow:0 0 8px #ff2d55;}
  .balls{align-items:center;}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Biorhythm Cycle</div>
      <h1>📈 바이오리듬 로또</h1>
      <div class="sub">오늘의 신체·감성·지성 주기로 번호를 추출합니다</div>
    </header>

    <div class="card">
      <div class="label">생년월일 입력</div>
      <div class="date-row">
        <div class="fld"><small>년</small><select id="bioYear"></select></div>
        <div class="fld"><small>월</small><select id="bioMonth"></select></div>
        <div class="fld d3"><small>일</small><select id="bioDay"></select></div>
      </div>
      <button class="run-btn" id="bioRunBtn">바이오리듬 계산</button>
    </div>

    <div class="card hidden" id="bioResultCard">
      <div class="label">오늘의 바이오리듬</div>
      <div class="scores">
        <div class="score phys"><div class="nm">신체 (23일)</div><div class="vl" id="bioPhys">-</div></div>
        <div class="score emo"><div class="nm">감성 (28일)</div><div class="vl" id="bioEmo">-</div></div>
        <div class="score intel"><div class="nm">지성 (33일)</div><div class="vl" id="bioIntel">-</div></div>
      </div>
      <div class="cond">오늘 종합 컨디션 <b id="bioCond">-</b>점</div>

      <div class="graph-wrap">
        <svg id="bioGraph" viewBox="0 0 320 140" width="100%" height="140" preserveAspectRatio="none"></svg>
        <div class="legend">
          <span><i class="dot" style="background:#00ffff"></i>신체</span>
          <span><i class="dot" style="background:#cc00ff"></i>감성</span>
          <span><i class="dot" style="background:#ffd700"></i>지성</span>
        </div>
      </div>

      <div class="label" style="margin-top:18px;">추천 번호</div>
      <div class="balls" id="bioBalls"></div>
      <div class="meta"><b id="bioRoundTxt">-</b> · 컨디션 기반 추출</div>
      <button class="save-btn" id="bioSaveBtn">나의 번호에 저장</button>
    </div>
  </div>
  <div class="toast" id="bioToast"></div>

<script>
(function () {
  'use strict';

  // ===================================================================
  // ===== [재사용 영역] 순수 로직 (DOM/시간/랜덤 직접접근 금지) ========
  // ===================================================================
  var COLORS = { cyan:'#00ffff', purple:'#cc00ff', gold:'#ffd700', green:'#00ff00', bg:'#0a0a1a' };
  var GAME_KEY = 'biorhythm';
  var STORAGE_KEY = '@devbrick/saved_lotto_numbers_v1';
  var MAX_PER_TYPE = 100;
  var CYCLE = { phys:23, emo:28, intel:33 };

  // 생일~기준시각(nowMs) 사이 경과 일수 (Date.UTC는 결정적이라 순수)
  function daysAlive(y, m, d, nowMs) {
    var birth = Date.UTC(y, m - 1, d);
    return Math.floor((nowMs - birth) / 86400000);
  }
  // 사인파 값 (-1~1)
  function wave(days, cycle) { return Math.sin((2 * Math.PI * days) / cycle); }
  // -1~1 → 0~100 정규화
  function toScore(v) { return Math.round((v + 1) * 50); }

  // 세 주기 점수 + 종합
  function biorhythm(days) {
    var p = wave(days, CYCLE.phys), e = wave(days, CYCLE.emo), i = wave(days, CYCLE.intel);
    return {
      physRaw:p, emoRaw:e, intelRaw:i,
      phys:toScore(p), emo:toScore(e), intel:toScore(i),
      cond: Math.round((toScore(p) + toScore(e) + toScore(i)) / 3)
    };
  }

  // 그래프용 좌표 생성 (오늘 기준 ±range일). 순수: SVG path d 문자열 반환.
  function buildWavePath(days, cycle, range, w, h) {
    var pts = [];
    for (var dd = -range; dd <= range; dd++) {
      var x = ((dd + range) / (2 * range)) * w;
      var y = h / 2 - wave(days + dd, cycle) * (h / 2 - 6);
      pts.push((dd === -range ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1));
    }
    return pts.join(' ');
  }

  // 결정적 RNG (mulberry32) — 시드만 받으면 항상 같은 수열
  function makeRng(seed) {
    var s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  // 입력 숫자들로 시드 만들기 (순수)
  function seedFrom(arr) {
    var s = 2166136261;
    for (var i = 0; i < arr.length; i++) { s ^= arr[i]; s = Math.imul(s, 16777619); }
    return s >>> 0;
  }
  // rng로 중복 없는 6개(1~45) 추출, 정렬
  function pickPowerball(rng) {
    var wp = {}, white = [];
    while (white.length < 6) { var n = 1 + Math.floor(rng() * 45); if (!wp[n]) { wp[n] = true; white.push(n); } }
    white.sort(function (a, b) { return a - b; });
    return { white: white, power: 0 };
  }

  function makeSavedEntry(numbers, powerball, nextRound, nowMs, id) {
    return { id: id, savedAt: new Date(nowMs).toISOString(), round: nextRound > 0 ? nextRound : 0, numbers: numbers.slice(), powerball: powerball, matchCount: 0, type: GAME_KEY, source: GAME_KEY };
  }
  function isDuplicate(savedArr, numbers, powerball, type) {
    var key = numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + powerball;
    for (var i = 0; i < savedArr.length; i++) {
      var e = savedArr[i];
      if (e && e.type === type && Array.isArray(e.numbers)) {
        var ek = e.numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + (e.powerball || 0);
        if (ek === key) return true;
      }
    }
    return false;
  }
  function trimSavedByType(arr, maxPerType) {
    var groups = {};
    for (var i = 0; i < arr.length; i++) { var t = arr[i].type || '_'; (groups[t] = groups[t] || []).push(arr[i]); }
    var out = [];
    Object.keys(groups).forEach(function (t) {
      var g = groups[t].slice().sort(function (a, b) { return a.savedAt < b.savedAt ? -1 : (a.savedAt > b.savedAt ? 1 : 0); });
      if (g.length > maxPerType) g = g.slice(g.length - maxPerType);
      out = out.concat(g);
    });
    out.sort(function (a, b) { return a.savedAt < b.savedAt ? -1 : (a.savedAt > b.savedAt ? 1 : 0); });
    return out;
  }
  function parseMaxRound(json) {
    var maxRound = 0;
    if (json && typeof json === 'object') {
      Object.keys(json).forEach(function (k) { var r = parseInt(k, 10); if (!isNaN(r) && r > maxRound) maxRound = r; });
    }
    return maxRound;
  }

  // ===================================================================
  // ===== [HTML 전용] 화면/렌더링/이벤트/저장/fetch ===================
  // ===================================================================
  var FIREBASE_URL = 'https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app';
  var el = {};
  var state = { numbers: [], cond: 0, nextRound: 0, finished: false };

  function genId(p) { return p + '-' + Date.now() + '_' + Math.random().toString(36).slice(2, 10); }

  function bindElements() {
    el.year = document.getElementById('bioYear');
    el.month = document.getElementById('bioMonth');
    el.day = document.getElementById('bioDay');
    el.runBtn = document.getElementById('bioRunBtn');
    el.resultCard = document.getElementById('bioResultCard');
    el.phys = document.getElementById('bioPhys');
    el.emo = document.getElementById('bioEmo');
    el.intel = document.getElementById('bioIntel');
    el.cond = document.getElementById('bioCond');
    el.graph = document.getElementById('bioGraph');
    el.balls = document.getElementById('bioBalls');
    el.roundTxt = document.getElementById('bioRoundTxt');
    el.saveBtn = document.getElementById('bioSaveBtn');
    el.toast = document.getElementById('bioToast');
  }

  function fillSelect(sel, from, to, pad, selected) {
    sel.innerHTML = '';
    for (var v = from; v <= to; v++) {
      var o = document.createElement('option');
      o.value = v; o.textContent = pad ? String(v).padStart(2, '0') : v;
      if (v === selected) o.selected = true;
      sel.appendChild(o);
    }
  }
  function showToast(msg) {
    el.toast.textContent = msg; el.toast.classList.add('show');
    setTimeout(function () { el.toast.classList.remove('show'); }, 1800);
  }

  function drawGraph(days) {
    var w = 320, h = 140;
    var svg = '';
    // 중앙선 + 오늘선
    svg += '<line x1="0" y1="' + (h / 2) + '" x2="' + w + '" y2="' + (h / 2) + '" stroke="#234" stroke-width="1"/>';
    svg += '<line x1="' + (w / 2) + '" y1="0" x2="' + (w / 2) + '" y2="' + h + '" stroke="#00ffff" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>';
    svg += '<path d="' + buildWavePath(days, CYCLE.phys, 15, w, h) + '" fill="none" stroke="#00ffff" stroke-width="2"/>';
    svg += '<path d="' + buildWavePath(days, CYCLE.emo, 15, w, h) + '" fill="none" stroke="#cc00ff" stroke-width="2"/>';
    svg += '<path d="' + buildWavePath(days, CYCLE.intel, 15, w, h) + '" fill="none" stroke="#ffd700" stroke-width="2"/>';
    el.graph.innerHTML = svg;
  }

  function renderBalls(numbers, cond) {
    el.balls.innerHTML = '';
    var cls = cond >= 50 ? 'hi' : 'lo';
    numbers.forEach(function (n) {
      var d = document.createElement('div');
      d.className = 'ball ' + cls; d.textContent = n;
      el.balls.appendChild(d);
    });
  }

  function fetchNextRound(cb) {
    fetch(FIREBASE_URL + '/winningNumbers.json')
      .then(function (r) { return r.json(); })
      .then(function (j) { cb(parseMaxRound(j) + 1); })   // ← 순수
      .catch(function () { cb(0); });
  }

  function calculate() {
    var y = parseInt(el.year.value, 10), m = parseInt(el.month.value, 10), d = parseInt(el.day.value, 10);
    var nowMs = Date.now();                         // ← 비순수, 주입용
    var days = daysAlive(y, m, d, nowMs);           // ← 순수
    var bio = biorhythm(days);                      // ← 순수
    var seed = seedFrom([y, m, d, days]);           // ← 순수
    var rng = makeRng(seed);                        // ← 순수 RNG 생성
    var __pbr = pickPowerball(rng); var numbers = __pbr.white; var power = __pbr.power;                 // ← 순수

    state.numbers = numbers; state.power = power; state.cond = bio.cond; state.finished = true;

    el.phys.textContent = bio.phys; el.emo.textContent = bio.emo; el.intel.textContent = bio.intel;
    el.cond.textContent = bio.cond;
    drawGraph(days);
    renderBalls(numbers, bio.cond);
    el.saveBtn.textContent = '나의 번호에 저장'; el.saveBtn.className = 'save-btn'; el.saveBtn.disabled = false;
    el.resultCard.classList.remove('hidden');

    el.roundTxt.textContent = '한국 로또 방식';
  }

  function loadSaved() {
    try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
  }
  function saveResult() {
    if (!state.finished) return;
    var saved = loadSaved();
    if (isDuplicate(saved, state.numbers, 0, GAME_KEY)) { showToast('이미 저장된 번호예요'); return; }
    var entry = makeSavedEntry(state.numbers, 0, state.nextRound, Date.now(), genId(GAME_KEY));
    saved.push(entry);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trimSavedByType(saved, MAX_PER_TYPE)));
      el.saveBtn.textContent = '✓ 저장 완료'; el.saveBtn.className = 'save-btn done'; el.saveBtn.disabled = true;
      showToast('나의 번호에 저장했어요');
    } catch (e) { showToast('저장 공간이 부족해요'); }
  }

  function startBiorhythmApp() {
    bindElements();
    var nowY = new Date(Date.now()).getFullYear();
    fillSelect(el.year, 1940, nowY, false, 1990);
    fillSelect(el.month, 1, 12, true, 1);
    fillSelect(el.day, 1, 31, true, 1);
    el.runBtn.onclick = calculate;
    el.saveBtn.onclick = saveResult;
  }
  window.startBiorhythmApp = startBiorhythmApp;

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startBiorhythmApp);
  else startBiorhythmApp();
})();
</script>
</body>
</html>
