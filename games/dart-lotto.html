<!DOCTYPE html>
<html lang="ko">
<head>

<title>로또 원판게임 (다트)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0f0a08; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    color: #fff; min-height: 100vh; overflow-x: hidden;
  }
  #dart-root { max-width: 480px; margin: 0 auto; padding: 6px 14px 32px; }

  .neonHeader {
    margin: 6px 0 4px; padding: 12px 14px; border-radius: 14px;
    border: 1.5px solid rgba(255,200,120,0.55); background: #1a120a;
    box-shadow: 0 0 16px rgba(244,196,48,0.45);
  }
  .title { color: #f4c430; font-size: 21px; font-weight: 900; letter-spacing: .4px; text-shadow: 0 0 12px rgba(255,210,140,0.65); }
  .sub { color: #d4c4a8; font-size: 13px; font-weight: 600; margin-top: 4px; }
  .subHint { color: #ffc14d; font-size: 11px; font-weight: 800; margin-top: 6px; text-shadow: 0 0 6px rgba(255,200,120,0.45); }

  .divider { height: 1px; background: rgba(255,200,100,0.35); margin: 12px 2px; box-shadow: 0 0 4px #f4c430; }

  /* 무대 */
  .stage { position: relative; width: 100%; margin: 0 auto 14px; overflow: visible; }
  .char {
    position: absolute; z-index: 6; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .charInner { display: inline-block; font-size: 30px; text-shadow: 0 0 8px rgba(255,200,120,0.45); }
  .char.throwing .charInner { animation: throwBob .36s ease both; }
  @keyframes throwBob {
    0% { transform: translateY(0) scale(1); }
    45% { transform: translateY(-26px) scale(1.12); }
    100% { transform: translateY(0) scale(1); }
  }

  .wheelTilt {
    position: absolute; z-index: 2; overflow: visible;
    transform: rotateY(50deg);            /* 직교 틸트(원근 없음) → 다트가 정확히 맞음 */
    transform-style: flat;
  }
  .wheelSvg { display: block; position: relative; z-index: 2; }
  .decor { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .decorRing { position: absolute; inset: 0; }
  .decorRing.cw { animation: spinCW linear infinite; }
  .decorRing.ccw { animation: spinCCW linear infinite; }
  @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  .flightLayer { position: absolute; inset: 0; z-index: 8; pointer-events: none; overflow: visible; }
  .dart { position: absolute; left: 0; top: 0; width: 58px; height: 28px; }
  .dart svg { display: block; }

  .sectionLabel { color: #f4c430; font-size: 14px; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 8px rgba(255,200,100,0.55); }

  .hitBox {
    max-height: 160px; overflow-y: auto; border-radius: 12px;
    border: 1.5px solid rgba(255,200,100,0.5); background: rgba(20,14,8,0.92);
    margin-bottom: 10px; padding: 12px 10px; box-shadow: 0 0 12px rgba(244,196,48,0.25);
  }
  .hitEmpty { color: #b8a078; font-size: 14px; font-weight: 700; }
  .hitWrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-end; }
  .hitCol { display: flex; flex-direction: column; align-items: center; margin-bottom: 4px; }
  .hitCol.top { transform: scale(1.05); }
  .hitBall { display: flex; align-items: center; justify-content: center; border: 1.5px solid; }
  .hitBall.single { background: #3a2810; border-color: #c9a227; box-shadow: 0 0 6px rgba(201,162,39,0.55); }
  .hitBall.mid    { background: #4a3210; border-color: #e8b84a; box-shadow: 0 0 8px rgba(232,184,74,0.65); }
  .hitBall.top    { background: #5c2008; border-color: #ff9a6a; box-shadow: 0 0 8px rgba(196,92,26,0.75); }
  .hitNum { color: #fff; font-weight: 900; font-size: 10px; text-shadow: 0 0 3px rgba(0,0,0,0.85); }
  .hitNum.top { font-size: 12px; text-shadow: 0 0 6px rgba(255,180,90,0.55); }
  .hitMult { color: #f4c430; font-weight: 800; font-size: 7px; margin-top: 2px; }
  .hitMult.top { color: #ffd4a8; font-size: 8px; font-weight: 900; }

  .remaining { color: #f4c430; font-size: 14px; font-weight: 800; margin: 4px 0 10px; text-shadow: 0 0 6px rgba(255,200,100,0.35); }
  .remaining b { font-size: 17px; font-weight: 900; color: #fff3d4; }

  .fireTriple { display: flex; gap: 8px; margin-bottom: 12px; }
  .fireBtn {
    flex: 1; padding: 13px 0; border-radius: 12px; text-align: center; border: 2px solid;
    color: #fff8e8; font-weight: 900; font-size: 14px; cursor: pointer;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85); transition: opacity .1s, transform .1s;
  }
  .fireBtn:active { opacity: .92; transform: scale(.98); }
  .fire6  { border-color: #f4c430; background: #140f08; box-shadow: 0 0 10px rgba(244,196,48,0.55); }
  .fire10 { border-color: #e8a830; background: #1a1408; box-shadow: 0 0 10px rgba(232,168,48,0.55); }
  .fire45 { border-color: #c45c1a; background: #180c06; box-shadow: 0 0 10px rgba(196,92,26,0.55); }

  .saveActionCol { margin-top: 8px; }
  .saveHint { font-size: 11px; font-weight: 700; color: rgba(180,160,130,0.85); text-align: center; margin-bottom: 6px; }
  .actionRow { display: flex; gap: 10px; margin-bottom: 16px; }
  .secBtn, .saveBtn { flex: 1; padding: 13px 0; border-radius: 12px; text-align: center; border: 2px solid; font-weight: 900; font-size: 14px; cursor: pointer; transition: opacity .1s; }
  .secBtn { background: #140f0a; border-color: #ffb347; color: #fff5e8; box-shadow: 0 0 10px rgba(255,179,71,0.45); }
  .saveBtn { background: #0f0c08; border-color: #f4c430; color: #fff3d4; box-shadow: 0 0 12px rgba(244,196,48,0.5); }
  .secBtn:active, .saveBtn:active { opacity: .92; }
  .dimmed { opacity: .45; pointer-events: none; }

  .savedViewBtn {
    display: none; margin: 0 auto 8px; padding: 11px 22px; border-radius: 10px;
    border: 1px solid rgba(255,193,77,0.4); background: rgba(255,179,71,0.12);
    color: #ffd9a8; font-size: 13px; font-weight: 800; cursor: pointer;
  }
  .savedViewBtn.is-shown { display: block; }

  .toastWrap { position: fixed; left: 24px; right: 24px; bottom: 22px; display: flex; justify-content: center; z-index: 60; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toastWrap.is-shown { opacity: 1; }
  .toastTxt {
    background: rgba(14,10,6,0.97); color: #fff5e6; padding: 10px 16px; border-radius: 10px;
    font-weight: 800; border: 1.5px solid rgba(255,200,100,0.65); box-shadow: 0 0 10px rgba(244,196,48,0.35);
  }

  .modalMask { position: fixed; inset: 0; background: rgba(8,5,3,0.82); z-index: 70; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modalMask.is-shown { display: flex; }
  .modalBox { width: 100%; max-width: 360px; max-height: 76vh; overflow-y: auto; background: #16100a; border: 1px solid rgba(244,196,48,0.3); border-radius: 16px; padding: 18px; }
  .modalTitle { font-size: 16px; font-weight: 900; color: #f4c430; margin-bottom: 12px; }
  .savedItem { padding: 10px 12px; border-radius: 10px; background: rgba(30,20,8,0.6); border: 1px solid rgba(255,200,100,0.18); margin-bottom: 8px; }
  .savedRound { font-size: 11px; font-weight: 700; color: rgba(255,200,100,0.6); margin-bottom: 6px; }
  .savedNums { display: flex; gap: 5px; flex-wrap: wrap; }
  .savedNum { width: 26px; height: 26px; border-radius: 13px; background: #4a3210; border: 1px solid #e8b84a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff3d4; }
  .savedMeta { font-size: 10px; color: rgba(200,180,140,0.6); margin-top: 6px; }
  .savedEmpty { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; padding: 18px 0; }
  .modalClose { margin-top: 8px; width: 100%; padding: 11px 0; border-radius: 10px; border: 1px solid rgba(255,179,71,0.4); background: rgba(255,179,71,0.14); color: #ffd9a8; font-size: 14px; font-weight: 800; cursor: pointer; }
</style>

<div id="wsubAuthBar">
  <div class="who" id="wsubWho">로그인하면 번호를 내 계정에 저장할 수 있어요</div>

<div id="wsubModal">

    <button class="close" onclick="wsubCloseModal()">&times;</button>
    <h2 id="wsubModalTitle">로그인</h2>
    <p class="sub" id="wsubModalSub">이메일과 비밀번호로 로그인하세요</p>
    <div class="field"><input type="email" id="wsubEmail" placeholder="이메일" autocomplete="email" /></div>
    <div class="field"><input type="password" id="wsubPw" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" /></div>
    <button class="submit" id="wsubSubmit" onclick="wsubSubmit()">로그인</button>
    <div class="toggle" id="wsubToggle">계정이 없으신가요? <button onclick="wsubToggleMode()">회원가입</button></div>
    <div class="err" id="wsubErr"></div>
  </div>
</div>
<div id="wsubToast"></div>
<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
    authDomain: "ai-lottosolutions.firebaseapp.com",
    databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ai-lottosolutions",
    storageBucket: "ai-lottosolutions.firebasestorage.app",
    messagingSenderId: "616782090306",
    appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
  };
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var wsubAuth = firebase.auth();
  var wsubDb = firebase.database();
  var wsubMode = "login";
  var wsubPendingSaveAction = null;
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m];}); }

  window.wsubOpenModal = function(){ $("wsubErr").textContent=""; $("wsubModal").classList.add("open"); };
  window.wsubCloseModal = function(){ $("wsubModal").classList.remove("open"); };
  window.wsubToggleMode = function(){
    wsubMode = (wsubMode==="login")?"signup":"login";
    var s = (wsubMode==="signup");
    $("wsubModalTitle").textContent = s?"회원가입":"로그인";
    $("wsubModalSub").textContent = s?"이메일과 비밀번호로 계정을 만드세요":"이메일과 비밀번호로 로그인하세요";
    $("wsubSubmit").textContent = s?"회원가입":"로그인";
    $("wsubToggle").innerHTML = s
      ? '이미 계정이 있으신가요? <button onclick="wsubToggleMode()">로그인</button>'
      : '계정이 없으신가요? <button onclick="wsubToggleMode()">회원가입</button>';
    $("wsubErr").textContent = "";
  };
  window.wsubSubmit = function(){
    var email = $("wsubEmail").value.trim(), pw = $("wsubPw").value;
    $("wsubErr").textContent = "";
    if(!email||!pw){ $("wsubErr").textContent="이메일과 비밀번호를 입력해 주세요."; return; }
    var p = (wsubMode==="signup")
      ? wsubAuth.createUserWithEmailAndPassword(email, pw)
      : wsubAuth.signInWithEmailAndPassword(email, pw);
    p.catch(function(e){ $("wsubErr").textContent = wsubAuthErr(e); });
  };
  window.wsubLogout = function(){ wsubAuth.signOut(); };
  function wsubAuthErr(e){
    var c=(e&&e.code)||"";
    if(c==="auth/invalid-email") return "이메일 형식이 올바르지 않아요.";
    if(c==="auth/missing-password"||c==="auth/weak-password") return "비밀번호는 6자 이상이어야 해요.";
    if(c==="auth/email-already-in-use") return "이미 가입된 이메일이에요. 로그인해 주세요.";
    if(c==="auth/invalid-credential"||c==="auth/wrong-password"||c==="auth/user-not-found") return "이메일 또는 비밀번호가 올바르지 않아요.";
    if(c==="auth/too-many-requests") return "잠시 후 다시 시도해 주세요.";
    return "문제가 발생했어요. 다시 시도해 주세요.";
  }
  var toastT=null;
  window.wsubToast = function(msg){
    var t=$("wsubToast"); if(!t) return; t.textContent=msg; t.classList.add("show");
    if(toastT) clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove("show"); }, 2200);
  };

  wsubAuth.onAuthStateChanged(function(user){
    var who=$("wsubWho"), btn=$("wsubAuthBtn");
    if(user){
      who.innerHTML = '<b>'+esc(user.email||"로그인됨")+'</b>';
      btn.textContent="로그아웃"; btn.classList.remove("primary"); btn.onclick=wsubLogout;
      wsubCloseModal();
      if(typeof wsubPendingSaveAction==="function"){ var a=wsubPendingSaveAction; wsubPendingSaveAction=null; a(); }
    }else{
      who.textContent="로그인하면 번호를 내 계정에 저장할 수 있어요";
      btn.textContent="로그인"; btn.classList.add("primary"); btn.onclick=wsubOpenModal;
    }
  });

  // numbers: [3,11,18,24,33,42] 배열 / game: 게임키 / onSuccess: 저장 성공 콜백(선택)
  window.wsubSaveNumbers = function(numbers, game, onSuccess){
    if(!wsubAuth.currentUser){
      wsubPendingSaveAction = function(){ window.wsubSaveNumbers(numbers, game, onSuccess); };
      wsubOpenModal(); return;
    }
    var uid = wsubAuth.currentUser.uid;
    var ref = wsubDb.ref("wsub_saved/"+uid).push();
    ref.set({
      numbers: (numbers||[]).slice().sort(function(a,b){return a-b;}).map(String).join(","),
      game: game,
      savedAt: Date.now()
    }).then(function(){ wsubToast("내 계정에 저장했어요"); if(typeof onSuccess==="function") onSuccess(); })
      .catch(function(e){ console.error(e); wsubToast("저장에 실패했어요. 다시 시도해 주세요."); });
  };
  window.wsubIsLoggedIn = function(){ return !!wsubAuth.currentUser; };

  $("wsubModal").addEventListener("click", function(e){ if(e.target===this) wsubCloseModal(); });
})();
</script>

    { color: '#ffff00', rOff: 44, ms: 5600, dash: '5 5', sw: 1.4 },
    { color: '#ff0066', rOff: 52, ms: 6200, dash: '7 8', sw: 1.15 },
    { color: '#0066ff', rOff: 60, ms: 6800, dash: '4 7', sw: 1.35 },
    { color: '#ff3300', rOff: 68, ms: 7400, dash: '9 4', sw: 1.2 },
    { color: '#00ff99', rOff: 76, ms: 8000, dash: '5 9', sw: 1.3 }
  ];

  // ===== 상태 =====
  var hits = [];            // [{n}]
  var shotsDone = 0;
  var burstBusy = false;
  var nextRound = null;
  var toastTimer = null;

  // 지오메트리
  var contentW = 340, scale = 1, wheelBox = WHEEL_BOX, stageH = 264;
  var wheelCX = 0, wheelCY = 0, dartStartX = 0, dartStartY = 0;
  var cx = WHEEL_CX, cy = WHEEL_CY, wheelR = WHEEL_R, hitRadius = WHEEL_R * 0.86;

  var el = {};

  // ===== 순수 헬퍼 (wheel.tsx 이식) =====
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }
  function vibrate(n) { if (navigator.vibrate) { try { navigator.vibrate(n || 18); } catch (e) {} } }

  function userDegToXY(ccx, ccy, r, deg) {
    var rad = (deg * Math.PI) / 180;
    return { x: ccx + r * Math.sin(rad), y: ccy - r * Math.cos(rad) };
  }
  function numberCenterOnWheel(ccx, ccy, r, n) {
    var angleDeg = -90 + (n - 1) * SLICE_DEG + SLICE_DEG / 2;
    return userDegToXY(ccx, ccy, r, angleDeg + 90);
  }
  function wedgePath(ccx, ccy, rInner, rOuter, n) {
    var c = (n - 1) * SLICE_DEG;
    var a0 = c - SLICE_DEG / 2, a1 = c + SLICE_DEG / 2;
    var p0o = userDegToXY(ccx, ccy, rOuter, a0);
    var p1o = userDegToXY(ccx, ccy, rOuter, a1);
    var p1i = userDegToXY(ccx, ccy, rInner, a1);
    var p0i = userDegToXY(ccx, ccy, rInner, a0);
    var large = SLICE_DEG > 180 ? 1 : 0;
    return 'M ' + p0o.x + ' ' + p0o.y + ' A ' + rOuter + ' ' + rOuter + ' 0 ' + large + ' 1 ' + p1o.x + ' ' + p1o.y +
      ' L ' + p1i.x + ' ' + p1i.y + ' A ' + rInner + ' ' + rInner + ' 0 ' + large + ' 0 ' + p0i.x + ' ' + p0i.y + ' Z';
  }

  function buildNumbersForSave(hitList) {
    var counts = {};
    for (var i = 0; i < hitList.length; i++) counts[hitList[i].n] = (counts[hitList[i].n] || 0) + 1;
    return Object.keys(counts).map(function (k) { return [parseInt(k, 10), counts[k]]; })
      .filter(function (e) { return e[1] >= 2; })
      .sort(function (a, b) { var d = b[1] - a[1]; if (d !== 0) return d; return a[0] - b[0]; })
      .map(function (e) { return e[0]; });
  }
  function countsMapFromHits(hitList) {
    var c = {};
    for (var i = 0; i < hitList.length; i++) { var k = String(hitList[i].n); c[k] = (c[k] || 0) + 1; }
    return c;
  }
  function aggregate(hitList) {
    var m = {};
    for (var i = 0; i < hitList.length; i++) m[hitList[i].n] = (m[hitList[i].n] || 0) + 1;
    return Object.keys(m).map(function (k) { return [parseInt(k, 10), m[k]]; })
      .sort(function (a, b) { var d = b[1] - a[1]; if (d !== 0) return d; return a[0] - b[0]; });
  }

  // ===== localStorage =====
  function getSaved() { try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '[]') || []; } catch (e) { return []; } }
  function setSaved(arr) { try { localStorage.setItem(SAVE_KEY, JSON.stringify(arr)); } catch (e) {} }

  // ===== Firebase 읽기 전용 (getCurrentDraw) — 쓰기 없음 =====
  function loadNextRound() {
    return fetch(FB_URL + '/winningNumbers.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data) return null;
        var maxRound = -Infinity;
        Object.keys(data).forEach(function (k) { var r = parseInt(k, 10); if (isFinite(r) && r > maxRound) maxRound = r; });
        return isFinite(maxRound) ? maxRound + 1 : null;
      })
      .catch(function () { return null; });
  }

  // ===== 다트 그래픽 =====
  function dartSVG() {
    var dartLen = 46, tip = dartLen + 2, shaft0 = dartLen * 0.34;
    return '<svg width="' + (dartLen + 12) + '" height="28"><g transform="translate(2,14)">' +
      '<line x1="' + shaft0 + '" y1="0" x2="' + (tip - 10) + '" y2="0" stroke="#fff8e7" stroke-width="2.6" stroke-linecap="round"/>' +
      '<line x1="' + shaft0 + '" y1="1.1" x2="' + (tip - 10) + '" y2="1.1" stroke="rgba(160,130,90,0.45)" stroke-width="1" stroke-linecap="round"/>' +
      '<polygon fill="#fef3d8" stroke="#8b6914" stroke-width="0.35" points="' + tip + ',0 ' + (tip - 9) + ',3.4 ' + (tip - 9) + ',-3.4"/>' +
      '<polygon fill="#e8c468" stroke="#5c3d12" stroke-width="0.3" points="' + shaft0 + ',0 ' + (shaft0 - 5) + ',5.5 ' + (shaft0 - 11) + ',0"/>' +
      '<polygon fill="#d4a84a" stroke="#5c3d12" stroke-width="0.3" points="' + shaft0 + ',0 ' + (shaft0 - 5) + ',-5.5 ' + (shaft0 - 11) + ',0"/>' +
      '<polygon fill="#c9953a" stroke="#4a3010" stroke-width="0.28" points="' + (shaft0 - 11) + ',0 ' + (shaft0 - 17) + ',4 ' + (shaft0 - 17) + ',-4"/>' +
      '</g></svg>';
  }
  function dartTransform(x, y, rot) {
    return 'translate(' + x + 'px,' + y + 'px) rotate(' + rot + 'deg) translate(-19.32px,-14px)';
  }

  // ===== 지오메트리 =====
  function setupGeometry() {
    contentW = el.stage.clientWidth || (el.root.clientWidth - 28) || window.innerWidth;
    var leftColW = contentW * 0.2;
    var wheelBandW = contentW * 0.8;
    scale = Math.min(1, Math.max(0.72, (wheelBandW * 0.98) / WHEEL_BOX));
    wheelBox = WHEEL_BOX * scale;
    stageH = Math.max(128, wheelBox + 8);
    wheelCX = contentW - wheelBox / 2;
    wheelCY = stageH / 2;
    dartStartX = leftColW * 0.5;
    dartStartY = stageH * 0.5;
    cx = WHEEL_CX * scale; cy = WHEEL_CY * scale; wheelR = WHEEL_R * scale;
    hitRadius = wheelR * 0.86;

    el.stage.style.height = stageH + 'px';
    el.char.style.left = dartStartX + 'px';
    el.char.style.top = dartStartY + 'px';
    el.wheelTilt.style.width = wheelBox + 'px';
    el.wheelTilt.style.height = wheelBox + 'px';
    el.wheelTilt.style.left = (wheelCX - wheelBox / 2) + 'px';
    el.wheelTilt.style.top = (wheelCY - wheelBox / 2) + 'px';
    el.wheelSvg.setAttribute('width', wheelBox);
    el.wheelSvg.setAttribute('height', wheelBox);
    el.wheelSvg.setAttribute('viewBox', '0 0 ' + wheelBox + ' ' + wheelBox);
  }

  // ===== 렌더 =====
  function renderWheel() {
    var badgeRingR = wheelR * 0.92;
    var badgeR = Math.max(8, Math.min(12, wheelR * 0.072));
    var innerDiskR = badgeRingR - badgeR - 4;
    var wedgeInnerR = innerDiskR + 1.2;
    var wedgeOuterR = wheelR - 3;
    var rimAccent = 'rgba(255,210,120,0.88)';
    var s = '';

    s += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (wheelR + 5) + '" fill="none" stroke="' + NEON_CYAN + '" stroke-width="2.5" opacity="0.9"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (wheelR + 2) + '" fill="none" stroke="' + rimAccent + '" stroke-width="1.6" opacity="0.88"/>';
    var i, n;
    for (i = 0; i < SLICES; i++) {
      n = i + 1;
      var fill = (n % 2 === 0) ? 'rgba(90,70,40,0.22)' : 'rgba(60,45,28,0.18)';
      s += '<path d="' + wedgePath(cx, cy, wedgeInnerR, wedgeOuterR, n) + '" fill="' + fill + '" stroke="rgba(110,75,25,0.45)" stroke-width="0.4"/>';
    }
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="' + innerDiskR + '" fill="' + INNER_DISK + '" opacity="0.97"/>';
    for (n = 1; n <= SLICES; n++) {
      var pb = numberCenterOnWheel(cx, cy, badgeRingR, n);
      s += '<circle cx="' + pb.x + '" cy="' + pb.y + '" r="' + (badgeR + 0.6) + '" fill="none" stroke="' + NEON_CYAN + '" stroke-width="0.55" opacity="0.65"/>';
      s += '<circle cx="' + pb.x + '" cy="' + pb.y + '" r="' + badgeR + '" fill="' + RED_BADGE + '" stroke="#fff8e7" stroke-width="1.45"/>';
      s += '<text x="' + pb.x + '" y="' + (pb.y + badgeR * 0.35) + '" fill="#fff8e7" font-size="' + (badgeR * 0.95) + '" font-weight="900" text-anchor="middle" stroke="#1a1008" stroke-width="0.35">' + n + '</text>';
    }
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="8" fill="' + NEON_CYAN + '" stroke="#fff3c4" stroke-width="1.4"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="3.5" fill="#fff8e7" opacity="0.98"/>';
    for (i = 0; i < 45; i++) {
      var angle = (i * 8 - 90) * Math.PI / 180;
      s += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + wedgeOuterR * Math.cos(angle)) + '" y2="' + (cy + wedgeOuterR * Math.sin(angle)) + '" stroke="gold" stroke-width="0.8" opacity="0.95"/>';
    }
    el.wheelSvg.innerHTML = s;
  }

  function renderDecor() {
    var html = '';
    for (var i = 0; i < DECOR_RING_SPECS.length; i++) {
      var cfg = DECOR_RING_SPECS[i];
      var dir = (i % 2 === 0) ? 'cw' : 'ccw';
      html += '<div class="decorRing ' + dir + '" style="animation-duration:' + cfg.ms + 'ms;filter:drop-shadow(0 0 8px ' + cfg.color + ');">' +
        '<svg width="' + wheelBox + '" height="' + wheelBox + '">' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + (wheelR + cfg.rOff) + '" fill="none" stroke="' + cfg.color + '" stroke-width="' + cfg.sw + '" stroke-dasharray="' + cfg.dash + '" opacity="0.9"/>' +
        '</svg></div>';
    }
    el.decor.innerHTML = html;
  }

  function targetForNumber(n) {
    var userDeg = (n - 1) * SLICE_DEG + SLICE_DEG / 2;
    var rad = userDeg * Math.PI / 180;
    var dx = hitRadius * Math.sin(rad);
    var dy = -hitRadius * Math.cos(rad);
    return { x: wheelCX + dx * KX, y: wheelCY + dy };
  }

  function renderHits() {
    var aggs = aggregate(hits);
    var maxHit = aggs.length ? aggs[0][1] : 0;
    if (!aggs.length) {
      el.hitBox.innerHTML = '<span class="hitEmpty">아직 없음</span>';
    } else {
      var html = '<div class="hitWrap">';
      for (var i = 0; i < aggs.length; i++) {
        var num = aggs[i][0], cnt = aggs[i][1];
        var isTop = maxHit > 0 && cnt === maxHit;
        var sc = maxHit > 0 ? 0.55 + (cnt / maxHit) * 0.45 : 1;
        var dia = Math.max(22, Math.round(Math.min(64, Math.max(36, 36 * sc * 1.65)) * 0.6));
        var tier = isTop ? 'top' : (cnt >= 2 ? 'mid' : 'single');
        html += '<div class="hitCol' + (isTop ? ' top' : '') + '">' +
          '<div class="hitBall ' + tier + '" style="width:' + dia + 'px;height:' + dia + 'px;border-radius:' + (dia / 2) + 'px;">' +
          '<span class="hitNum' + (isTop ? ' top' : '') + '">' + num + '</span></div>' +
          (cnt >= 2 ? '<span class="hitMult' + (isTop ? ' top' : '') + '">x' + cnt + '</span>' : '') +
          '</div>';
      }
      html += '</div>';
      el.hitBox.innerHTML = html;
    }
  }

  function updateShots() {
    var remaining = MAX_TOTAL_SHOTS - shotsDone;
    el.remainingNum.textContent = remaining;
    el.saveHint.style.display = shotsDone < MIN_SHOTS_FOR_SAVE ? '' : 'none';
  }

  function setDisabled(node, off) { if (off) node.classList.add('dimmed'); else node.classList.remove('dimmed'); }
  function updateButtons() {
    var remaining = MAX_TOTAL_SHOTS - shotsDone;
    setDisabled(el.fire6, burstBusy || remaining <= 0);
    setDisabled(el.fire10, burstBusy || remaining <= 0);
    setDisabled(el.fire45, burstBusy || remaining <= 0);
    setDisabled(el.resetBtn, burstBusy);
    var saveable = buildNumbersForSave(hits);
    setDisabled(el.saveBtn, burstBusy || shotsDone < MIN_SHOTS_FOR_SAVE || saveable.length === 0);
  }

  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    el.toastTxt.textContent = msg;
    el.toastWrap.classList.add('is-shown');
    toastTimer = setTimeout(function () { el.toastWrap.classList.remove('is-shown'); toastTimer = null; }, 2000);
  }

  // ===== 동작 =====
  function playThrow() {
    el.char.classList.remove('throwing');
    void el.char.offsetWidth;
    el.char.classList.add('throwing');
  }

  function spawnFlight(toX, toY, rot) {
    return new Promise(function (resolve) {
      var d = document.createElement('div');
      d.className = 'dart';
      d.innerHTML = dartSVG();
      el.flightLayer.appendChild(d);
      var t0 = performance.now(), DUR = 420;
      function frame(now) {
        var raw = Math.min(1, (now - t0) / DUR);
        var t = easeOutCubic(raw);
        var x = dartStartX + (toX - dartStartX) * t;
        var y = dartStartY + (toY - dartStartY) * t;
        d.style.transform = dartTransform(x, y, rot);
        if (raw < 1) requestAnimationFrame(frame);
        else { d.style.transform = dartTransform(toX, toY, rot); resolve(); }
      }
      requestAnimationFrame(frame);
    });
  }

  function runBurst(count) {
    if (burstBusy) return;
    var room = MAX_TOTAL_SHOTS - shotsDone;
    if (room <= 0) { showToast(MAX_TOTAL_SHOTS + '발을 모두 썼습니다.'); return; }
    var burst = Math.min(count, room);
    burstBusy = true; updateButtons();

    (async function () {
      for (var i = 0; i < burst; i++) {
        if (shotsDone >= MAX_TOTAL_SHOTS) break;
        vibrate(20);
        var pickedN = Math.floor(Math.random() * 45) + 1;
        var tgt = targetForNumber(pickedN);
        playThrow();
        await sleep(SHEET_MS * 0.38);
        var rot = Math.atan2(tgt.y - dartStartY, tgt.x - dartStartX) * 180 / Math.PI;
        await spawnFlight(tgt.x, tgt.y, rot);
        hits.push({ n: pickedN });
        shotsDone += 1;
        renderHits(); updateShots(); updateButtons();
        vibrate(12);
        await sleep(210);
      }
      burstBusy = false; updateButtons();
    })();
  }

  function onReset() {
    if (burstBusy) return;
    hits = [];
    shotsDone = 0;
    el.flightLayer.innerHTML = '';
    renderDecor(); // 장식링 리마운트
    renderHits(); updateShots(); updateButtons();
    showToast('초기화했습니다.');
  }

  function onSave() {
    if (shotsDone < MIN_SHOTS_FOR_SAVE) { showToast('저장하려면 ' + MIN_SHOTS_FOR_SAVE + '발 이상 쏴야 합니다.'); return; }
    var numbers = buildNumbersForSave(hits);
    if (numbers.length === 0) { showToast('2번 이상 맞은 번호가 없습니다.'); return; }
    if (!window.wsubSaveNumbers) { showToast('저장 기능을 불러오지 못했어요. 새로고침 후 다시 시도해 주세요.'); return; }
    // wsubSaveNumbers가 오름차순 정렬 + 콤마문자열 + savedAt(Date.now()) 처리, 미로그인시 모달→로그인후 자동저장
    window.wsubSaveNumbers(numbers, 'dart', function(){ refreshSavedButton(); });
  }

  function refreshSavedButton() {
    el.savedViewBtn.classList.add('is-shown');
    el.savedViewBtn.textContent = '저장한 다트 번호 보기';
  }

  function openSavedModal() {
    var items = getSaved().filter(function (e) { return e.type === 'wheel'; })
      .sort(function (a, b) { return (b.savedAt || '').localeCompare(a.savedAt || ''); });
    if (!items.length) {
      el.savedList.innerHTML = '<div class="savedEmpty">아직 저장한 번호가 없습니다.</div>';
    } else {
      var s = '';
      for (var i = 0; i < items.length; i++) {
        var e = items[i], nums = '';
        for (var j = 0; j < e.numbers.length; j++) nums += '<div class="savedNum">' + e.numbers[j] + '</div>';
        s += '<div class="savedItem"><div class="savedRound">' + (e.roundLabel || '원판다트') + '</div>' +
          '<div class="savedNums">' + nums + '</div>' +
          '<div class="savedMeta">총 ' + (e.totalShots || 0) + '발 · 2회+ 적중 ' + e.numbers.length + '개</div></div>';
      }
      el.savedList.innerHTML = s;
    }
    el.savedModal.classList.add('is-shown');
  }
  function closeSavedModal() { el.savedModal.classList.remove('is-shown'); }

  // ===== DOM 바인딩 =====
  function bindElements() {
    el.root = document.getElementById('dart-root');
    el.stage = document.getElementById('stage');
    el.char = document.getElementById('char');
    el.wheelTilt = document.getElementById('wheelTilt');
    el.wheelSvg = document.getElementById('wheelSvg');
    el.decor = document.getElementById('decor');
    el.flightLayer = document.getElementById('flightLayer');
    el.hitBox = document.getElementById('hitBox');
    el.remainingNum = document.getElementById('remainingNum');
    el.saveHint = document.getElementById('saveHint');
    el.fire6 = document.getElementById('fire6');
    el.fire10 = document.getElementById('fire10');
    el.fire45 = document.getElementById('fire45');
    el.resetBtn = document.getElementById('resetBtn');
    el.saveBtn = document.getElementById('saveBtn');
    el.savedViewBtn = document.getElementById('savedViewBtn');
    el.subHint = document.getElementById('subHint');
    el.toastWrap = document.getElementById('toastWrap');
    el.toastTxt = document.getElementById('toastTxt');
    el.savedModal = document.getElementById('savedModal');
    el.savedList = document.getElementById('savedList');
    el.savedModalClose = document.getElementById('savedModalClose');
  }

  function bindEvents() {
    el.fire6.addEventListener('click', function () { runBurst(6); });
    el.fire10.addEventListener('click', function () { runBurst(10); });
    el.fire45.addEventListener('click', function () { runBurst(45); });
    el.resetBtn.addEventListener('click', onReset);
    el.saveBtn.addEventListener('click', onSave);
    el.savedViewBtn.addEventListener('click', function () { location.href = '/mynumbers.html'; });
    el.savedModalClose.addEventListener('click', closeSavedModal);
    el.savedModal.addEventListener('click', function (ev) { if (ev.target === el.savedModal) closeSavedModal(); });
    var rT = null;
    window.addEventListener('resize', function () {
      if (rT) clearTimeout(rT);
      rT = setTimeout(function () { setupGeometry(); renderWheel(); renderDecor(); }, 150);
    });
  }

  // ===== 시작 (React 이식 시: export function startDartApp) =====
  function startDartApp() {
    bindElements();
    if (!el.root) return;
    setupGeometry();
    renderWheel();
    renderDecor();
    bindEvents();
    renderHits(); updateShots(); updateButtons();
    refreshSavedButton();
    loadNextRound().then(function (r) {
      nextRound = r;
      el.subHint.textContent = r ? (r + '회차 예측') : '다음 회차';
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startDartApp);
  } else {
    startDartApp();
  }
  if (typeof window !== 'undefined') window.startDartApp = startDartApp;
})();
</script>
</body>
