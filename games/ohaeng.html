<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>오행 궁합 로또</title>
<style>
  :root { --cyan:#00ffff; --purple:#cc00ff; --gold:#ffd700; --green:#00ff00; --bg:#0a0a1a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); }
  body {
    font-family:'Courier New',ui-monospace,monospace; color:#fff; min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(204,0,255,0.12), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(0,255,255,0.07), transparent 40%),
      var(--bg);
    padding:18px 14px 40px; overflow-x:hidden;
  }
  .wrap { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  .eyebrow { font-size:11px; letter-spacing:4px; color:var(--purple); opacity:.85; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:1px; text-shadow:0 0 12px var(--purple),0 0 24px rgba(204,0,255,.4); }
  .sub { font-size:12px; color:#a9b; letter-spacing:1px; }
  .card {
    background:#0d0d2b; border:1px solid rgba(204,0,255,.25); border-radius:14px; padding:16px; margin-bottom:16px;
    box-shadow:0 0 18px rgba(204,0,255,.12), inset 0 0 30px rgba(204,0,255,.03);
  }
  .label { font-size:12px; letter-spacing:2px; color:var(--purple); margin-bottom:10px; text-transform:uppercase; }
  .person { margin-bottom:14px; }
  .person .pname { font-size:13px; color:#cde; margin-bottom:8px; letter-spacing:1px; }
  .date-row { display:flex; gap:8px; }
  .date-row .fld { flex:1; } .date-row .fld.d3 { flex:1.3; }
  .fld small { display:block; font-size:10px; color:#789; margin-bottom:4px; letter-spacing:1px; }
  select {
    width:100%; background:#07071a; border:1px solid rgba(204,0,255,.3); color:#e8cdee; border-radius:9px;
    padding:11px 8px; font-family:inherit; font-size:15px; appearance:none; text-align:center;
  }
  select:focus { outline:none; border-color:var(--purple); box-shadow:0 0 10px rgba(204,0,255,.4); }
  .run-btn {
    width:100%; margin-top:6px; background:linear-gradient(180deg,#1a0a2e,#0d0518);
    border:1.5px solid var(--purple); color:#fff; border-radius:12px; padding:16px;
    font-family:inherit; font-size:17px; font-weight:bold; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 20px rgba(204,0,255,.35); text-shadow:0 0 10px var(--purple); transition:all .15s;
  }
  .run-btn:active { transform:scale(.98); }

  .elems { display:flex; align-items:center; justify-content:center; gap:18px; margin:6px 0 14px; }
  .elem { text-align:center; }
  .elem .badge {
    width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:28px; margin:0 auto 6px; border:2px solid; background:#07071a;
  }
  .elem .enm { font-size:13px; letter-spacing:1px; }
  .vs { font-size:18px; color:var(--gold); text-shadow:0 0 8px var(--gold); }

  .rel { text-align:center; font-size:15px; margin:4px 0 10px; letter-spacing:1px; }
  .rel b { font-size:18px; }
  .gauge { height:18px; background:#07071a; border:1px solid rgba(204,0,255,.25); border-radius:10px; overflow:hidden; position:relative; }
  .gauge-fill { height:100%; width:0%; border-radius:10px; transition:width .8s cubic-bezier(.2,.7,.2,1); }
  .score-txt { text-align:center; font-size:30px; font-weight:bold; margin:12px 0 4px; color:var(--gold); text-shadow:0 0 14px var(--gold); }
  .comment { text-align:center; font-size:13px; color:#dde; line-height:1.6; margin:6px 8px 4px; }

  .balls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:10px 0 4px; }
  .ball {
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:bold; color:var(--bg); background:var(--purple);
    box-shadow:0 0 14px var(--purple); animation:pop .4s ease backwards;
  }
  .ball:nth-child(1){animation-delay:.05s}.ball:nth-child(2){animation-delay:.12s}
  .ball:nth-child(3){animation-delay:.19s}.ball:nth-child(4){animation-delay:.26s}
  .ball:nth-child(5){animation-delay:.33s}.ball:nth-child(6){animation-delay:.40s}
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .meta { text-align:center; font-size:12px; color:#9ab; letter-spacing:1px; margin-top:4px; }
  .meta b { color:var(--purple); }
  .save-btn {
    width:100%; margin-top:14px; background:#0a0a2e; border:1.5px solid var(--gold); color:var(--gold);
    border-radius:12px; padding:14px; font-family:inherit; font-size:15px; letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,215,0,.3); text-shadow:0 0 8px rgba(255,215,0,.6); transition:all .15s;
  }
  .save-btn:active { transform:scale(.98); }
  .save-btn.done { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(0,255,0,.3); text-shadow:0 0 8px var(--green); }
  .hidden { display:none !important; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#0d0d2b;
    border:1px solid var(--purple); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px;
    letter-spacing:1px; box-shadow:0 0 18px rgba(204,0,255,.4); opacity:0; transition:opacity .25s; z-index:50;
  }
  .toast.show { opacity:1; }
.ball.power{background:#ff2d55;color:#fff;box-shadow:0 0 14px #ff2d55,0 0 30px rgba(255,45,85,.5);}
  .plus{color:#ff2d55;font-size:22px;font-weight:bold;align-self:center;text-shadow:0 0 8px #ff2d55;}
  .balls{align-items:center;}
  </style>

  .wsub-modal .tog{text-align:center;font-size:12px;color:#a78bfa;cursor:pointer;padding:4px;}

  .wsub-modal .cls{background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;padding:4px;text-align:center;}

<body>
  <div class="wsub-auth-bar" id="wsubAuthBar">
    <span class="s" id="wsubAuthStatus">로그인하면 번호를 저장할 수 있어요</span>
    <button id="wsubAuthBtn">로그인</button>
  </div>
  <div class="wsub-modal hide" id="wsubModal">
    <div class="box">
      <h2 class="t" id="wsubModalTitle">로그인</h2>
      <p class="sub" id="wsubModalSub">저장한 번호를 어디서든 다시 볼 수 있어요.</p>
      <input id="wsubEmail" type="email" placeholder="이메일" autocomplete="email">
      <input id="wsubPass" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
      <div class="msg" id="wsubMsg"></div>
      <button class="mbtn" id="wsubDoAuth">로그인</button>
      <div class="tog" id="wsubTog">계정이 없으신가요? 회원가입</div>
      <button class="cls" id="wsubClose">닫기</button>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="eyebrow">Five Elements · Compatibility</div>
      <h1>💑 오행 궁합 로또</h1>
      <div class="sub">두 사람의 오행 궁합으로 행운 번호를 얻습니다</div>
    </header>

    <div class="card">
      <div class="label">두 사람 생년월일</div>
      <div class="person">
        <div class="pname">🧑 첫 번째 사람</div>
        <div class="date-row">
          <div class="fld"><small>년</small><select id="ohY1"></select></div>
          <div class="fld"><small>월</small><select id="ohM1"></select></div>
          <div class="fld d3"><small>일</small><select id="ohD1"></select></div>
        </div>
      </div>
      <div class="person">
        <div class="pname">🧑 두 번째 사람</div>
        <div class="date-row">
          <div class="fld"><small>년</small><select id="ohY2"></select></div>
          <div class="fld"><small>월</small><select id="ohM2"></select></div>
          <div class="fld d3"><small>일</small><select id="ohD2"></select></div>
        </div>
      </div>
      <button class="run-btn" id="ohRunBtn">궁합 보기</button>
    </div>

    <div class="card hidden" id="ohResultCard">
      <div class="label">오행 궁합 결과</div>
      <div class="elems">
        <div class="elem"><div class="badge" id="ohBadge1">?</div><div class="enm" id="ohName1">-</div></div>
        <div class="vs">❤</div>
        <div class="elem"><div class="badge" id="ohBadge2">?</div><div class="enm" id="ohName2">-</div></div>
      </div>
      <div class="rel" id="ohRel">-</div>
      <div class="gauge"><div class="gauge-fill" id="ohGauge"></div></div>
      <div class="score-txt"><span id="ohScore">0</span>점</div>
      <div class="comment" id="ohComment">-</div>

      <div class="label" style="margin-top:16px;">행운 번호</div>
      <div class="balls" id="ohBalls"></div>
      <div class="meta"><b id="ohRoundTxt">-</b> · 오행 조합 추출</div>
      <button class="save-btn" id="ohSaveBtn">나의 번호에 저장</button>
    </div>
  </div>
  <div class="toast" id="ohToast"></div>

<script>
(function () {
  'use strict';

  // ===================================================================
  // ===== [재사용 영역] 순수 로직 =====================================
  // ===================================================================
  var COLORS = { cyan:'#00ffff', purple:'#cc00ff', gold:'#ffd700', green:'#00ff00', bg:'#0a0a1a' };
  var GAME_KEY = 'ohaeng';
  var STORAGE_KEY = '@devbrick/saved_lotto_numbers_v1';
  var MAX_PER_TYPE = 100;

  // 오행 인덱스: 0木 1火 2土 3金 4水
  var ELEMENTS = [
    { idx:0, ko:'목(木)', emoji:'🌳', color:'#00ff00' },
    { idx:1, ko:'화(火)', emoji:'🔥', color:'#ff5555' },
    { idx:2, ko:'토(土)', emoji:'⛰️', color:'#ffd700' },
    { idx:3, ko:'금(金)', emoji:'⚙️', color:'#00ffff' },
    { idx:4, ko:'수(水)', emoji:'💧', color:'#5599ff' }
  ];

  // 출생연도 끝자리 → 오행. 0,1=금 2,3=수 4,5=목 6,7=화 8,9=토
  function elementOf(year) {
    var d = ((year % 10) + 10) % 10;
    if (d <= 1) return 3;       // 金
    if (d <= 3) return 4;       // 水
    if (d <= 5) return 0;       // 木
    if (d <= 7) return 1;       // 火
    return 2;                   // 土
  }
  // 상생: e가 낳는 오행 = (e+1)%5  (木→火→土→金→水→木)
  function sheng(e) { return (e + 1) % 5; }
  // 상극: e가 이기는 오행 = (e+2)%5  (木→土→水→火→金→木)
  function ke(e) { return (e + 2) % 5; }

  // 두 오행 관계 판정 → 'sheng'(상생) | 'ke'(상극) | 'same'(동기)
  function relation(e1, e2) {
    if (e1 === e2) return 'same';
    if (sheng(e1) === e2 || sheng(e2) === e1) return 'sheng';
    if (ke(e1) === e2 || ke(e2) === e1) return 'ke';
    return 'neutral';
  }

  // 궁합 점수 0~100 (관계별 기준점 + 생일 기반 결정적 가감)
  function compatScore(e1, e2, jitterSeed) {
    var base;
    var rel = relation(e1, e2);
    if (rel === 'sheng') base = 88;
    else if (rel === 'same') base = 74;
    else if (rel === 'ke') base = 42;
    else base = 60;
    var jitter = (jitterSeed % 13) - 6;   // -6 ~ +6
    var s = base + jitter;
    if (s > 100) s = 100; if (s < 0) s = 0;
    return { score: s, rel: rel };
  }
  function relationLabel(rel) {
    if (rel === 'sheng') return '상생(相生) — 서로 북돋는 사이';
    if (rel === 'same')  return '동기(同氣) — 닮아서 통하는 사이';
    if (rel === 'ke')    return '상극(相剋) — 부딪치며 배우는 사이';
    return '평(平) — 무난한 사이';
  }
  function comment(score) {
    if (score >= 85) return '하늘이 맺어준 인연이에요. 함께라면 기운이 배가됩니다.';
    if (score >= 70) return '서로를 채워주는 좋은 조합이에요. 신뢰가 복을 부릅니다.';
    if (score >= 55) return '무난하게 어울려요. 작은 배려가 관계를 빛나게 합니다.';
    return '부딪힘이 있지만 그만큼 성장하는 사이예요. 인내가 행운을 부릅니다.';
  }

  function makeRng(seed) {
    var s = seed >>> 0;
    return function () { s|=0; s=(s+0x6D2B79F5)|0; var t=Math.imul(s^(s>>>15),1|s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; };
  }
  function seedFrom(arr) { var s=2166136261; for(var i=0;i<arr.length;i++){s^=arr[i];s=Math.imul(s,16777619);} return s>>>0; }
  function pickPowerball(rng) {
    var wp = {}, white = [];
    while (white.length < 6) { var n = 1 + Math.floor(rng() * 45); if (!wp[n]) { wp[n] = true; white.push(n); } }
    white.sort(function (a, b) { return a - b; });
    return { white: white, power: 0 };
  }
  function makeSavedEntry(numbers, powerball, nextRound, nowMs, id) {
    return { id: id, savedAt: new Date(nowMs).toISOString(), round: nextRound > 0 ? nextRound : 0, numbers: numbers.slice(), powerball: powerball, matchCount: 0, type: GAME_KEY, source: GAME_KEY };
  }
  function isDuplicate(savedArr, numbers, powerball, type) {
    var key = numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + powerball;
    for (var i = 0; i < savedArr.length; i++) {
      var e = savedArr[i];
      if (e && e.type === type && Array.isArray(e.numbers)) {
        var ek = e.numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + (e.powerball || 0);
        if (ek === key) return true;
      }
    }
    return false;
  }
  function trimSavedByType(arr, maxPerType) {
    var groups={}; for(var i=0;i<arr.length;i++){var t=arr[i].type||'_';(groups[t]=groups[t]||[]).push(arr[i]);}
    var out=[]; Object.keys(groups).forEach(function(t){
      var g=groups[t].slice().sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);});
      if(g.length>maxPerType)g=g.slice(g.length-maxPerType); out=out.concat(g);});
    out.sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);}); return out;
  }
  function parseMaxRound(json) { var mx=0; if(json&&typeof json==='object')Object.keys(json).forEach(function(k){var r=parseInt(k,10);if(!isNaN(r)&&r>mx)mx=r;}); return mx; }

  // ===================================================================
  // ===== [HTML 전용] 화면/이벤트/저장/fetch ==========================
  // ===================================================================
  var FIREBASE_URL = 'https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app';
  var el = {};
  var state = { numbers: [], score: 0, nextRound: 0, finished: false };

  function genId(p) { return p + '-' + Date.now() + '_' + Math.random().toString(36).slice(2, 10); }

  function bindElements() {
    el.y1=document.getElementById('ohY1'); el.m1=document.getElementById('ohM1'); el.d1=document.getElementById('ohD1');
    el.y2=document.getElementById('ohY2'); el.m2=document.getElementById('ohM2'); el.d2=document.getElementById('ohD2');
    el.runBtn=document.getElementById('ohRunBtn');
    el.resultCard=document.getElementById('ohResultCard');
    el.badge1=document.getElementById('ohBadge1'); el.name1=document.getElementById('ohName1');
    el.badge2=document.getElementById('ohBadge2'); el.name2=document.getElementById('ohName2');
    el.rel=document.getElementById('ohRel'); el.gauge=document.getElementById('ohGauge');
    el.score=document.getElementById('ohScore'); el.comment=document.getElementById('ohComment');
    el.balls=document.getElementById('ohBalls'); el.roundTxt=document.getElementById('ohRoundTxt');
    el.saveBtn=document.getElementById('ohSaveBtn'); el.toast=document.getElementById('ohToast');
  }
  function fillSelect(sel,from,to,pad,selected){ sel.innerHTML='';
    for(var v=from;v<=to;v++){var o=document.createElement('option');o.value=v;o.textContent=pad?String(v).padStart(2,'0'):v;if(v===selected)o.selected=true;sel.appendChild(o);} }
  function showToast(msg){ el.toast.textContent=msg; el.toast.classList.add('show'); setTimeout(function(){el.toast.classList.remove('show');},1800); }

  function paintElem(badge, nameEl, e) {
    var info = ELEMENTS[e];
    badge.textContent = info.emoji; badge.style.borderColor = info.color;
    badge.style.boxShadow = '0 0 14px ' + info.color + '88';
    nameEl.textContent = info.ko; nameEl.style.color = info.color;
  }
  function gaugeColor(score) {
    if (score >= 85) return 'linear-gradient(90deg,#00ff00,#ffd700)';
    if (score >= 70) return 'linear-gradient(90deg,#cc00ff,#00ffff)';
    if (score >= 55) return 'linear-gradient(90deg,#cc00ff,#ffd700)';
    return 'linear-gradient(90deg,#ff5555,#cc00ff)';
  }

  function fetchNextRound(cb){ fetch(FIREBASE_URL+'/winningNumbers.json').then(function(r){return r.json();})
    .then(function(j){cb(parseMaxRound(j)+1);}).catch(function(){cb(0);}); }

  function calculate() {
    var y1=parseInt(el.y1.value,10),m1=parseInt(el.m1.value,10),d1=parseInt(el.d1.value,10);
    var y2=parseInt(el.y2.value,10),m2=parseInt(el.m2.value,10),d2=parseInt(el.d2.value,10);
    var e1=elementOf(y1), e2=elementOf(y2);                       // ← 순수
    var jitter=seedFrom([y1,m1,d1,y2,m2,d2]);                      // ← 순수
    var res=compatScore(e1,e2,jitter);                            // ← 순수
    var rng=makeRng(seedFrom([e1,e2,m1,d1,m2,d2,res.score]));      // ← 순수 RNG
    var __pbr = pickPowerball(rng); var numbers = __pbr.white; var power = __pbr.power;                                 // ← 순수

    state.numbers = numbers; state.power = power; state.score=res.score; state.finished=true;

    paintElem(el.badge1, el.name1, e1);
    paintElem(el.badge2, el.name2, e2);
    el.rel.innerHTML = relationLabel(res.rel);
    el.gauge.style.background = gaugeColor(res.score);
    el.gauge.style.width = '0%';
    el.score.textContent = '0';
    el.comment.textContent = comment(res.score);
    el.balls.innerHTML='';
    numbers.forEach(function(n){var b=document.createElement('div');b.className='ball';b.textContent=n;el.balls.appendChild(b);});
    el.saveBtn.textContent='나의 번호에 저장'; el.saveBtn.className='save-btn'; el.saveBtn.disabled=false;
    el.resultCard.classList.remove('hidden');

    // 게이지/숫자 카운트업 애니메이션
    requestAnimationFrame(function(){ el.gauge.style.width = res.score + '%'; });
    var start=null, target=res.score;
    function count(ts){ if(!start)start=ts; var p=Math.min((ts-start)/700,1);
      el.score.textContent = Math.round(target*p); if(p<1)requestAnimationFrame(count); }
    requestAnimationFrame(count);

    el.roundTxt.textContent = '한국 로또 방식';
  }

  function loadSaved(){ try{var raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):[];}catch(e){return [];} }
  function saveResult() {
    if (!state.finished) return;
    var nums = state.numbers;
    if (!window.wsubIsLoggedIn()) {
      // 로그인 후 자동 저장
      window.wsubPendingSaveAction = function(){ doFirebaseSave(nums); };
      window.wsubSaveNumbers(nums); // 모달 띄움
      return;
    }
    doFirebaseSave(nums);
  }
  function doFirebaseSave(nums) {
    el.saveBtn.disabled = true; el.saveBtn.textContent = '저장 중...';
    window.wsubSaveNumbers(nums).then(function(){
      el.saveBtn.textContent = '✓ 저장 완료'; el.saveBtn.className = 'save-btn done'; el.saveBtn.disabled = true;
      showToast('나의 번호에 저장했어요');
    }).catch(function(err){
      if (err === 'not-logged-in') { el.saveBtn.disabled = false; el.saveBtn.textContent = '나의 번호에 저장'; return; }
      el.saveBtn.disabled = false; el.saveBtn.textContent = '나의 번호에 저장';
      showToast('저장에 실패했어요');
    });
  }

  function startOhaengApp() {
    bindElements();
    var nowY=new Date(Date.now()).getFullYear();
    fillSelect(el.y1,1940,nowY,false,1992); fillSelect(el.m1,1,12,true,1); fillSelect(el.d1,1,31,true,1);
    fillSelect(el.y2,1940,nowY,false,1994); fillSelect(el.m2,1,12,true,1); fillSelect(el.d2,1,31,true,1);
    el.runBtn.onclick=calculate; el.saveBtn.onclick=saveResult;
  }
  window.startOhaengApp = startOhaengApp;

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startOhaengApp);
  else startOhaengApp();
})();
</script>
<script>
/* ===== Wsub Firebase 로그인+저장 (자체완결) ===== */
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
    authDomain: "ai-lottosolutions.firebaseapp.com",
    databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ai-lottosolutions",
    storageBucket: "ai-lottosolutions.firebasestorage.app",
    messagingSenderId: "616782090306",
    appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
  };
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.database();
  var THIS_GAME = 'ohaeng';

  var pendingSave = false, mode = 'login';
  function $(id){ return document.getElementById(id); }

  function openModal(){ mode='login'; updateUI(); $('wsubEmail').value=''; $('wsubPass').value=''; $('wsubMsg').textContent=''; $('wsubModal').classList.remove('hide'); }
  function closeModal(){ $('wsubModal').classList.add('hide'); pendingSave=false; }
  function updateUI(){
    var L = mode==='login';
    $('wsubModalTitle').textContent = L?'로그인':'회원가입';
    $('wsubModalSub').textContent = L?'저장한 번호를 어디서든 다시 볼 수 있어요.':'이메일과 비밀번호만 있으면 가입돼요.';
    $('wsubDoAuth').textContent = L?'로그인':'회원가입';
    $('wsubTog').textContent = L?'계정이 없으신가요? 회원가입':'이미 계정이 있으신가요? 로그인';
  }
  function errMsg(c){
    switch(c){
      case 'auth/invalid-email': return '이메일 형식이 올바르지 않아요.';
      case 'auth/email-already-in-use': return '이미 가입된 이메일이에요. 로그인해 주세요.';
      case 'auth/weak-password': return '비밀번호가 너무 약해요 (6자 이상).';
      case 'auth/user-not-found': case 'auth/wrong-password': case 'auth/invalid-credential': return '이메일 또는 비밀번호가 맞지 않아요.';
      case 'auth/too-many-requests': return '시도가 많아요. 잠시 후 다시 해주세요.';
      case 'auth/network-request-failed': return '네트워크 연결을 확인해 주세요.';
      default: return '오류가 발생했어요. 다시 시도해 주세요.';
    }
  }
  function doAuth(){
    var email = $('wsubEmail').value.trim(), pass = $('wsubPass').value, msg = $('wsubMsg'), btn = $('wsubDoAuth');
    if(!email||!pass){ msg.textContent='이메일과 비밀번호를 입력해 주세요.'; return; }
    if(pass.length<6){ msg.textContent='비밀번호는 6자 이상이어야 해요.'; return; }
    btn.disabled=true; var o=btn.textContent; btn.textContent='처리 중...';
    var p = mode==='signup' ? auth.createUserWithEmailAndPassword(email,pass) : auth.signInWithEmailAndPassword(email,pass);
    p.then(function(){ $('wsubModal').classList.add('hide'); }).catch(function(e){ msg.textContent=errMsg(e.code); btn.disabled=false; btn.textContent=o; });
  }

  // Firebase 저장 (전역 노출: 게임의 saveResult가 호출)
  window.wsubSaveNumbers = function(numbers){
    var user = auth.currentUser;
    if(!user){ pendingSave = true; openModal(); return Promise.reject('not-logged-in'); }
    var ref = db.ref('wsub_saved/' + user.uid).push();
    return ref.set({
      numbers: numbers.slice().sort(function(a,b){return a-b;}).join(','),
      game: THIS_GAME,
      savedAt: Date.now()
    });
  };
  window.wsubIsLoggedIn = function(){ return !!auth.currentUser; };

  auth.onAuthStateChanged(function(user){
    var st = $('wsubAuthStatus'), btn = $('wsubAuthBtn');
    if(user){
      var name = user.email ? user.email.split('@')[0] : '회원';
      st.innerHTML = '<b>'+name+'</b>님 로그인됨';
      btn.textContent = '로그아웃';
      if(pendingSave){ pendingSave=false; if(window.wsubPendingSaveAction) window.wsubPendingSaveAction(); }
    }else{
      st.textContent = '로그인하면 번호를 저장할 수 있어요';
      btn.textContent = '로그인';
    }
  });

  document.addEventListener('DOMContentLoaded', function(){
    $('wsubAuthBtn').addEventListener('click', function(){
      if(auth.currentUser){ if(confirm('로그아웃 하시겠어요?')) auth.signOut(); }
      else openModal();
    });
    $('wsubDoAuth').addEventListener('click', doAuth);
    $('wsubTog').addEventListener('click', function(){ mode = mode==='login'?'signup':'login'; $('wsubMsg').textContent=''; updateUI(); });
    $('wsubClose').addEventListener('click', closeModal);
    $('wsubPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doAuth(); });
  });
})();
</script>
