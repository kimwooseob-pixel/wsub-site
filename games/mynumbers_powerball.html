<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>My Powerball Numbers · Wsub</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" />

<!-- Firebase (compat SDK 10.12.2) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root{
    --bg:#0d0b12;
    --bg-raised:#16131a;
    --red:#d96b6b;
    --red-soft:#b85656;
    --muted:#9aa0b4;
    --line:rgba(255,255,255,.08);
    --white-ball:#f4f5fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:#eef0f7;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    min-height:100dvh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Auth bar ── */
  #wsubAuthBar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 16px;
    background:var(--bg-raised);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  #wsubAuthBar .who{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #wsubAuthBar .who b{color:var(--red);font-weight:600;}
  .authbtn{
    flex:none;border:1px solid var(--line);background:transparent;color:#eef0f7;
    font-family:inherit;font-size:13px;font-weight:600;
    padding:7px 14px;border-radius:999px;cursor:pointer;
  }
  .authbtn.primary{background:var(--red);color:#1a0505;border-color:var(--red);}
  .authbtn:active{transform:scale(.97);}

  /* ── Header ── */
  header.page{padding:30px 20px 8px;text-align:center;}
  header.page h1{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:27px;margin:0;letter-spacing:-.01em;
    background:linear-gradient(180deg,#fbe0e0,var(--red));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  header.page p{margin:6px 0 0;font-size:13px;color:var(--muted);}

  main{max-width:560px;margin:0 auto;padding:14px 16px 60px;}

  /* ── State message ── */
  .state{
    text-align:center;color:var(--muted);font-size:14px;
    padding:54px 18px;line-height:1.7;
  }
  .state .ico{font-size:34px;display:block;margin-bottom:10px;}
  .state .cta{
    display:inline-block;margin-top:16px;
    background:var(--red);color:#1a0505;font-weight:700;
    padding:10px 22px;border-radius:999px;cursor:pointer;font-size:14px;
  }

  /* ── Game group ── */
  .group{margin-top:26px;}
  .group:first-child{margin-top:10px;}
  .group-head{
    display:flex;align-items:center;gap:8px;
    font-family:"Fraunces",serif;font-size:17px;font-weight:600;
    color:#f6dede;margin-bottom:12px;padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .group-head .emoji{font-size:19px;}
  .group-head .count{
    margin-left:auto;font-family:system-ui,sans-serif;
    font-size:12px;font-weight:500;color:var(--muted);
  }

  /* ── Saved card ── */
  .card{
    background:var(--bg-raised);
    border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .card .date{
    font-size:12px;color:var(--muted);min-width:82px;
    font-variant-numeric:tabular-nums;
  }
  .balls{display:flex;gap:6px;flex-wrap:wrap;flex:1;align-items:center;}
  .ball{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#23252e;
    font-variant-numeric:tabular-nums;
    background:radial-gradient(circle at 32% 28%,#ffffff,var(--white-ball) 60%,#c9ccd8);
    box-shadow:inset 0 -2px 3px rgba(40,45,70,.28);
    flex:none;
  }
  .ball.power{
    color:#fff;
    background:radial-gradient(circle at 32% 28%,#ff9b9b,var(--red) 58%,#a13c3c);
    box-shadow:inset 0 -2px 3px rgba(90,20,20,.4),0 0 8px rgba(217,107,107,.5);
  }
  .plus{flex:none;color:var(--muted);font-weight:700;font-size:14px;margin:0 1px;}
  .badge{
    flex:none;font-size:11px;font-weight:700;
    color:#ffb4b4;background:rgba(217,107,107,.14);
    border:1px solid rgba(217,107,107,.35);
    padding:3px 9px;border-radius:999px;letter-spacing:.02em;
  }
  .card.expired{opacity:.45;}
  .card.expired .ball{filter:grayscale(.5);}

  /* ── Modal ── */
  #wsubModal{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;padding:20px;
    background:rgba(5,5,10,.74);backdrop-filter:blur(3px);
  }
  #wsubModal.open{display:flex;}
  .modal-box{
    width:100%;max-width:340px;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:18px;padding:24px 22px;
  }
  .modal-box h2{
    font-family:"Fraunces",serif;font-size:20px;font-weight:600;
    margin:0 0 4px;color:#f6dede;
  }
  .modal-box .sub{font-size:13px;color:var(--muted);margin:0 0 18px;}
  .field{margin-bottom:12px;}
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:12px 13px;color:#eef0f7;
    font-family:inherit;font-size:15px;
  }
  .field input:focus{outline:none;border-color:var(--red-soft);}
  .modal-box .err{color:#ff9a9a;font-size:12.5px;min-height:17px;margin:2px 2px 10px;}
  .submit{
    width:100%;background:var(--red);color:#1a0505;border:none;
    font-family:inherit;font-weight:700;font-size:15px;
    padding:13px;border-radius:11px;cursor:pointer;
  }
  .submit:active{transform:scale(.99);}
  .toggle{
    text-align:center;margin-top:14px;font-size:13px;color:var(--muted);
  }
  .toggle button{
    background:none;border:none;color:var(--red);font-family:inherit;
    font-size:13px;font-weight:600;cursor:pointer;padding:0 2px;
  }
  .modal-close{
    position:absolute;top:18px;right:20px;background:none;border:none;
    color:var(--muted);font-size:24px;cursor:pointer;line-height:1;
  }
</style>
</head>
<body>

<!-- ───── Auth bar ───── -->
<div id="wsubAuthBar">
  <div class="who" id="wsubWho">Log in to see your saved numbers</div>
  <button class="authbtn primary" id="wsubAuthBtn" onclick="wsubOpenModal()">Log in</button>
</div>

<header class="page">
  <h1>My Powerball Numbers</h1>
  <p>All your saved Powerball picks, grouped by game</p>
</header>

<main id="wsubMain">
  <div class="state" id="wsubState">
    <span class="ico">🔒</span>
    Log in and your saved Powerball picks<br />will gather here, grouped by game.
    <br /><span class="cta" onclick="wsubOpenModal()">Log in / Sign up</span>
  </div>
</main>

<!-- ───── Login modal ───── -->
<div id="wsubModal">
  <div class="modal-box" style="position:relative;">
    <button class="modal-close" onclick="wsubCloseModal()">&times;</button>
    <h2 id="wsubModalTitle">Log in</h2>
    <p class="sub" id="wsubModalSub">Sign in with your email and password</p>
    <div class="field"><input type="email" id="wsubEmail" placeholder="Email" autocomplete="email" /></div>
    <div class="field"><input type="password" id="wsubPw" placeholder="Password (6+ characters)" autocomplete="current-password" /></div>
    <div class="err" id="wsubErr"></div>
    <button class="submit" id="wsubSubmit" onclick="wsubSubmit()">Log in</button>
    <div class="toggle" id="wsubToggle">
      No account yet? <button onclick="wsubToggleMode()">Sign up</button>
    </div>
  </div>
</div>

<script>
/* ===== Firebase init (powerball-prediction) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBme5XW9mHy87Y-dwjQzY0DCuC7k2478aw",
  authDomain: "powerball-prediction-3a2ab.firebaseapp.com",
  databaseURL: "https://powerball-prediction-3a2ab-default-rtdb.firebaseio.com",
  projectId: "powerball-prediction-3a2ab",
  storageBucket: "powerball-prediction-3a2ab.firebasestorage.app",
  messagingSenderId: "35475647063",
  appId: "1:35475647063:web:e3c185b495da1175a25112"
};
firebase.initializeApp(firebaseConfig);
const wsubAuth = firebase.auth();
const wsubDb = firebase.database();

/* ===== Game meta (icon + name, display order) ===== */
const GAME_META = {
  montecarlo: { emoji:"🎲", name:"Monte Carlo" },
  iching:     { emoji:"🀄", name:"I Ching" },
  dangsaju:   { emoji:"🎴", name:"Dangsaju Star" },
  tojeong:    { emoji:"🌙", name:"Tojeong Secret" },
  ohaeng:     { emoji:"💑", name:"Five Elements Match" },
  biorhythm:  { emoji:"📈", name:"Biorhythm" },
  tarot:      { emoji:"🃏", name:"Tarot" },
  saju:       { emoji:"🔮", name:"Saju" }
};
const GAME_ORDER = Object.keys(GAME_META);
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

/* ===== Auth state ===== */
let wsubMode = "login"; // login | signup
wsubAuth.onAuthStateChanged(function(user){
  const who = document.getElementById("wsubWho");
  const btn = document.getElementById("wsubAuthBtn");
  if (user) {
    who.innerHTML = '<b>' + escapeHtml(user.email || "Logged in") + '</b>';
    btn.textContent = "Log out";
    btn.classList.remove("primary");
    btn.onclick = wsubLogout;
    wsubCloseModal();
    loadMyNumbers(user.uid);
  } else {
    who.textContent = "Log in to see your saved numbers";
    btn.textContent = "Log in";
    btn.classList.add("primary");
    btn.onclick = wsubOpenModal;
    renderLoggedOut();
  }
});

/* ===== Load & render ===== */
function loadMyNumbers(uid){
  const main = document.getElementById("wsubMain");
  main.innerHTML = '<div class="state"><span class="ico">⏳</span>Loading…</div>';

  wsubDb.ref("wsub_saved/" + uid).once("value").then(function(snap){
    const val = snap.val();
    if (!val) { renderEmpty(); return; }

    // group by game
    const groups = {};
    Object.keys(val).forEach(function(key){
      const item = val[key] || {};
      const g = item.game || "unknown";
      if (!groups[g]) groups[g] = [];
      groups[g].push({
        white: String(item.white || ""),
        power: (item.powerball === undefined || item.powerball === null) ? "" : String(item.powerball),
        savedAt: Number(item.savedAt) || 0
      });
    });

    const now = Date.now();
    let html = "";
    let total = 0;

    GAME_ORDER.forEach(function(g){
      const list = groups[g];
      if (!list || !list.length) return;
      list.sort(function(a, b){ return b.savedAt - a.savedAt; }); // newest first
      const meta = GAME_META[g];
      total += list.length;

      html += '<section class="group">';
      html += '<div class="group-head"><span class="emoji">' + meta.emoji + '</span>' +
              escapeHtml(meta.name) +
              '<span class="count">' + list.length + '</span></div>';

      list.forEach(function(rec){
        const expired = rec.savedAt > 0 && (now - rec.savedAt) > WEEK_MS;
        html += '<div class="card' + (expired ? ' expired' : '') + '">';
        html += '<span class="date">' + fmtDate(rec.savedAt) + '</span>';
        html += '<div class="balls">' + renderBalls(rec.white, rec.power) + '</div>';
        if (expired) html += '<span class="badge">Expired</span>';
        html += '</div>';
      });
      html += '</section>';
    });

    // games not in meta → append after
    Object.keys(groups).forEach(function(g){
      if (GAME_ORDER.indexOf(g) !== -1) return;
      const list = groups[g];
      list.sort(function(a, b){ return b.savedAt - a.savedAt; });
      total += list.length;
      html += '<section class="group">';
      html += '<div class="group-head"><span class="emoji">🎱</span>' + escapeHtml(g) +
              '<span class="count">' + list.length + '</span></div>';
      list.forEach(function(rec){
        const expired = rec.savedAt > 0 && (now - rec.savedAt) > WEEK_MS;
        html += '<div class="card' + (expired ? ' expired' : '') + '">';
        html += '<span class="date">' + fmtDate(rec.savedAt) + '</span>';
        html += '<div class="balls">' + renderBalls(rec.white, rec.power) + '</div>';
        if (expired) html += '<span class="badge">Expired</span>';
        html += '</div>';
      });
      html += '</section>';
    });

    document.getElementById("wsubMain").innerHTML =
      total ? html : emptyHtml();
  }).catch(function(e){
    document.getElementById("wsubMain").innerHTML =
      '<div class="state"><span class="ico">⚠️</span>Couldn\'t load your numbers.<br />Please try again in a moment.</div>';
    console.error(e);
  });
}

// white = comma string (5 white balls), power = powerball number
function renderBalls(whiteStr, power){
  const nums = String(whiteStr).split(",").map(function(s){ return s.trim(); }).filter(Boolean);
  let h = nums.map(function(n){ return '<span class="ball">' + escapeHtml(n) + '</span>'; }).join("");
  if (power !== "" && power !== null && power !== undefined) {
    h += '<span class="plus">+</span>';
    h += '<span class="ball power">' + escapeHtml(power) + '</span>';
  }
  return h;
}

function fmtDate(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  return y + "." + mo + "." + da;
}

function emptyHtml(){
  return '<div class="state"><span class="ico">🗒️</span>' +
         'No saved numbers yet.<br />Draw and save numbers in a game to see them here.</div>';
}
function renderEmpty(){ document.getElementById("wsubMain").innerHTML = emptyHtml(); }

function renderLoggedOut(){
  document.getElementById("wsubMain").innerHTML =
    '<div class="state"><span class="ico">🔒</span>' +
    'Log in and your saved Powerball picks<br />will gather here, grouped by game.' +
    '<br /><span class="cta" onclick="wsubOpenModal()">Log in / Sign up</span></div>';
}

/* ===== Login modal ===== */
function wsubOpenModal(){
  document.getElementById("wsubErr").textContent = "";
  document.getElementById("wsubModal").classList.add("open");
}
function wsubCloseModal(){
  document.getElementById("wsubModal").classList.remove("open");
}
function wsubToggleMode(){
  wsubMode = (wsubMode === "login") ? "signup" : "login";
  const isSignup = wsubMode === "signup";
  document.getElementById("wsubModalTitle").textContent = isSignup ? "Sign up" : "Log in";
  document.getElementById("wsubModalSub").textContent =
    isSignup ? "Create an account with email and password" : "Sign in with your email and password";
  document.getElementById("wsubSubmit").textContent = isSignup ? "Sign up" : "Log in";
  document.getElementById("wsubToggle").innerHTML =
    isSignup
      ? 'Already have an account? <button onclick="wsubToggleMode()">Log in</button>'
      : 'No account yet? <button onclick="wsubToggleMode()">Sign up</button>';
  document.getElementById("wsubErr").textContent = "";
}
function wsubSubmit(){
  const email = document.getElementById("wsubEmail").value.trim();
  const pw = document.getElementById("wsubPw").value;
  const err = document.getElementById("wsubErr");
  err.textContent = "";
  if (!email || !pw) { err.textContent = "Please enter your email and password."; return; }

  const p = (wsubMode === "signup")
    ? wsubAuth.createUserWithEmailAndPassword(email, pw)
    : wsubAuth.signInWithEmailAndPassword(email, pw);

  p.catch(function(e){ err.textContent = authErrMsg(e); });
}
function wsubLogout(){ wsubAuth.signOut(); }

function authErrMsg(e){
  const c = (e && e.code) || "";
  if (c === "auth/invalid-email") return "That email address is invalid.";
  if (c === "auth/missing-password" || c === "auth/weak-password") return "Password must be at least 6 characters.";
  if (c === "auth/email-already-in-use") return "This email is already registered. Please log in.";
  if (c === "auth/invalid-credential" || c === "auth/wrong-password" || c === "auth/user-not-found")
    return "Email or password is incorrect.";
  if (c === "auth/too-many-requests") return "Too many attempts. Please try again later.";
  return "Something went wrong. Please try again.";
}

/* ===== Util ===== */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){
    return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[m];
  });
}

// close modal on backdrop click
document.getElementById("wsubModal").addEventListener("click", function(e){
  if (e.target === this) wsubCloseModal();
});
</script>
</body>
</html>
