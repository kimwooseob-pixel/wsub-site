<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스스로 찾는 내 손금</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#12100d;--bg2:#1c1813;--bg3:#272118;
    --gold:#c9a96e;--gold2:#e6cd95;--goldDim:#8a7448;
    --line:#3a3228;--text:#ece3d2;--text2:#9d9276;
    --emotion:#d96b6b;--brain:#5b9bd5;
  }
  body{background:#0a0908;color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
  /* PC에서도 모바일 앱처럼 보이도록 중앙 폭 고정 */
  #app-shell{max-width:460px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.6);}
  .serif{font-family:'Gowun Batang',serif;}
  #loading{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;color:var(--gold);font-family:'Gowun Batang',serif;letter-spacing:3px;font-size:18px;}
  .load-data-btn{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--goldDim));color:#1a1510;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:14px 28px;border-radius:30px;cursor:pointer;border:none;transition:.2s;}
  .load-data-btn:active{transform:scale(.97);}

  /* 메인 */
  #screen-main{min-height:100vh;display:none;flex-direction:column;align-items:center;padding:40px 24px 60px;position:relative;
    background:radial-gradient(ellipse at 50% 20%,#221c14 0%,#12100d 60%);}
  .brand{font-family:'Gowun Batang',serif;font-size:12px;letter-spacing:8px;color:var(--goldDim);margin-bottom:8px;margin-top:20px;}
  .main-title{font-family:'Gowun Batang',serif;font-size:34px;font-weight:700;color:var(--gold2);letter-spacing:7px;text-align:center;margin-bottom:6px;}
  .main-sub{font-size:12px;color:var(--text2);letter-spacing:2px;margin-bottom:36px;}
  /* 메인 화면 - 저장한 손금 바로가기 버튼 */
  .saved-shortcut{width:100%;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#2a2316,#1f1a12);border:1px solid var(--gold);border-radius:14px;padding:14px 18px;margin-bottom:28px;cursor:pointer;transition:.2s;}
  .saved-shortcut:active{transform:scale(.98);}
  .saved-shortcut .ss-icon{font-size:20px;}
  .saved-shortcut .ss-text{flex:1;text-align:left;}
  .saved-shortcut .ss-title{font-family:'Gowun Batang',serif;font-size:14px;font-weight:700;color:var(--gold2);}
  .saved-shortcut .ss-desc{font-size:11px;color:var(--text2);margin-top:2px;}
  .saved-shortcut .ss-count{background:var(--gold);color:#1a1510;font-size:12px;font-weight:700;border-radius:12px;padding:2px 10px;flex-shrink:0;}
  .saved-shortcut .ss-arrow{color:var(--gold2);font-size:18px;flex-shrink:0;}
  .pick-label{font-family:'Gowun Batang',serif;font-size:28px;font-weight:700;margin:6px 0 20px;letter-spacing:1px;align-self:center;width:100%;text-align:center;background:linear-gradient(95deg,#e8c07d 0%,#fff3d6 28%,#d4a85e 52%,#fff3d6 76%,#e8c07d 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 3.2s linear infinite;text-shadow:0 2px 12px rgba(201,169,110,.25);}
  @keyframes shimmer{to{background-position:200% center;}}
  .line-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
  .line-card{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.25s;display:flex;flex-direction:column;}
  .line-card:active{transform:scale(.98);border-color:var(--gold);}
  .lc-preview{padding:14px 14px 8px;}
  .lc-preview canvas{width:100%;aspect-ratio:648/900;display:block;border-radius:10px;background:#e8e2d6;border:1px solid var(--line);}
  .lc-head{padding:6px 14px 16px;display:flex;align-items:center;gap:10px;}
  .lc-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid;font-family:'Gowun Batang',serif;font-size:16px;}
  .lc-info{min-width:0;}
  .lc-name{font-family:'Gowun Batang',serif;font-size:24px;font-weight:800;line-height:1.25;letter-spacing:.5px;background:linear-gradient(100deg,#ff9a9a 0%,#ffd27a 18%,#b9f08a 36%,#8ad7ff 54%,#c9a2ff 72%,#ff9ad5 90%,#ff9a9a 100%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:nameGlow 3.4s linear infinite;filter:drop-shadow(0 0 5px rgba(255,180,120,.55)) drop-shadow(0 0 11px rgba(150,200,255,.35));}
  .lc-desc{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.3;}
  @keyframes nameGlow{0%{background-position:150% center;}100%{background-position:-50% center;}}

  /* 기타선 컴팩트 셀: 재운선 옆 한 칸에 2개를 위아래 반반으로 */
  .misc-cell{display:flex;flex-direction:column;gap:12px;}
  .misc-card{flex:1;background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--line);border-radius:16px;cursor:pointer;transition:.25s;display:flex;align-items:center;gap:10px;padding:12px 14px;min-height:0;}
  .misc-card:active{transform:scale(.98);border-color:var(--gold);}
  .misc-card .lc-dot{width:30px;height:30px;font-size:14px;}
  .mc-name{font-family:'Gowun Batang',serif;font-size:22px;font-weight:800;line-height:1.25;letter-spacing:.5px;background:linear-gradient(100deg,#ff9a9a 0%,#ffd27a 18%,#b9f08a 36%,#8ad7ff 54%,#c9a2ff 72%,#ff9ad5 90%,#ff9a9a 100%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:nameGlow 3.4s linear infinite;filter:drop-shadow(0 0 5px rgba(255,180,120,.55)) drop-shadow(0 0 11px rgba(150,200,255,.35));}
  .mc-desc{font-size:9.5px;color:var(--text2);margin-top:2px;line-height:1.3;}

  /* 탐색 */
  #screen-explore{min-height:100vh;display:none;flex-direction:column;padding-bottom:90px;}
  .ex-header{background:rgba(28,24,19,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
  .back-btn{background:none;border:none;color:var(--gold);font-size:26px;cursor:pointer;line-height:1;padding:0 4px 2px 0;}
  .ex-title{font-family:'Gowun Batang',serif;font-size:18px;font-weight:700;color:var(--gold2);}
  .ex-step{margin-left:auto;font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:20px;}
  .ex-progress{position:sticky;top:0;z-index:31;height:3px;background:transparent;margin-top:-3px;}
  .ex-progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--goldDim),var(--gold2));transition:width .4s cubic-bezier(.2,.8,.2,1);border-radius:0 2px 2px 0;}

  .ex-body{flex:1;padding:26px 16px 22px;}
  .question{font-family:'Gowun Batang',serif;font-size:21px;font-weight:700;color:var(--gold2);text-align:center;margin-bottom:6px;line-height:1.4;animation:fade .4s ease;}
  .q-hint{font-size:12px;color:var(--text2);text-align:center;margin-bottom:10px;animation:fade .4s ease;}
  .q-emph{font-size:13.5px;color:var(--gold2);text-align:center;margin-bottom:22px;animation:fade .4s ease;background:rgba(201,169,110,.1);border:1px solid var(--goldDim);border-radius:22px;padding:9px 14px;display:inline-block;width:auto;margin-left:auto;margin-right:auto;}
  .q-emph b{color:var(--gold2);font-weight:700;}
  .ex-body .q-emph{display:block;max-width:300px;margin-left:auto;margin-right:auto;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .choice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
  .choice{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;animation:rise .35s ease forwards;opacity:0;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .choice:active{transform:scale(.97);}
  .choice.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 6px 18px rgba(201,169,110,.25);transform:translateY(-2px);}
  .choice canvas{width:100%;aspect-ratio:648/900;display:block;background:#e8e2d6;}
  .choice-name{padding:10px 11px 12px;font-size:17px;color:var(--text);line-height:1.35;border-top:1px solid var(--line);height:92px;position:relative;transition:.2s;font-weight:700;display:flex;flex-direction:column;justify-content:center;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.55);letter-spacing:.2px;}
  .choice-name .cn-text{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;background:linear-gradient(100deg,var(--text) 0%,var(--text) 40%,#fff6df 50%,var(--gold2) 56%,var(--text) 66%,var(--text) 100%);background-size:250% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:nameGlow 3.4s linear infinite;}
  .choice.selected .choice-name .cn-text{background:none;-webkit-text-fill-color:var(--gold2);color:var(--gold2);animation:none;}
  .choice-special{margin-top:5px;}
  .choice.selected .choice-name{background:rgba(201,169,110,.14);color:var(--gold2);font-weight:700;border-top-color:var(--gold);}
  .choice-check{position:absolute;top:-30px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--gold);color:#1a1510;display:none;align-items:center;justify-content:center;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .choice.selected .choice-check{display:flex;animation:pop .25s ease;}
  @keyframes pop{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}

  .nav-row{display:flex;gap:10px;margin-top:8px;}
  .nav-row.nav-top{margin-top:0;margin-bottom:18px;}
  .nav-btn{flex:1;border-radius:14px;padding:16px;cursor:pointer;font-family:'Gowun Batang',serif;font-size:15px;transition:.2s;border:1px solid var(--line);background:var(--bg2);color:var(--text2);}
  .nav-btn.primary{background:linear-gradient(135deg,var(--goldDim),var(--gold));color:#1a1510;border-color:var(--gold);font-weight:700;}
  .nav-btn:active{transform:scale(.98);}

  /* 앱인토스 하단 배너 광고 */
  #ad-banner{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:460px;height:96px;z-index:60;background:var(--bg);}
  /* 배너 켜졌을 때: 본문 맨 아래 버튼이 배너에 안 가리게 넉넉한 여백 */
  body.ad-on #screen-explore{padding-bottom:140px !important;}
  body.ad-on #screen-main{padding-bottom:120px;}
  .picked{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line);animation:fade .3s ease;}
  .picked canvas{width:64px;aspect-ratio:648/900;border-radius:8px;background:#e8e2d6;flex-shrink:0;cursor:pointer;}
  .picked-info{flex:1;min-width:0;}
  .picked-q{font-size:10px;color:var(--goldDim);margin-bottom:2px;}
  .picked-name{font-family:'Gowun Batang',serif;font-size:13.5px;font-weight:700;color:var(--gold2);margin-bottom:4px;}
  .picked-text{font-size:11.5px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .picked-del{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;}

  /* 팝업 */
  #popup{display:none;position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:200;background:rgba(0,0,0,.82);align-items:flex-end;justify-content:center;}
  #popup.open{display:flex;}
  .sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 22px 32px;animation:slideUp .32s cubic-bezier(.2,.8,.2,1);border-top:1px solid var(--line);}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .p-handle{width:42px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 18px;}
  .p-canvas-wrap{width:100%;max-width:200px;margin:0 auto 16px;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
  .p-canvas{width:100%;aspect-ratio:648/900;display:block;background:#e8e2d6;}
  .p-name{font-family:'Gowun Batang',serif;font-size:18px;font-weight:700;color:var(--gold2);text-align:center;line-height:1.4;}
  .p-src{font-size:11px;color:var(--text2);text-align:center;margin-top:4px;margin-bottom:14px;}
  .p-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;}
  .tag{background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text2);}
  .p-text{font-size:13.5px;line-height:1.85;color:var(--text);background:var(--bg3);border-radius:12px;padding:15px 16px;margin-bottom:10px;}
  .p-text.sub{border-left:2px solid var(--gold);}

  .summary-box{background:linear-gradient(135deg,#2a2316,#1f1a12);border:1px solid var(--gold);border-radius:16px;padding:20px;margin:6px 0 16px;animation:fade .5s ease;}
  .summary-title{font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:12px;letter-spacing:1px;}
  .summary-text{font-size:15px;line-height:1.9;color:var(--text);margin-bottom:14px;}
  .summary-keywords{display:flex;flex-wrap:wrap;gap:7px;}
  .kw{background:rgba(201,169,110,.15);border:1px solid var(--goldDim);color:var(--gold2);border-radius:20px;padding:5px 12px;font-size:12px;}

  #topbar{position:sticky;top:0;z-index:40;background:rgba(18,16,13,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
  .tb-logo{font-size:15px;font-weight:700;color:var(--gold2);letter-spacing:2px;}
  .tb-menu{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;line-height:1;}
  #menu-overlay{display:none;position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:150;background:rgba(0,0,0,.6);}
  #menu-overlay.open{display:block;}
  .menu-panel{position:absolute;top:52px;right:14px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:fade .2s ease;}
  .menu-item{padding:15px 18px;font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--line);transition:.15s;}
  .menu-item:last-child{border-bottom:none;}
  .menu-item:active{background:var(--bg3);}
  .result-hand{background:var(--bg2);border:1px solid var(--gold);border-radius:16px;padding:18px;margin-bottom:16px;text-align:center;animation:fade .5s ease;}
  .result-hand canvas{width:200px;aspect-ratio:648/900;background:#e8e2d6;border-radius:12px;border:1px solid var(--line);}
  .result-hand-label{font-family:'Gowun Batang',serif;font-size:13px;color:var(--gold2);margin-top:10px;letter-spacing:1px;}
  /* 결과 카드 */
  .result-card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;animation:fade .4s ease;}
  .rc-head{display:flex;gap:12px;align-items:flex-start;}
  .rc-thumb{width:64px;flex-shrink:0;aspect-ratio:648/900;background:#e8e2d6;border-radius:9px;border:1px solid var(--line);}
  .rc-headtext{flex:1;min-width:0;padding-top:2px;}
  .rc-q{font-size:10.5px;color:var(--goldDim);letter-spacing:.5px;margin-bottom:3px;}
  .rc-name{font-size:15.5px;font-weight:700;color:var(--gold2);line-height:1.35;}
  .rc-sub{font-size:12.5px;color:var(--text);margin-top:5px;line-height:1.5;opacity:.92;}
  .rc-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .rc-body p{font-size:13px;line-height:1.85;color:var(--text);margin-bottom:8px;}
  .rc-body p:last-child{margin-bottom:0;}
  /* 조심할 것 / 행동 방향 칸 */
  .rc-extra{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
  .rc-note{font-size:12.5px;line-height:1.7;border-radius:10px;padding:9px 12px;}
  .rc-note .rc-note-label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
  .rc-caution{background:rgba(176,106,90,.12);border-left:2px solid #b06a5a;color:var(--text);}
  .rc-caution .rc-note-label{color:#d59585;}
  .rc-advice{background:rgba(212,175,90,.12);border-left:2px solid var(--gold);color:var(--text);}
  .rc-advice .rc-note-label{color:var(--gold2);}
  /* 게이지바 */
  .gauge-box{background:linear-gradient(135deg,#2a2316,#1f1a12);border:1px solid var(--gold);border-radius:16px;padding:18px 20px;margin:6px 0 16px;animation:fade .5s ease;}
  .gauge-title{font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:14px;letter-spacing:1px;}
  .gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .gauge-label{font-size:12px;color:var(--text);width:62px;flex-shrink:0;}
  .gauge-track{flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;}
  .gauge-fill{height:100%;border-radius:5px;transition:width .6s ease;}
  .gauge-val{font-size:12px;font-weight:700;width:28px;text-align:right;flex-shrink:0;}
  .gauge-val.pos{color:var(--gold2);}
  .gauge-val.neg{color:#d59585;}
  .gauge-hint{font-size:11px;color:var(--text2);margin-top:10px;text-align:center;opacity:.8;}
  /* 특별 게이지 (빨간 강조 + 별 누적) */
  .special-box{background:linear-gradient(135deg,#2a1614,#1f1210);border:1px solid #c0584a;border-radius:16px;padding:16px 18px;margin:6px 0 16px;animation:fade .5s ease;box-shadow:0 0 12px rgba(192,88,74,.18);}
  .special-title{font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;color:#ff8a76;margin-bottom:12px;letter-spacing:1px;}
  .special-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .special-name{font-size:13px;color:#ffd9d0;flex-shrink:0;font-weight:700;}
  .special-stars{display:flex;gap:2px;flex:1;flex-wrap:wrap;}
  .special-star{color:#ff5a44;font-size:16px;text-shadow:0 0 6px rgba(255,90,68,.6);line-height:1;}
  .special-cnt{font-size:12px;font-weight:700;color:#ff8a76;flex-shrink:0;}
  .special-hint{font-size:11px;color:#d8a59c;margin-top:8px;text-align:center;opacity:.85;}
  /* choice 카드 안 빨간 배지 */
  .choice-special{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
  .csp-badge{font-size:9.5px;background:#2a1210;border:1px solid #c0584a;color:#ff8a76;border-radius:4px;padding:1px 5px;font-weight:700;}
  /* 결과 카드 안 빨간 배지 */
  .rc-special{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .rcsp-badge{font-size:10.5px;background:#2a1210;border:1px solid #c0584a;color:#ff8a76;border-radius:5px;padding:2px 7px;font-weight:700;}
  .save-btn{background:var(--bg3)!important;border-color:var(--gold)!important;color:var(--gold2)!important;}
  .close-btn{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:15px;color:var(--text2);font-size:14px;cursor:pointer;margin-top:6px;font-family:'Noto Sans KR';}
  /* MBTI 성정 박스 (청록 강조) */
  .mbti-box{background:linear-gradient(135deg,#10221f,#0d1a1c);border:1px solid #3b8a86;border-radius:16px;padding:16px 18px;margin:6px 0 16px;box-shadow:0 0 12px rgba(59,138,134,.16);animation:fade .5s ease;}
  .mbti-title{font-family:'Gowun Batang',serif;font-size:15px;font-weight:700;color:#7fe3da;margin-bottom:10px;letter-spacing:1px;}
  .mbti-type{font-family:'Gowun Batang',serif;font-size:26px;font-weight:700;color:#aef3ea;letter-spacing:6px;text-align:center;margin:2px 0 12px;text-shadow:0 0 10px rgba(127,227,218,.4);}
  .mbti-row{padding:8px 0;border-top:1px solid rgba(127,227,218,.12);}
  .mbti-row:first-of-type{border-top:none;}
  .mbti-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .mbti-letter{font-family:'Gowun Batang',serif;font-weight:700;color:#0d1a1c;background:#7fe3da;border-radius:6px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .mbti-axis{font-size:13px;font-weight:700;color:#cfeee9;flex:1;}
  .mbti-tally{font-size:11px;color:#8fb8b3;flex-shrink:0;}
  .mbti-desc{font-size:12px;color:#bcded9;line-height:1.6;padding-left:30px;}
  .mbti-even{color:#9bbdb8;font-style:italic;padding-left:0;}
  .mbti-hint{font-size:11px;color:#8fb8b3;margin-top:8px;text-align:center;opacity:.85;}
  /* ===== 마스코트/할머니 애니메이션 (공유) ===== */
  @keyframes bk_o{0%,90%,100%{opacity:1}94%,96%{opacity:0}}
  @keyframes bk_c{0%,90%,100%{opacity:0}94%,96%{opacity:1}}
  @keyframes nod{0%,70%,100%{transform:translateY(0) rotate(0deg)}80%{transform:translateY(4px) rotate(-2deg)}90%{transform:translateY(4px) rotate(2deg)}}
  @keyframes mtail{0%,100%{transform:rotate(0deg)}50%{transform:rotate(8deg)}}
  @keyframes hl_bo{0%,90%,100%{opacity:1}94%,96%{opacity:0}}
  @keyframes hl_bc{0%,90%,100%{opacity:0}94%,96%{opacity:1}}
  @keyframes hl_wv{0%,12%,100%{transform:rotate(0deg)}30%{transform:rotate(13deg)}45%{transform:rotate(-5deg)}60%{transform:rotate(10deg)}75%{transform:rotate(-3deg)}88%{transform:rotate(4deg)}}
  .bk_open{animation:bk_o 4.6s ease-in-out infinite}
  .bk_closed{animation:bk_c 4.6s ease-in-out infinite}
  .nod{transform-box:fill-box;transform-origin:50% 80%;animation:nod 3.6s ease-in-out infinite}
  .tail{transform-box:fill-box;transform-origin:20% 90%;animation:mtail 2.4s ease-in-out infinite}
  .hl_open{animation:hl_bo 4.6s ease-in-out infinite}
  .hl_closed{animation:hl_bc 4.6s ease-in-out infinite}
  .hl_wave{transform-box:fill-box;transform-origin:50% 88%;animation:hl_wv 2.8s ease-in-out infinite}
  /* MBTI 마스코트 배치 */
  .mbti-mascot-wrap{display:flex;justify-content:center;gap:10px;margin:2px 0 10px;}
  .mbti-mascot{width:46%;max-width:190px;}
  .mbti-mascot.solo{width:62%;max-width:230px;}
  .mbti-mascot svg{width:100%;height:auto;display:block;}
  /* 미니 할머니 (제목 옆 등) */
  .halmoni-mini{width:38px;height:38px;flex-shrink:0;vertical-align:middle;display:inline-block;}
  .halmoni-mini svg{width:100%;height:100%;display:block;}
  .summary-title,.mbti-title{display:flex;align-items:center;gap:8px;}
  .summary-title .halmoni-mini{margin-left:auto;width:76px;height:76px;}
  .q-head-row{display:flex;align-items:center;gap:10px;}
  .q-head-row .halmoni-mini{width:171px;height:171px;}
  .q-head-row .question{font-size:42px;}
  .main-head{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:24px;margin-bottom:36px;flex-wrap:wrap;}
  .main-halmoni{width:110px;height:110px;flex-shrink:0;}
  .main-halmoni svg{width:100%;height:100%;display:block;}
  .main-head-text{text-align:left;}
  .main-head-text .brand{margin-top:0;margin-bottom:4px;}
  .main-head-text .main-title{font-size:27px;letter-spacing:3px;text-align:left;margin-bottom:4px;}
  .main-head-text .main-sub{margin-bottom:0;}

<div id="app-shell">

<div id="loading">스스로 찾는 내 손금</div>

<!-- 상단 메뉴바 -->
<div id="topbar">
  <div class="tb-logo serif">스스로 찾는 내 손금</div>
  <button class="tb-menu" onclick="toggleMenu()">☰</button>
</div>
<!-- 드롭다운 메뉴 -->
<div id="menu-overlay" onclick="if(event.target===this)toggleMenu()">
  <div class="menu-panel">
    <div class="menu-item" onclick="goMain();toggleMenu();">🏠 홈</div>
    <div class="menu-item" onclick="showSaved();">📑 저장한 손금</div>

      <input type="file" accept=".json,application/json" style="display:none" onchange="onPickDataFile(event);toggleMenu();">
    </label>
    <div class="menu-item" onclick="showAbout();toggleMenu();">ℹ️ 앱 정보</div>
  </div>
</div>

<!-- 메인 -->
<div id="screen-main">
  <div class="main-head">
    <div class="main-halmoni" id="main-halmoni"></div>
    <div class="main-head-text">
      <div class="brand">PALMISTRY</div>
      <div class="main-title">스스로 찾는 내 손금</div>
      <div class="main-sub">자네 손금을 할머니와 함께 들여다보자</div>
    </div>
  </div>
  <div class="saved-shortcut" id="saved-shortcut" onclick="showSaved()" style="display:none;">
    <span class="ss-icon">📑</span>
    <span class="ss-text">
      <span class="ss-title">저장한 내 손금</span>
      <span class="ss-desc">풀이를 모아 보고, 합쳐서 볼 수 있단다</span>

    <span class="ss-count" id="ss-count">0</span>
    <span class="ss-arrow">›</span>
  </div>
  <div class="pick-label">— 어느 손금을 볼지 골라보렴 —</div>
  <div class="line-list" id="line-list"></div>
</div>

<!-- 탐색 -->
<div id="screen-explore">
  <div class="ex-header">
    <button class="back-btn" onclick="goMain()">‹</button>
    <div class="ex-title" id="ex-title"></div>
    <div class="ex-step" id="ex-step"></div>
  </div>
  <div class="ex-progress"><div class="ex-progress-fill" id="ex-progress-fill"></div></div>
  <div class="ex-body" id="ex-body"></div>
</div>

<!-- 앱인토스 하단 배너 광고 (TossAds) -->
<div id="ad-banner"></div>

<!-- 팝업 -->
<div id="popup" onclick="if(event.target===this)closePopup()">
  <div class="sheet">
    <div class="p-handle"></div>
    <div class="p-canvas-wrap"><canvas class="p-canvas" id="p-canvas" width="324" height="450"></canvas></div>
    <div class="p-name" id="p-name"></div>
    <div class="p-src" id="p-src"></div>
    <div class="p-tags" id="p-tags"></div>
    <div id="p-texts"></div>
    <button class="close-btn" onclick="closePopup()">닫기</button>
  </div>
</div>

</div><!-- /app-shell -->

let APP_DATA = { meta:{canvasW:648,canvasH:900}, trees:[], cards:{} };

// 데이터 파일명 (이것만 갈아끼우면 앱 전체가 업데이트됨)
const DATA_FILE = "songgeum_data.json";

// 트리에디터 출력 형식(allCards 배열) → 앱 형식(cards dict)으로 변환
function buildAppData(raw){
  const cards = {};
  (raw.allCards || []).forEach(c=>{
    cards[c.id] = {
      id: c.id,
      name: c.name || "",
      source: c.source || "",
      texts: c.texts || [],
      // 5단 필드 (에디터에서 채운 새 구조)
      subtitle: c.subtitle || "",
      body: c.body || "",
      caution: c.caution || "",
      advice: c.advice || "",
      scores: c.scores || {},
      tags: c.tags || [],
      specialTags: c.specialTags || [],
      mbti_EI: c.mbti_EI||"", mbti_SN: c.mbti_SN||"", mbti_TF: c.mbti_TF||"", mbti_JP: c.mbti_JP||"",
      pts: c.pts || [],
      color: c.color || "#c9a96e",
      lw: c.lw != null ? c.lw : 15,
      mode: c.mode || "line",
      opacity: c.opacity != null ? c.opacity : 1,
      sineAmp: c.sineAmp != null ? c.sineAmp : 3,
      sineFreq: c.sineFreq != null ? c.sineFreq : 18,
      stairH: c.stairH != null ? c.stairH : 5,
      stairW: c.stairW != null ? c.stairW : 5,
      stairG: c.stairG != null ? c.stairG : 0,
      mergedShapes: c.mergedShapes || undefined,
      bSize: c.bSize, bCount: c.bCount, bSpread: c.bSpread,
      fineN: c.fineN, endCap: c.endCap, tipShape: c.tipShape,
    };
  });
  return {
    meta: { canvasW:648, canvasH:900 },
    trees: raw.trees || [],
    cards: cards,
  };
}

// 데이터를 불러온 뒤 앱 시작
async function loadDataThenInit(){
  if(APP_DATA.trees && APP_DATA.trees.length){ init(); return; } // 이미 로드됨
  try{
    const res = await fetch(DATA_FILE, {cache:"no-store"});
    if(!res.ok) throw new Error("fetch fail "+res.status);
    const raw = await res.json();
    APP_DATA = buildAppData(raw);
    init();
  }catch(e){
    // 로컬 file:// 등으로 fetch가 막힌 경우 → 불러오기 안내 화면
    showLoadPrompt();
  }
}

// 사용자가 직접 tree.json을 고르게 하는 안내 화면
function showLoadPrompt(){
  const ld = document.getElementById('loading');
  ld.innerHTML = `
    <div style="text-align:center;max-width:320px;padding:0 20px;">
      <div style="font-size:22px;letter-spacing:4px;margin-bottom:18px;">스스로 찾는 내 손금</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.9;letter-spacing:0;margin-bottom:24px;">
        손금 데이터를 불러와 주세요.<br>트리 에디터에서 만든 tree.json 파일을 골라주시면 됩니다.
      </div>
      <label class="load-data-btn">
        📂 tree.json 불러오기
        <input type="file" accept=".json,application/json" style="display:none" onchange="onPickDataFile(event)">
      </label>
      <div style="font-size:11px;color:var(--goldDim);margin-top:18px;letter-spacing:0;line-height:1.7;">
        (서버나 앱에서는 자동으로 불러와집니다)
      </div>
    </div>`;
}

// 파일 선택으로 데이터 불러오기
function onPickDataFile(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const raw = JSON.parse(e.target.result);
      APP_DATA = buildAppData(raw);
      const ld = document.getElementById('loading');
      ld.innerHTML = '스스로 찾는 내 손금';
      init();

      alert('파일을 읽지 못했어요. tree.json 형식이 맞는지 확인해주세요.\n\n'+err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

// 배경을 밝게 처리: 흰 바탕 + 진한 선 → 캔버스에 미리 렌더
function prepBg(){
  const off = document.createElement('canvas');
  off.width = CW; off.height = CH;
  const octx = off.getContext('2d');
  // 밝은 베이지 바탕
  octx.fillStyle = '#f2ede3';
  octx.fillRect(0,0,CW,CH);
  octx.drawImage(bgImg,0,0,CW,CH);
  bgBright = off;
}

let ctx, scale;
function applyCurve(ps){ctx.moveTo(ps[0].x,ps[0].y);if(ps.length===2){ctx.lineTo(ps[1].x,ps[1].y);return;}for(let i=0;i<ps.length-1;i++){const p0=ps[Math.max(i-1,0)],p1=ps[i],p2=ps[i+1],p3=ps[Math.min(i+2,ps.length-1)];ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y);}}
function drawBrush(pts,c,bSize,bCount,bSpread,alpha){if(pts.length<2)return;const n=parseInt(bCount)||5,sp=parseInt(bSpread)||12;ctx.save();for(let k=0;k<n;k++){const off=(k-(n-1)/2)*(sp*scale/n);ctx.strokeStyle=c;ctx.lineWidth=Math.max(0.4,(bSize*scale/n)*0.7);ctx.lineCap="round";ctx.globalAlpha=alpha*(0.25+Math.random()*0.45);ctx.setLineDash([Math.random()*5+2,Math.random()*7+2]);ctx.beginPath();const ps2=pts.map(p=>({x:p.x*scale,y:p.y*scale+off+(Math.random()-0.5)*sp*scale*0.25}));ctx.moveTo(ps2[0].x,ps2[0].y);ps2.forEach((p,i)=>{if(i>0)ctx.lineTo(p.x,p.y);});ctx.stroke();}ctx.setLineDash([]);ctx.restore();}
function drawFineLines(ps,c,w,alpha){const n=4,sp=w*scale*0.85;ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=c;ctx.lineCap="round";for(let k=0;k<n;k++){const off=(k-(n-1)/2)*sp;ctx.lineWidth=Math.max(0.4,w*scale*0.28);ctx.setLineDash([]);ctx.beginPath();const sh=ps.map(p=>({x:p.x,y:p.y+off}));ctx.moveTo(sh[0].x,sh[0].y);sh.forEach((p,i)=>{if(i>0)ctx.lineTo(p.x,p.y);});ctx.stroke();}ctx.restore();}
// 붓글씨(테이퍼) 선: 시작은 fromRatio*폭, 끝은 toRatio*폭으로 점점 가늘어짐 (피커 v59 이식)
function drawTaperLine(ps, c, baseW, alpha, smooth, fromRatio, toRatio, both){
  if(ps.length<2) return;
  const fr = (fromRatio!=null?fromRatio:1.0);
  const tr = (toRatio!=null?toRatio:0.05);
  let path=[];
  if(smooth && ps.length>2){
    const steps=14;
    for(let i=0;i<ps.length-1;i++){
      const p0=ps[Math.max(i-1,0)],p1=ps[i],p2=ps[i+1],p3=ps[Math.min(i+2,ps.length-1)];
      const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      for(let t=0;t<=steps;t++){
        const u=t/steps, mt=1-u;
        const x=mt*mt*mt*p1.x+3*mt*mt*u*c1x+3*mt*u*u*c2x+u*u*u*p2.x;
        const y=mt*mt*mt*p1.y+3*mt*mt*u*c1y+3*mt*u*u*c2y+u*u*u*p2.y;
        if(t>0||i===0) path.push({x,y});
      }
    }
  } else {
    const steps=10;
    for(let i=0;i<ps.length-1;i++){
      for(let t=0;t<=steps;t++){
        const u=t/steps;
        if(t>0||i===0) path.push({x:ps[i].x+(ps[i+1].x-ps[i].x)*u, y:ps[i].y+(ps[i+1].y-ps[i].y)*u});
      }
    }
  }
  if(path.length<2) return;
  let segLen=[], total=0;
  for(let i=1;i<path.length;i++){const dx=path[i].x-path[i-1].x,dy=path[i].y-path[i-1].y;const l=Math.sqrt(dx*dx+dy*dy);segLen.push(l);total+=l;}
  if(!total) return;
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=c;ctx.lineCap="round";ctx.lineJoin="round";ctx.setLineDash([]);
  let acc=0;
  for(let i=1;i<path.length;i++){
    const tStart=acc/total; acc+=segLen[i-1]; const tEnd=acc/total; const tMid=(tStart+tEnd)/2;
    let ratio;
    if(both){ ratio = tr + (1-tr)*Math.sin(Math.PI*tMid); }
    else { ratio = fr+(tr-fr)*Math.pow(tMid,1.4); }
    ctx.lineWidth=Math.max(0.3, baseW*ratio);
    ctx.beginPath(); ctx.moveTo(path[i-1].x,path[i-1].y); ctx.lineTo(path[i].x,path[i].y); ctx.stroke();
  }
  ctx.restore();
}
function drawShape(s,alpha){
  if(!s.pts||s.pts.length===0)return;
  const ps=s.pts.map(p=>({x:p.x*scale,y:p.y*scale})),c=s.color,w=s.lw,m=s.mode;
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w*scale;ctx.lineCap="round";ctx.lineJoin="round";
  if(m==="straight"){ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(ps[0].x,ps[0].y);ps.forEach((p,i)=>{if(i>0)ctx.lineTo(p.x,p.y);});ctx.stroke();}
  else if(m==="curve"){ctx.setLineDash([]);ctx.beginPath();applyCurve(ps);ctx.stroke();}
  else if(m==="taper_curve"||m==="taper_both"){
    const toRatio = (s.taperTo!=null) ? s.taperTo : 0.05;
    drawTaperLine(ps, c, w*scale, alpha, true, s.taperFrom, toRatio, m==="taper_both");
  }
  else if(m==="tip_branch"||m==="tip_feather"||m==="tip_feather_up"||m==="tip_feather_both"||m==="tip_broom"){
    // 본선은 곡선으로 그리기
    ctx.setLineDash([]);ctx.beginPath();applyCurve(ps);ctx.stroke();
    if(ps.length<2) {ctx.restore();return;}
    // 끝점과 끝방향 계산
    const ep=ps[ps.length-1];
    const pp=ps[ps.length-2];
    const ang=Math.atan2(ep.y-pp.y, ep.x-pp.x);
    const blen=w*scale*4.5; // 가지 길이
    ctx.lineWidth=Math.max(0.8, w*scale*0.55);
    if(m==="tip_branch"){
      // 분기: Y자형 - 비대칭 곡선 2갈래 (더 길게)
      const blen2 = blen * 1.8;
      const angles=[ang-0.5, ang+0.65]; // 비대칭 각도
      const curves=[0.3, -0.25]; // 각 가지의 휘는 방향 (비대칭)
      angles.forEach((a, idx)=>{
        const ex = ep.x + Math.cos(a)*blen2;
        const ey = ep.y + Math.sin(a)*blen2;
        // 제어점: 가지 중간에서 옆으로 휘게
        const cx = ep.x + Math.cos(a)*blen2*0.5 + Math.cos(a+Math.PI/2)*blen2*curves[idx];
        const cy = ep.y + Math.sin(a)*blen2*0.5 + Math.sin(a+Math.PI/2)*blen2*curves[idx];
        ctx.beginPath();
        ctx.moveTo(ep.x, ep.y);
        ctx.quadraticCurveTo(cx, cy, ex, ey);
        ctx.stroke();
      });
    } else if(m==="tip_feather"||m==="tip_feather_up"||m==="tip_feather_both"){
      // 지선: 4개, 간격 2배, 비대칭 곡선
      const nx=-Math.sin(ang), ny=Math.cos(ang); // 법선벡터 (위쪽)
      const flen = blen * 1.4;
      const spacing = blen * 1.0;
      const count = 4;
      const drawSide = (side)=>{ // side: 1=아래(-nx), -1=위(+nx)
        for(let i=0; i<count; i++){
          const bx = ep.x - Math.cos(ang)*spacing*i;
          const by = ep.y - Math.sin(ang)*spacing*i;
          const ex = bx + nx*flen*side + Math.cos(ang)*flen*0.35;
          const ey = by + ny*flen*side + Math.sin(ang)*flen*0.35;
          const cx = bx + nx*flen*0.5*side + Math.cos(ang)*flen*0.1;
          const cy = by + ny*flen*0.5*side + Math.sin(ang)*flen*0.1;
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.quadraticCurveTo(cx, cy, ex, ey);
          ctx.stroke();
        }
      };
      if(m==="tip_feather") drawSide(-1);       // 아래지선
      else if(m==="tip_feather_up") drawSide(1); // 위지선
      else { drawSide(1); drawSide(-1); }        // 위아래지선
    } else if(m==="tip_broom"){
      // 빗자루: 끝에서 부채꼴로 4~5갈래 퍼짐
      const spread=0.9;
      const count=5;
      for(let i=0;i<count;i++){
        const a=ang - spread/2 + spread*(i/(count-1));
        const len=blen*(0.7+0.3*(1-Math.abs(i-(count-1)/2)/((count-1)/2+0.5)));
        ctx.beginPath();
        ctx.moveTo(ep.x, ep.y);
        ctx.lineTo(ep.x+Math.cos(a)*len, ep.y+Math.sin(a)*len);
        ctx.stroke();
      }
    }
  }
  else if(m==="dash_straight"){ctx.setLineDash([6*scale,4*scale]);ctx.beginPath();ctx.moveTo(ps[0].x,ps[0].y);ps.forEach((p,i)=>{if(i>0)ctx.lineTo(p.x,p.y);});ctx.stroke();ctx.setLineDash([]);}
  else if(m==="dash_curve"){ctx.setLineDash([6*scale,4*scale]);ctx.beginPath();applyCurve(ps);ctx.stroke();ctx.setLineDash([]);}
  else if(m==="fine_straight"||m==="fine_curve"){ctx.restore();drawFineLines(ps,c,w,alpha);return;}
  else if(m==="sine_curve"||m==="sine_straight"){
    const ampMul=s.sineAmp||1.5;
    const freqPx=s.sineFreq||26;
    const amp=w*scale*ampMul, wlen=freqPx*scale;
    ctx.lineWidth=w*scale;

    function drawWave(waveFunc){
      ctx.beginPath();
      for(let i=0;i<ps.length-1;i++){
        const p1=ps[i],p2=ps[i+1];
        const dx=p2.x-p1.x,dy=p2.y-p1.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const ang=Math.atan2(dy,dx);
        const nx=-Math.sin(ang),ny=Math.cos(ang);
        const steps=Math.max(10,Math.round(dist*3));
        for(let s=0;s<=steps;s++){
          const t=s/steps, along=t*dist;
          const off=waveFunc(along);
          const x=p1.x+Math.cos(ang)*along+nx*off;
          const y=p1.y+Math.sin(ang)*along+ny*off;
          if(s===0&&i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
      }
      ctx.stroke();
    }

    ctx.setLineDash([]);
    // sin 파 그리기
    drawWave(d=>amp*Math.sin((d/wlen)*Math.PI*2));
    // cos 파 겹쳐 그리기 (반투명)
    ctx.globalAlpha=alpha*0.6;
    drawWave(d=>-amp*Math.sin((d/wlen)*Math.PI*2));
    ctx.globalAlpha=alpha;
  }
  else if(m==="break_straight"||m==="break_curve"){
    ctx.setLineDash([]);
    const shMul=s.stairH||5;
    const swMul=s.stairW||5;
    const gapPx=s.stairG!==undefined?s.stairG:0;
    const sh=w*scale*shMul, sw=w*scale*swMul, gap=gapPx*scale;
    if(ps.length>=2){
      for(let i=0;i<ps.length-1;i++){
        const p1=ps[i],p2=ps[i+1];
        const dx=p2.x-p1.x,dy=p2.y-p1.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const ang=Math.atan2(dy,dx);
        const nx=-Math.sin(ang),ny=Math.cos(ang);
        const steps=Math.max(2,Math.round(dist/sw));
        let flip=1;
        for(let s=0;s<steps;s++){
          const t1=s/steps, t2=(s+0.5)/steps, t3=(s+1)/steps;
          const ax=p1.x+dx*t1,  ay=p1.y+dy*t1;
          const bx=p1.x+dx*t2,  by=p1.y+dy*t2;
          const cx2=p1.x+dx*t3, cy2=p1.y+dy*t3;
          // 간격(끊김) 적용
          const gapRatio = gap/(sw*2);
          const t1g = t1+gapRatio/steps, t3g = t3-gapRatio/steps;
          const axg=p1.x+dx*t1g, ayg=p1.y+dy*t1g;
          const cx2g=p1.x+dx*Math.max(t1,t3g), cy2g=p1.y+dy*Math.max(t1,t3g);
          ctx.beginPath();
          ctx.moveTo(axg, ayg);
          ctx.lineTo(bx, by);
          ctx.lineTo(bx+nx*sh*flip, by+ny*sh*flip);
          ctx.lineTo(cx2g+nx*sh*flip, cy2g+ny*sh*flip);
          ctx.stroke();
          flip*=-1;
        }
      }
    }
  }
  else if(m==="oval_empty"){if(ps.length>=2){const cx=(ps[0].x+ps[1].x)/2,cy=(ps[0].y+ps[1].y)/2,rx=Math.max(Math.abs(ps[1].x-ps[0].x)/2,4),ry=Math.max(Math.abs(ps[1].y-ps[0].y)/2,4);ctx.setLineDash([]);ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();}}
  else if(m==="oval_dash"){if(ps.length>=2){const cx=(ps[0].x+ps[1].x)/2,cy=(ps[0].y+ps[1].y)/2,rx=Math.max(Math.abs(ps[1].x-ps[0].x)/2,4),ry=Math.max(Math.abs(ps[1].y-ps[0].y)/2,4);ctx.setLineDash([6*scale,4*scale]);ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}}
  else if(m==="oval_filled"){if(ps.length>=2){const cx=(ps[0].x+ps[1].x)/2,cy=(ps[0].y+ps[1].y)/2,rx=Math.max(Math.abs(ps[1].x-ps[0].x)/2,4),ry=Math.max(Math.abs(ps[1].y-ps[0].y)/2,4);ctx.setLineDash([]);ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.stroke();}}
  else if(m==="brush"){ctx.restore();drawBrush(s.pts,c,s.brushSize||8,s.brushCount||5,s.brushSpread||12,alpha);return;}
  else if(m==="dot_empty"||m==="dot_filled"||m==="cross_single"||m==="cross_double"){
    const sz=(s.dotSize||8)*scale;
    const gap=(s.dotGap||12)*scale;
    ctx.setLineDash([]);
    ps.forEach(p=>{
      const sz2=(s.dotSize2!=null?s.dotSize2:(s.dotSize||8)/2)*scale;
      const rot=s.dotRot||0;
      if(m==="dot_empty"){
        ctx.beginPath();ctx.ellipse(p.x,p.y,sz,sz2,rot,0,Math.PI*2);ctx.stroke();
      } else if(m==="dot_filled"){
        ctx.beginPath();ctx.ellipse(p.x,p.y,sz,sz2,rot,0,Math.PI*2);ctx.fill();ctx.stroke();
      } else if(m==="cross_single"){
        ctx.beginPath();
        ctx.moveTo(p.x-sz,p.y);ctx.lineTo(p.x+sz,p.y);
        ctx.moveTo(p.x,p.y-sz);ctx.lineTo(p.x,p.y+sz);
        ctx.stroke();
      } else if(m==="cross_double"){
        // 첫번째 십자
        ctx.beginPath();
        ctx.moveTo(p.x-sz,p.y-gap/2);ctx.lineTo(p.x+sz,p.y-gap/2);
        ctx.moveTo(p.x,p.y-gap/2-sz);ctx.lineTo(p.x,p.y-gap/2+sz);
        ctx.stroke();
        // 두번째 십자
        ctx.beginPath();
        ctx.moveTo(p.x-sz,p.y+gap/2);ctx.lineTo(p.x+sz,p.y+gap/2);
        ctx.moveTo(p.x,p.y+gap/2-sz);ctx.lineTo(p.x,p.y+gap/2+sz);
        ctx.stroke();
      }
    });
  }
  else if(m==="text_only"){
    if(ps.length>=1){
      ctx.font=`bold ${Math.round(14*scale)}px sans-serif`;
      const txt=s.texts&&s.texts[0]?s.texts[0]:(s.text||"");
      if(txt){
        ctx.fillText(txt,ps[0].x,ps[0].y);
      } else {
        // 텍스트 없으면 작은 T 마커 표시
        ctx.globalAlpha=alpha*0.5;
        ctx.strokeStyle=c;ctx.lineWidth=1.5*scale;
        ctx.beginPath();
        ctx.moveTo(ps[0].x-6*scale,ps[0].y-8*scale);ctx.lineTo(ps[0].x+6*scale,ps[0].y-8*scale);
        ctx.moveTo(ps[0].x,ps[0].y-8*scale);ctx.lineTo(ps[0].x,ps[0].y+4*scale);
        ctx.stroke();
        ctx.globalAlpha=alpha;
      }
    }
  }
  else { /* 미지원 모드 안전망 */
    if(ps.length>=2){ctx.setLineDash([]);ctx.beginPath();applyCurve(ps);ctx.stroke();}
    else if(ps.length===1){ctx.beginPath();ctx.arc(ps[0].x,ps[0].y,Math.max(1,w*scale*0.5),0,Math.PI*2);ctx.fill();}
  }
  ctx.restore();
}

function renderCard(canvas, card){
  ctx = canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  scale = W/CW;
  ctx.clearRect(0,0,W,H);
  if(bgBright){ ctx.drawImage(bgBright,0,0,W,H); }
  else if(bgReady){ ctx.drawImage(bgImg,0,0,W,H); }
  const shapes=[];
  (card.mergedShapes||[]).forEach(s=>{ if(s&&s.type!=='bg') shapes.push(s); });
  if(shapes.length>0){
    shapes.forEach(s=>drawShape(s,(s.opacity!=null?s.opacity:1)));
  }else{
    drawShape({pts:card.pts,color:card.color,lw:card.lw,mode:card.mode,opacity:card.opacity,
      texts:card.texts,text:card.texts&&card.texts[0],sineAmp:card.sineAmp,sineFreq:card.sineFreq,
      stairH:card.stairH,stairW:card.stairW,stairG:card.stairG},(card.opacity!=null?card.opacity:1));
  }
}



// ===== 합성 손금 렌더링: 카드마다 '담당 구간'만 진하게, 나머지는 연하게 =====
// ▼ 튜닝 노브 (구간은 선 길이 0~1 기준)
const MERGE_CFG = {
  faint: 0.15,         // 연하게(담당 아님) 불투명도
  solid: 1.0,          // 진하게(담당 구간) 불투명도
  branchAlpha: 0.6,    // 지선·2중선 카드 표시 농도
  front: [0.00, 0.42], // 출발 카드 → 앞(왼쪽) 구간
  mid:   [0.30, 0.72], // 모양 카드 → 가운데 구간
  back:  [0.58, 1.00], // 끝 카드 → 뒤(오른쪽) 구간
  ramp:  0.05          // 구간 경계 번짐 폭(부드럽게)
};
const MARK_MODES = ['oval_filled','oval_empty','dot_filled','dot_empty','cross_single','cross_double','point'];

// 질문 이름(+태그)으로 역할 분류
function roleFromQuestion(q, card){
  q = q || '';
  const hay = q + ' ' + ((card&&card.tags)?card.tags.join(' '):'') + ' ' + ((card&&card.name)||'');
  if(card && MARK_MODES.includes(card.mode)) return 'mark';
  if(/지선|갈라/.test(hay)) return 'branch';
  if(/이중|2중|쌍/.test(hay)) return 'overlay';
  if(/출발|시작/.test(q)) return 'front';
  if(/끝/.test(q)) return 'back';
  return 'mid'; // 모양·곡선·직선·사인 등
}

// 점 순서를 '선마다 다른 시작점'부터 0→1이 되도록 정규화
// axis: 'x'(가로선)/'y'(세로선),  from: 'min'/'max' (시작이 어느 끝인지)
const LINE_START = {
  '감정선': { axis:'x', from:'min' },  // 왼쪽 시작
  '두뇌선': { axis:'x', from:'max' },  // 오른쪽(검지 아래) 시작
  '지능선': { axis:'x', from:'max' },  // (두뇌선 별칭)
  '생명선': { axis:'y', from:'min' },  // 위(검지 쪽)→손목 아래로  ※'왼쪽'이면 알려주오
  '운명선': { axis:'y', from:'max' },  // 아래 시작
  '태양선': { axis:'y', from:'max' },  // 아래(지구) 시작
  '재운선': { axis:'y', from:'max' },  // 아래 시작
  '결혼선': { axis:'x', from:'max' }   // 소지(오른쪽) 시작
};
const DEFAULT_START = { axis:'x', from:'min' };
function lineOf(card){
  const tags=(card&&card.tags)||[];
  for(const ln in LINE_START){ if(tags.some(t=>t&&t.indexOf(ln)>=0)) return ln; }
  return null;
}
function startCfg(card){ const ln=lineOf(card); return (ln&&LINE_START[ln])||DEFAULT_START; }
function normDir(ps, cfg){
  if(ps.length<2) return ps;
  cfg = cfg || DEFAULT_START;
  const k=cfg.axis;
  const firstIsMin = ps[0][k] <= ps[ps.length-1][k];
  const wantFirstMin = (cfg.from==='min');
  return (firstIsMin !== wantFirstMin) ? ps.slice().reverse() : ps;
}
// Catmull-Rom 촘촘 샘플링 (2점이면 직선)
function densePoints(ps){
  if(!ps || ps.length<2) return ps?ps.slice():[];
  const out=[], SUB=16;
  for(let i=0;i<ps.length-1;i++){
    const p0=ps[Math.max(i-1,0)],p1=ps[i],p2=ps[i+1],p3=ps[Math.min(i+2,ps.length-1)];
    for(let k=0;k<SUB;k++){
      const u=k/SUB,u2=u*u,u3=u2*u;
      out.push({
        x:0.5*((2*p1.x)+(-p0.x+p2.x)*u+(2*p0.x-5*p1.x+4*p2.x-p3.x)*u2+(-p0.x+3*p1.x-3*p2.x+p3.x)*u3),
        y:0.5*((2*p1.y)+(-p0.y+p2.y)*u+(2*p0.y-5*p1.y+4*p2.y-p3.y)*u2+(-p0.y+3*p1.y-3*p2.y+p3.y)*u3)
      });
    }
  }
  out.push(ps[ps.length-1]); return out;
}
// 위치 t(0~1)와 역할로 불투명도 결정 (담당 구간=진하게)
function bandAlpha(t, role){
  const C=MERGE_CFG, r=C.ramp, band=C[role];
  if(!band) return C.faint;
  const a=band[0], b=band[1];
  let f;
  if(t < a-r || t > b+r) f=0;
  else if(t < a) f=(t-(a-r))/r;
  else if(t > b) f=((b+r)-t)/r;
  else f=1;
  f=Math.max(0,Math.min(1,f));
  return C.faint + (C.solid - C.faint)*f;
}
// 주선을 구간별 농도로 긋기
function strokeProfiled(ps, color, w, role, cfg){
  const dense=densePoints(normDir(ps, cfg));
  if(dense.length<2) return;
  const seg=[]; let total=0;
  for(let i=1;i<dense.length;i++){ const d=Math.hypot(dense[i].x-dense[i-1].x, dense[i].y-dense[i-1].y); seg.push(d); total+=d; }
  if(!total) return;
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=w*scale; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.setLineDash([]);
  let acc=0;
  for(let i=1;i<dense.length;i++){
    const t=(acc + seg[i-1]/2)/total; acc+=seg[i-1];
    ctx.globalAlpha=bandAlpha(t, role);
    ctx.beginPath(); ctx.moveTo(dense[i-1].x*scale,dense[i-1].y*scale); ctx.lineTo(dense[i].x*scale,dense[i].y*scale); ctx.stroke();
  }
  ctx.restore();
}
// 합성 렌더: 주선(구간별) 먼저, 지선·2중선·점무늬는 위에 얹기
function renderMerged(canvas, items){
  ctx = canvas.getContext('2d');
  const W=canvas.width,H=canvas.height; scale=W/CW;
  ctx.clearRect(0,0,W,H);
  if(bgBright){ ctx.drawImage(bgBright,0,0,W,H); } else if(bgReady){ ctx.drawImage(bgImg,0,0,W,H); }
  const overlays=[];
  items.forEach(it=>{
    const card=it.card; if(!card) return;
    const role=roleFromQuestion(it.question, card);
    if(role==='mark'||role==='branch'||role==='overlay'){ overlays.push({card,role}); return; }
    if(card.pts && card.pts.length>=2) strokeProfiled(card.pts, card.color||'#E24B4A', card.lw||5, role, startCfg(card));
  });
  overlays.forEach(({card,role})=>{
    const a=(role==='mark')?(card.opacity!=null?card.opacity:1):MERGE_CFG.branchAlpha;
    const shapes=[]; (card.mergedShapes||[]).forEach(s=>{ if(s&&s.type!=='bg') shapes.push(s); });
    if(shapes.length>0){ shapes.forEach(s=>drawShape(s,(s.opacity!=null?s.opacity:1)*a)); }
    else drawShape({pts:card.pts,color:card.color,lw:card.lw,mode:card.mode,opacity:card.opacity,texts:card.texts,text:card.texts&&card.texts[0],sineAmp:card.sineAmp,sineFreq:card.sineFreq,stairH:card.stairH,stairW:card.stairW,stairG:card.stairG}, a);
  });
}

// 여러 카드를 한 캔버스에 겹쳐 그리기 (종합 손그림)
function renderMulti(canvas, cards){
  ctx = canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  scale = W/CW;
  ctx.clearRect(0,0,W,H);
  if(bgBright){ ctx.drawImage(bgBright,0,0,W,H); }
  else if(bgReady){ ctx.drawImage(bgImg,0,0,W,H); }
  cards.forEach(card=>{
    const shapes=[];
    (card.mergedShapes||[]).forEach(s=>{ if(s&&s.type!=='bg') shapes.push(s); });
    if(shapes.length>0){
      shapes.forEach(s=>drawShape(s,(s.opacity!=null?s.opacity:1)));
    }else{
      drawShape({pts:card.pts,color:card.color,lw:card.lw,mode:card.mode,opacity:card.opacity,
        texts:card.texts,text:card.texts&&card.texts[0],sineAmp:card.sineAmp,sineFreq:card.sineFreq,
        stairH:card.stairH,stairW:card.stairW,stairG:card.stairG},(card.opacity!=null?card.opacity:1));
    }
  });
}

// 저장 키
const SAVE_KEY='songgeum_saved_v1';
function loadSaved(){
  try{ const raw=localStorage.getItem(SAVE_KEY); return raw?JSON.parse(raw):[]; }
  catch(e){ return []; }
}
function persistSaved(list){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(list)); return true; }
  catch(e){ return false; }
}

// 결과 저장 (localStorage)
function saveResult(){
  if(!picked.length){ alert('고른 손금이 없구나.'); return; }
  const entry={
    id:'r_'+Date.now(),
    line:curLine?curLine.name:'',
    date:new Date().toISOString(),
    summary:buildSummary(picked),
    scores:sumScores(picked.map(p=>p.card)),
    cardIds:picked.map(p=>p.card.id),
    questions:picked.map(p=>p.question),
  };
  const list=loadSaved();
  list.unshift(entry);
  const ok=persistSaved(list);
  if(ok){
    showToast('할머니가 자네 손금을 잘 적어두었단다 ✦');
  } else {
    alert('저장 공간을 쓸 수 없는 환경이구나.\n앱으로 설치하면 저장이 된단다.\n지금은 「이미지로 저장」을 써보렴.');
  }
}

// 토스트 알림
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:rgba(28,24,19,.97);border:1px solid var(--gold);color:var(--gold2);padding:12px 22px;border-radius:24px;font-size:13px;z-index:400;opacity:0;transition:.3s;font-family:"Gowun Batang",serif;letter-spacing:1px;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:300px;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  requestAnimationFrame(()=>{ t.style.opacity='1'; });
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{ t.style.opacity='0'; },2200);
}

// 합산 점수(절대값)로 구간 단계(0~5) 결정. |v|<2면 -1(멘트 없음)
function gaugeLevel(absV){
  if(absV>=12) return 5;
  if(absV>=10) return 4;
  if(absV>=8)  return 3;
  if(absV>=6)  return 2;
  if(absV>=4)  return 1;
  if(absV>=2)  return 0;
  return -1;
}
// 합산 점수 객체 → 구간별 할머니 멘트 배열 (점수 높은 순)
function gaugeComments(total){
  const items=SCORE_AXES.map(a=>({axis:a,val:total[a]||0})).filter(it=>it.val!==0);
  // 절대값 큰 순 → 같으면 양수 먼저
  items.sort((a,b)=>Math.abs(b.val)-Math.abs(a.val) || b.val-a.val);
  const out=[];
  items.forEach(it=>{
    const lvl=gaugeLevel(Math.abs(it.val));
    if(lvl<0) return;
    const tbl=GAUGE_COMMENTS[it.axis];
    if(!tbl) return;
    const arr=it.val>0?tbl.pos:tbl.neg;
    if(arr&&arr[lvl]) out.push(arr[lvl]);
  });
  return out;
}
// 합산 점수 → 게이지 기반 할머니 총평 문단 생성
function buildGaugeSummary(total){
  const comments=gaugeComments(total);
  if(!comments.length) return '';
  return comments.join(' ');
}


// 카드 묶음의 점수를 축별로 합산
function sumScores(cards){
  const total={};
  SCORE_AXES.forEach(a=>total[a]=0);
  (cards||[]).forEach(c=>{
    const s=c&&c.scores;
    if(s){ SCORE_AXES.forEach(a=>{ if(typeof s[a]==='number') total[a]+=s[a]; }); }
  });
  return total;
}

const MBTI_AXES_APP = [
  {keyL:'E',keyR:'I',field:'mbti_EI',labL:'외향 E',labR:'내향 I',
   descL:'사람들과 어울리며 바깥에서 기운을 얻는 사람이지',
   descR:'혼자 조용히 있을 때 기운이 차오르는 사람이란다'},

   descL:'눈에 보이는 사실과 경험을 믿고 현실에 발붙인 사람이지',
   descR:'보이지 않는 뜻과 가능성을 읽어내는 상상력 깊은 사람이란다'},
  {keyL:'T',keyR:'F',field:'mbti_TF',labL:'사고 T',labR:'감정 F',

   descR:'흐름에 맞춰 자유롭고 유연하게 사는 사람이란다'},
];
// 미니 할머니 (눈 깜박임 + 손 흔들기) 한 조각
function halmoniMini(extraClass){ return `<span class="halmoni-mini ${extraClass||''}">${HALMONI_MINI}</span>`; }
// MBTI 확정 정도에 따른 마스코트: 4축 확정=1마리, 3축 확정=후보 2마리
function buildMbtiMascot(letters){
  const known = letters.filter(x=>x).length;
  const svg=(type,cls)=>{ const s=MBTI_MASCOT[type]; return s?`<div class="mbti-mascot ${cls||''}">${s}</div>`:''; };
  if(known===4){
    const m=svg(letters.join(''),'solo');
    return m?`<div class="mbti-mascot-wrap">${m}</div>`:'';
  }
  if(known===3){
    const idx=letters.findIndex(x=>!x);
    const a=MBTI_AXES_APP[idx];
    const t1=letters.slice(); t1[idx]=a.keyL;
    const t2=letters.slice(); t2[idx]=a.keyR;
    const m1=svg(t1.join('')), m2=svg(t2.join(''));
    return (m1||m2)?`<div class="mbti-mascot-wrap">${m1}${m2}</div>`:'';
  }
  return '';
}
function buildMbtiHTML(cards){
  const tally={}; MBTI_AXES_APP.forEach(a=>tally[a.field]={L:0,R:0});
  (cards||[]).forEach(c=>{ MBTI_AXES_APP.forEach(a=>{ const v=c&&c[a.field]; if(v===a.keyL)tally[a.field].L++; else if(v===a.keyR)tally[a.field].R++; }); });
  let typeStr=''; let any=false; const letters=[];
  const rows=MBTI_AXES_APP.map(a=>{
    const t=tally[a.field], n=t.L+t.R;
    const cnt=`${a.keyL} ${t.L} · ${a.keyR} ${t.R}`;
    if(n===0){ typeStr+='·'; letters.push(null); return ''; }
    any=true;
    if(t.L===t.R){ typeStr+='·'; letters.push(null);
      return `<div class="mbti-row"><div class="mbti-head"><span class="mbti-axis">${a.labL} / ${a.labR}</span><span class="mbti-tally">${cnt}</span></div><div class="mbti-desc mbti-even">${a.keyL}와 ${a.keyR}가 아직 반반이라, 어느 쪽이라 말하긴 이르단다</div></div>`;
    }
    const L=t.L>t.R;
    const letter=L?a.keyL:a.keyR, lab=L?a.labL:a.labR, desc=L?a.descL:a.descR;
    typeStr+=letter; letters.push(letter);
    return `<div class="mbti-row"><div class="mbti-head"><span class="mbti-letter">${letter}</span><span class="mbti-axis">${lab}</span><span class="mbti-tally">${cnt}</span></div><div class="mbti-desc">${desc}</div></div>`;
  }).join('');
  if(!any) return '';
  const typeLine = /[A-Z]/.test(typeStr) ? `<div class="mbti-type">${typeStr}</div>` : '';
  const mascotWrap = buildMbtiMascot(letters);
  return `<div class="mbti-box">
    <div class="mbti-title">\u2726 \uc790\ub124 \uc190\uae08\uc774 \ub9d0\ud558\ub294 \uc131\uc815</div>
    ${mascotWrap}
    ${typeLine}
    ${rows}
    <div class="mbti-hint">\uace0\ub978 \uc190\uae08\uc5d0 \ub2f4\uae34 \uc131\uc815\uc744 MBTI \ub124 \uac08\ub798\ub85c \ubaa8\uc544 \ubcf8 \uac8c\ub780\ub2e4</div>
  </div>`;
}
// 카드 묶음에서 특별 게이지(빨간 배지) 이름별 개수 집계
function countSpecialTags(cards){
  const cnt={};
  (cards||[]).forEach(c=>{
    (c&&c.specialTags||[]).forEach(t=>{ if(t){ cnt[t]=(cnt[t]||0)+1; } });
  });
  return cnt;
}
// 특별 게이지 HTML 생성 (개수만큼 빨간 별, 개수 많은 순 정렬)
function buildSpecialHTML(cards){
  const cnt=countSpecialTags(cards);
  const items=Object.keys(cnt).map(name=>({name,n:cnt[name]}));
  if(!items.length) return '';
  items.sort((a,b)=>b.n-a.n);
  const rows=items.map(it=>{
    const stars=Array.from({length:it.n},()=>'<span class="special-star">★</span>').join('');
    return `<div class="special-row">
      <div class="special-name">${it.name}</div>
      <div class="special-stars">${stars}</div>
      <div class="special-cnt">×${it.n}</div>
    </div>`;
  }).join('');
  return `<div class="special-box">
    <div class="special-title">✦ 자네만의 특별한 기운</div>
    ${rows}
    <div class="special-hint">같은 기운이 여러 번 나올수록 별이 늘어난단다</div>
  </div>`;
}

function buildGaugeHTML(total){
  const items=SCORE_AXES.map(a=>({axis:a,val:total[a]||0})).filter(it=>it.val!==0);
  if(!items.length) return '';
  items.sort((a,b)=>b.val-a.val);
  // 막대 길이 기준: 절대값 최대치를 100%로
  const maxAbs=Math.max(...items.map(it=>Math.abs(it.val)),1);
  const rows=items.map(it=>{
    const pct=Math.round(Math.abs(it.val)/maxAbs*100);
    const pos=it.val>0;
    const barColor=pos?'linear-gradient(90deg,#d4af5a,#e8c878)':'linear-gradient(90deg,#b06a5a,#c98878)';
    const sign=pos?'+':'';
    return `<div class="gauge-row">
      <div class="gauge-label">${it.axis}</div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <div class="gauge-val ${pos?'pos':'neg'}">${sign}${it.val}</div>
    </div>`;
  }).join('');
  return `<div class="gauge-box">
    <div class="gauge-title">✦ 자네 손금의 기운</div>
    ${rows}
    <div class="gauge-hint">고른 손금들의 기운을 모아 본 게란다</div>
  </div>`;
}

function openLine(tree){
  curLine=tree;
  // col1 트리들 중 이 트리가 몇 번째인지 → 같은 순번의 col2 트리를 짝으로 (이름 매칭 폐기)
  const col1List=APP_DATA.trees.filter(t=>t.col===1);
  const col2List=APP_DATA.trees.filter(t=>t.col===2);
  const idx=col1List.findIndex(t=>t.id===tree.id);
  curCol2=(idx>=0 && col2List[idx])?col2List[idx]:null;
  // 질문 평탄화: col1 가지들 + col2 가지들
  questions=[];
  tree.root.children.forEach(br=>{ if((br.cards||[]).length) questions.push({name:br.name,cardIds:br.cards}); });
  if(curCol2){
    curCol2.root.children.forEach(br=>{ if((br.cards||[]).length) questions.push({name:br.name,cardIds:br.cards,col2:true}); });
  }
  qIndex=0; picked=[]; selectedThisQ=null;
  updateTray();
  document.getElementById('tray')?.classList.remove('hidden');
  document.getElementById('screen-main').style.display='none';
  document.getElementById('topbar').style.display='none';
  document.getElementById('screen-explore').style.display='flex';
  document.getElementById('ex-title').textContent=tree.name;
  showQuestion();
  window.scrollTo(0,0);
}

    </div>`;

function selectChoice(el,card,q){
  const grid=document.getElementById('choice-grid');
  const wasSelected=el.classList.contains('selected');
  grid.querySelectorAll('.choice').forEach(c=>c.classList.remove('selected'));
  if(wasSelected){ selectedThisQ=null; }
  else { el.classList.add('selected'); selectedThisQ={card,question:q.name}; }
}

function nextQ(){
  if(selectedThisQ){
    picked=picked.filter(p=>p.question!==selectedThisQ.question);
    picked.push(selectedThisQ);
    updateTray();
  }
  qIndex++;
  showQuestion();
}
function prevQ(){ if(qIndex>0){qIndex--; showQuestion();} }


// 부제목 추출 (할머니 말투 대응)
function extractSubtitle(card){
  const texts=(card.texts||[]).filter(t=>t);
  if(!texts.length) return null;
  const firstLine=texts[0].split('\n')[0].trim();
  // 첫 줄이 짧으면(35자 이하) 부제목으로 사용
  if(firstLine.length<=35) return firstLine;
  // 첫 줄이 길면 두 번째 텍스트가 짧을 때 사용
  if(texts.length>1){
    const second=texts[1].split('\n')[0].trim();
    if(second.length<=35) return second;
  }
  return null;
}
// 부제목 끝 정리 (조사 연결용) — 할머니 말투 어미·접미사 제거
function cleanSub(s){
  let r=s.replace(/[.\u3002!?]+$/,'').trim();
  // 할머니 말투 어미 제거: ~란다, ~이란다, ~단다, ~이지, ~지, ~사람이란다 등
  r=r.replace(/(이란다|란다|단다|이지|구나|는단다|한단다)$/,'').trim();
  // 명사형 접미사 제거
  r=r.replace(/(인\s*사람|한\s*사람|하는\s*사람|좋은\s*사람|이란\s*사람)$/,'').trim();
  r=r.replace(/(인\s*타입|하는\s*타입|한\s*타입)$/,'').trim();
  r=r.replace(/(타입|사람|소유자|경향|성격|스타일|기질|편)$/,'').trim();
  // 끝의 조사 정리
  r=r.replace(/(이고|이며|하며|하고|이라|으로)$/,'').trim();
  return r;
}
// 부제목을 '~한' 관형형으로 보정 (총평 연결용)
function toAdnominal(s){
  // 이미 '~한/는/운/ㄴ' 등으로 끝나면 그대로
  if(/[는은운한]$/.test(s)) return s;
  // 동사/형용사 어간으로 끝나는 흔한 경우 보정
  if(/생각$/.test(s)) return s+'하는';
  if(/행동$/.test(s)) return s+'하는';
  if(/[가-힣]$/.test(s)){
    // 명사로 끝나면 'OO한'이 어색할 수 있어 그대로 두되, 동사성 어휘만 보정
    return s;
  }
  return s;
}
// 총평 생성 (할머니 말투)
function buildSummary(items){
  const subs=items.map(p=>extractSubtitle(p.card)).filter(Boolean);
  if(!subs.length) return null;
  let cleaned=subs.map(cleanSub).filter(s=>s.length>=2);
  if(!cleaned.length) return null;
  // 중복 제거
  const uniq=[...new Set(cleaned)];
  let body;
  if(uniq.length===1){
    body='자네는 '+uniq[0]+' 면모를 지니고 있구나.';
  } else {
    const last=uniq[uniq.length-1];
    const head=uniq.slice(0,-1).join(', ');
    body='자네는 '+head+', 그리고 '+last+'한 면모를 두루 지니고 있구나. 이런 손금이 함께 있으니 참 흥미로운 사람이란다.';
  }
  // '한 면모'가 어색한 경우(이미 '~한/는' 등으로 끝남) 자동 정리
  body=body.replace(/([는은운한])한 면모/g,'$1 면모');
  return body;
}

  }

  function initBanner(){
    const container = document.getElementById('ad-banner');
    if (!container) return;

    // 지원 환경 확인 (토스앱 5.241.0 미만 / 토스앱 밖이면 미지원)
    if (!TossAds || typeof TossAds.initialize !== 'function' ||
        !TossAds.initialize.isSupported || !TossAds.initialize.isSupported()) {
      hideBannerArea();
      return;
    }

    TossAds.initialize({
      callbacks: {
        onInitialized: () => {
          try {
            const attached = TossAds.attachBanner(AD_GROUP_ID, container, {
              theme: 'auto',
              tone: 'blackAndWhite',
              variant: 'expanded',
              callbacks: {
                onAdRendered: () => { showBannerArea(); },
                onAdImpression: () => {},
                onNoFill: () => { hideBannerArea(); },
                onAdFailedToRender: () => { hideBannerArea(); },
              },
            });
            window.__songgeumBanner = attached; // 디버그/정리용
          } catch (e) {
            console.error('attachBanner 실패:', e);
            hideBannerArea();
          }
        },
        onInitializationFailed: (err) => {
          console.error('TossAds 초기화 실패:', err);
          hideBannerArea();
        },
      },
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initBanner);
  } else {
    initBanner();
  }
</script>

</body>
</html>
