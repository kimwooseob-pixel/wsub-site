<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>토정비결 로또</title>
<style>
  :root { --cyan:#00ffff; --purple:#cc00ff; --gold:#ffd700; --green:#00ff00; --bg:#0a0a1a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); }
  body {
    font-family:'Courier New',ui-monospace,monospace; color:#fff; min-height:100vh;
    background:
      radial-gradient(circle at 50% -8%, rgba(255,215,0,0.09), transparent 42%),
      radial-gradient(circle at 100% 100%, rgba(0,255,255,0.07), transparent 40%),
      var(--bg);
    padding:18px 14px 40px; overflow-x:hidden;
  }
  .wrap { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  .eyebrow { font-size:11px; letter-spacing:4px; color:var(--gold); opacity:.85; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:1px; text-shadow:0 0 12px var(--gold),0 0 24px rgba(255,215,0,.35); }
  .sub { font-size:12px; color:#a99; letter-spacing:1px; }
  .card {
    background:#0d0d2b; border:1px solid rgba(255,215,0,.20); border-radius:14px; padding:16px; margin-bottom:16px;
    box-shadow:0 0 18px rgba(0,255,255,.08), inset 0 0 30px rgba(255,215,0,.03);
  }
  .label { font-size:12px; letter-spacing:2px; color:var(--gold); margin-bottom:10px; text-transform:uppercase; }
  .date-row { display:flex; gap:8px; }
  .date-row .fld { flex:1; } .date-row .fld.d3 { flex:1.3; }
  .fld small { display:block; font-size:10px; color:#998; margin-bottom:4px; letter-spacing:1px; }
  select {
    width:100%; background:#07071a; border:1px solid rgba(255,215,0,.3); color:#eee2bd; border-radius:9px;
    padding:11px 8px; font-family:inherit; font-size:15px; appearance:none; text-align:center;
  }
  select:focus { outline:none; border-color:var(--gold); box-shadow:0 0 10px rgba(255,215,0,.4); }
  .run-btn {
    width:100%; margin-top:14px; background:linear-gradient(180deg,#241a0a,#140d05);
    border:1.5px solid var(--gold); color:#fff; border-radius:12px; padding:16px;
    font-family:inherit; font-size:17px; font-weight:bold; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,215,0,.3); text-shadow:0 0 10px var(--gold); transition:all .15s;
  }
  .run-btn:active { transform:scale(.98); }

  .gua-code {
    text-align:center; font-size:30px; letter-spacing:8px; color:var(--gold);
    text-shadow:0 0 14px rgba(255,215,0,.5); margin:6px 0 4px; animation:reveal .5s ease;
  }
  @keyframes reveal { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .gua-tag { text-align:center; font-size:11px; color:#9ab; letter-spacing:2px; margin-bottom:12px; }

  .fortune-block { background:#07071a; border-radius:10px; padding:13px 14px; margin-bottom:10px; border-left:3px solid var(--gold); }
  .fortune-block .ft { font-size:11px; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }
  .fortune-block .fb { font-size:13.5px; color:#dde; line-height:1.7; }
  .fortune-block.year { border-left-color:var(--cyan); } .fortune-block.year .ft { color:var(--cyan); }
  .fortune-block.month { border-left-color:var(--purple); } .fortune-block.month .ft { color:var(--purple); }

  .luck { display:flex; gap:10px; margin-top:4px; }
  .luck .chip { flex:1; text-align:center; background:#07071a; border-radius:10px; padding:10px 6px; border:1px solid rgba(255,255,255,.08); }
  .luck .chip .t { font-size:10px; color:#789; letter-spacing:1px; }
  .luck .chip .v { font-size:16px; margin-top:4px; color:var(--gold); }

  .balls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:14px 0 4px; }
  .ball {
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:bold; color:var(--bg); background:var(--gold);
    box-shadow:0 0 14px var(--gold),0 0 28px rgba(255,215,0,.4); animation:pop .4s ease backwards;
  }
  .ball:nth-child(1){animation-delay:.05s}.ball:nth-child(2){animation-delay:.12s}
  .ball:nth-child(3){animation-delay:.19s}.ball:nth-child(4){animation-delay:.26s}
  .ball:nth-child(5){animation-delay:.33s}.ball:nth-child(6){animation-delay:.40s}
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .meta { text-align:center; font-size:12px; color:#9ab; letter-spacing:1px; margin-top:4px; }
  .meta b { color:var(--gold); }
  .save-btn {
    width:100%; margin-top:14px; background:#0a0a2e; border:1.5px solid var(--gold); color:var(--gold);
    border-radius:12px; padding:14px; font-family:inherit; font-size:15px; letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,215,0,.3); text-shadow:0 0 8px rgba(255,215,0,.6); transition:all .15s;
  }
  .save-btn:active { transform:scale(.98); }
  .save-btn.done { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(0,255,0,.3); text-shadow:0 0 8px var(--green); }
  .hidden { display:none !important; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#0d0d2b;
    border:1px solid var(--gold); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px;
    letter-spacing:1px; box-shadow:0 0 18px rgba(255,215,0,.4); opacity:0; transition:opacity .25s; z-index:50;
  }
  .toast.show { opacity:1; }
.ball.power{background:#ff2d55;color:#fff;box-shadow:0 0 14px #ff2d55,0 0 30px rgba(255,45,85,.5);}
  .plus{color:#ff2d55;font-size:22px;font-weight:bold;align-self:center;text-shadow:0 0 8px #ff2d55;}
  .balls{align-items:center;}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Tojeong Bigyeol</div>
      <h1>🌙 토정비결 로또</h1>
      <div class="sub">상·중·하 세 괘로 올해 운세와 번호를 봅니다</div>
    </header>

    <div class="card">
      <div class="label">생년월일 입력</div>
      <div class="date-row">
        <div class="fld"><small>년</small><select id="tjYear"></select></div>
        <div class="fld"><small>월</small><select id="tjMonth"></select></div>
        <div class="fld d3"><small>일</small><select id="tjDay"></select></div>
      </div>
      <button class="run-btn" id="tjRunBtn">토정비결 보기</button>
    </div>

    <div class="card hidden" id="tjResultCard">
      <div class="gua-code" id="tjCode">- - -</div>
      <div class="gua-tag">상괘 · 중괘 · 하괘</div>

      <div class="fortune-block year">
        <div class="ft">올해의 운세</div>
        <div class="fb" id="tjYearFortune">-</div>
      </div>
      <div class="fortune-block month">
        <div class="ft">이번 달 운세</div>
        <div class="fb" id="tjMonthFortune">-</div>
      </div>
      <div class="fortune-block">
        <div class="ft">처세의 지혜</div>
        <div class="fb" id="tjAdvice">-</div>
      </div>
      <div class="luck">
        <div class="chip"><div class="t">행운의 방향</div><div class="v" id="tjDir">-</div></div>
        <div class="chip"><div class="t">행운의 색</div><div class="v" id="tjColor">-</div></div>
      </div>

      <div class="label" style="margin-top:16px;">행운 번호</div>
      <div class="balls" id="tjBalls"></div>
      <div class="meta"><b id="tjRoundTxt">-</b> · 괘 기반 추출</div>
      <button class="save-btn" id="tjSaveBtn">나의 번호에 저장</button>
    </div>
  </div>
  <div class="toast" id="tjToast"></div>

<script>
(function () {
  'use strict';

  // ===================================================================
  // ===== [재사용 영역] 순수 로직 =====================================
  //  ※ 음력 변환은 표준대로 양력 근사값 사용 (정밀 변환 미적용)
  // ===================================================================
  var COLORS = { cyan:'#00ffff', purple:'#cc00ff', gold:'#ffd700', green:'#00ff00', bg:'#0a0a1a' };
  var GAME_KEY = 'tojeong';
  var STORAGE_KEY = '@devbrick/saved_lotto_numbers_v1';
  var MAX_PER_TYPE = 100;

  // 상괘 8 — 올해의 운세
  var SANG = [
    "봄을 맞은 나무처럼 기운이 솟습니다. 새로 시작하는 일에 크게 길한 해입니다.",
    "잔잔히 흐르는 물처럼 안정 속에 결실을 맺는 해입니다. 꾸준함이 복이 됩니다.",
    "구름이 걷히고 해가 드니, 막혔던 일들이 하나둘 풀리는 해입니다.",
    "단단한 산처럼 기반을 다지는 해입니다. 서두르지 않으면 크게 이룹니다.",
    "바람을 탄 돛처럼 멀리 나아갑니다. 이동과 확장이 이로운 해입니다.",
    "불씨가 번지듯 명예와 인기가 오릅니다. 사람이 따르는 해입니다.",
    "곳간이 차오르듯 재물이 모입니다. 베풀수록 더 늘어나는 해입니다.",
    "옥을 다듬듯 갈고닦는 해입니다. 인내한 끝에 빛을 보게 됩니다."
  ];
  // 중괘 6 — 이번 달 운세
  var JUNG = [
    "이달은 귀인을 만나 뜻밖의 도움을 받습니다.",
    "이달은 작은 다툼만 조심하면 평안하게 흘러갑니다.",
    "이달은 기다리던 기쁜 소식이 들려옵니다.",
    "이달은 재물의 흐름이 트이고 기회가 옵니다.",
    "이달은 건강을 살피고 무리하지 않는 것이 좋습니다.",
    "이달은 새로운 인연과 기회가 함께 찾아옵니다."
  ];
  // 하괘 3 — 지혜 + 행운 방향/색
  var HA = [
    { advice:"먼저 움직이는 사람에게 복이 따릅니다. 망설이지 마세요.", dir:"동(東)쪽", color:"청색(靑)" },
    { advice:"기다리며 준비하면 반드시 때가 옵니다. 조급함을 버리세요.", dir:"남(南)쪽", color:"적색(赤)" },
    { advice:"마음을 비우면 비로소 길이 보입니다. 욕심을 내려놓으세요.", dir:"중앙(中)", color:"황색(黃)" }
  ];

  // 나이(한국식)+월/일 → 상·중·하 괘
  function computeGua(age, month, day) {
    var sang = ((age + month) % 8);   // 0~7
    var jung = (day % 6);             // 0~5
    var ha = ((age + day) % 3);       // 0~2
    return {
      sang: sang, jung: jung, ha: ha,
      sangNo: sang + 1, jungNo: jung + 1, haNo: ha + 1,
      code: (sang + 1) * 100 + (jung + 1) * 10 + (ha + 1)
    };
  }
  function guaFortune(g) {
    return {
      year: SANG[g.sang],
      month: JUNG[g.jung],
      advice: HA[g.ha].advice,
      dir: HA[g.ha].dir,
      color: HA[g.ha].color
    };
  }

  function makeRng(seed){ var s=seed>>>0; return function(){ s|=0; s=(s+0x6D2B79F5)|0; var t=Math.imul(s^(s>>>15),1|s);
    t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
  function seedFrom(arr){ var s=2166136261; for(var i=0;i<arr.length;i++){s^=arr[i];s=Math.imul(s,16777619);} return s>>>0; }
  function pickPowerball(rng) {
    var wp = {}, white = [];
    while (white.length < 5) { var n = 1 + Math.floor(rng() * 69); if (!wp[n]) { wp[n] = true; white.push(n); } }
    white.sort(function (a, b) { return a - b; });
    return { white: white, power: 1 + Math.floor(rng() * 26) };
  }
  function makeSavedEntry(numbers, powerball, nextRound, nowMs, id) {
    return { id: id, savedAt: new Date(nowMs).toISOString(), round: nextRound > 0 ? nextRound : 0, numbers: numbers.slice(), powerball: powerball, matchCount: 0, type: GAME_KEY, source: GAME_KEY };
  }
  function isDuplicate(savedArr, numbers, powerball, type) {
    var key = numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + powerball;
    for (var i = 0; i < savedArr.length; i++) {
      var e = savedArr[i];
      if (e && e.type === type && Array.isArray(e.numbers)) {
        var ek = e.numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + (e.powerball || 0);
        if (ek === key) return true;
      }
    }
    return false;
  }
  function trimSavedByType(arr,maxPerType){ var groups={}; for(var i=0;i<arr.length;i++){var t=arr[i].type||'_';(groups[t]=groups[t]||[]).push(arr[i]);}
    var out=[]; Object.keys(groups).forEach(function(t){var g=groups[t].slice().sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);});if(g.length>maxPerType)g=g.slice(g.length-maxPerType);out=out.concat(g);});
    out.sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);}); return out; }
  function parseMaxRound(json){ var mx=0; if(json&&typeof json==='object')Object.keys(json).forEach(function(k){var r=parseInt(k,10);if(!isNaN(r)&&r>mx)mx=r;}); return mx; }

  // ===================================================================
  // ===== [HTML 전용] 화면/이벤트/저장/fetch ==========================
  // ===================================================================
  var FIREBASE_URL = 'https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app';
  var el = {};
  var state = { numbers: [], gua: null, nextRound: 0, finished: false };

  function genId(p){ return p+'-'+Date.now()+'_'+Math.random().toString(36).slice(2,10); }

  function bindElements() {
    el.year=document.getElementById('tjYear'); el.month=document.getElementById('tjMonth'); el.day=document.getElementById('tjDay');
    el.runBtn=document.getElementById('tjRunBtn'); el.resultCard=document.getElementById('tjResultCard');
    el.code=document.getElementById('tjCode'); el.yearF=document.getElementById('tjYearFortune'); el.monthF=document.getElementById('tjMonthFortune');
    el.advice=document.getElementById('tjAdvice'); el.dir=document.getElementById('tjDir'); el.color=document.getElementById('tjColor');
    el.balls=document.getElementById('tjBalls'); el.roundTxt=document.getElementById('tjRoundTxt'); el.saveBtn=document.getElementById('tjSaveBtn'); el.toast=document.getElementById('tjToast');
  }
  function fillSelect(sel,from,to,pad,selected){ sel.innerHTML='';
    for(var v=from;v<=to;v++){var o=document.createElement('option');o.value=v;o.textContent=pad?String(v).padStart(2,'0'):v;if(v===selected)o.selected=true;sel.appendChild(o);} }
  function showToast(msg){ el.toast.textContent=msg; el.toast.classList.add('show'); setTimeout(function(){el.toast.classList.remove('show');},1800); }

  function fetchNextRound(cb){ fetch(FIREBASE_URL+'/winningNumbers.json').then(function(r){return r.json();})
    .then(function(j){cb(parseMaxRound(j)+1);}).catch(function(){cb(0);}); }

  function calculate() {
    var y=parseInt(el.year.value,10),m=parseInt(el.month.value,10),d=parseInt(el.day.value,10);
    var nowY=new Date(Date.now()).getFullYear();        // ← 비순수, 주입용
    var age=nowY-y+1;                                    // 한국식 나이
    var g=computeGua(age,m,d);                           // ← 순수
    var f=guaFortune(g);                                 // ← 순수
    var rng=makeRng(seedFrom([g.code,y,m,d]));           // ← 순수 RNG
    var __pbr = pickPowerball(rng); var numbers = __pbr.white; var power = __pbr.power;                        // ← 순수
    state.numbers = numbers; state.power = power; state.gua=g; state.finished=true;

    el.code.style.animation='none'; void el.code.offsetWidth; el.code.style.animation='';
    el.code.textContent = g.sangNo + ' · ' + g.jungNo + ' · ' + g.haNo;
    el.yearF.textContent=f.year; el.monthF.textContent=f.month; el.advice.textContent=f.advice;
    el.dir.textContent=f.dir; el.color.textContent=f.color;
    el.balls.innerHTML='';
    numbers.forEach(function(n){var b=document.createElement('div');b.className='ball';b.textContent=n;el.balls.appendChild(b);});var __pl=document.createElement('div');__pl.className='plus';__pl.textContent='+';el.balls.appendChild(__pl);var __pbb=document.createElement('div');__pbb.className='ball power';__pbb.textContent=state.power;el.balls.appendChild(__pbb);
    el.saveBtn.textContent='나의 번호에 저장'; el.saveBtn.className='save-btn'; el.saveBtn.disabled=false;
    el.resultCard.classList.remove('hidden');

    el.roundTxt.textContent = '미국 파워볼 방식';
  }

  function loadSaved(){ try{var raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):[];}catch(e){return [];} }
  function saveResult() {
    if(!state.finished)return;
    var saved=loadSaved();
    if(isDuplicate(saved, state.numbers, state.power, GAME_KEY)){showToast('이미 저장된 번호예요');return;}
    var entry=makeSavedEntry(state.numbers, state.power, state.nextRound,Date.now(),genId(GAME_KEY));
    saved.push(entry);
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(trimSavedByType(saved,MAX_PER_TYPE)));
      el.saveBtn.textContent='✓ 저장 완료'; el.saveBtn.className='save-btn done'; el.saveBtn.disabled=true; showToast('나의 번호에 저장했어요');
    }catch(e){showToast('저장 공간이 부족해요');}
  }

  function startTojeongApp() {
    bindElements();
    var nowY=new Date(Date.now()).getFullYear();
    fillSelect(el.year,1940,nowY,false,1990); fillSelect(el.month,1,12,true,1); fillSelect(el.day,1,31,true,1);
    el.runBtn.onclick=calculate; el.saveBtn.onclick=saveResult;
  }
  window.startTojeongApp = startTojeongApp;

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startTojeongApp);
  else startTojeongApp();
})();
</script>
</body>
</html>
