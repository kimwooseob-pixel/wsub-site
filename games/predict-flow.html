<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>흐름 예측</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:#1a1f2e; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; color:#fff; min-height:100vh; }
  #predict-root { max-width:480px; margin:0 auto; padding-bottom:120px; position:relative; }

  .titleWrap { padding:12px 16px 4px; text-align:center; }
  .predictTitle { font-size:24px; font-weight:900; color:#e9d5ff; letter-spacing:1.5px; text-shadow:0 0 14px rgba(192,132,252,0.85); }

  .hintRow { display:flex; gap:8px; padding:8px; overflow-x:auto; }
  .hintBtn { flex:0 0 auto; padding:10px 20px; border-radius:20px; color:#fff; font-weight:800; font-size:14px; cursor:pointer; border:2px solid transparent; }
  .hintBtn.active { border-color:#fff; }

  .turnBox { background:#252b3d; margin:8px; padding:12px; border-radius:8px; position:relative; }
  .dateText { color:#3498db; font-size:12px; font-weight:bold; letter-spacing:1px; text-align:center; margin-bottom:6px; }
  .turnInfoRow { display:flex; justify-content:space-between; align-items:center; }
  .turnText { color:#fff; font-size:20px; font-weight:bold; }
  .checkText { color:#ff4444; font-size:13px; font-weight:bold; animation:blink 1s infinite; transform:translateY(-12px); }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
  .floatArrow { position:absolute; right:12px; top:54px; color:#ffcc00; font-size:40px; animation:floaty 1.4s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  .gridScroll { overflow-x:auto; overflow-y:hidden; background:#000; }
  #gridSvg { display:block; }

  .btnRow { padding:12px 16px; }
  .saveBtn { width:100%; padding:14px 0; border-radius:10px; background:#3b2f5c; border:2px solid rgba(192,132,252,0.75); color:#f5e8ff; font-weight:900; font-size:15px; cursor:pointer; text-align:center; }
  .saveBtn.dim { opacity:.4; pointer-events:none; }
  .savedViewBtn { display:none; margin:0 16px; padding:11px 0; border-radius:10px; border:1px solid rgba(192,132,252,0.4); background:rgba(192,132,252,0.12); color:#e9d5ff; font-weight:800; font-size:13px; cursor:pointer; text-align:center; }
  .savedViewBtn.is-shown { display:block; }

  /* 사이버펑크 SHOOT FAB */
  .shootFab { position:fixed; left:50%; transform:translateX(-50%); bottom:28px; z-index:40; display:none; }
  .shootFab.is-shown { display:block; }
  .shootBtn { padding:12px 32px; border-radius:2px; border:2px solid #00f3ff; background:#0a0e14; color:#00f3ff; font-size:15px; font-weight:900; letter-spacing:6px; cursor:pointer; box-shadow:0 0 12px rgba(0,243,255,0.55); }
  .shootBtn.violet { border-color:#8000ff; color:#cc66ff; box-shadow:0 0 12px rgba(128,0,255,0.55); }
  .shootBtn.yellow { border-color:#ffcc00; color:#ffcc00; box-shadow:0 0 12px rgba(255,204,0,0.55); }

  .loading { display:flex; align-items:center; justify-content:center; height:70vh; color:#fff; font-size:16px; }

  .mask { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; display:none; align-items:center; justify-content:center; padding:24px; }
  .mask.is-shown { display:flex; }
  .popup { background:#252b3d; border-radius:20px; padding:28px; width:100%; max-width:360px; text-align:center; border:1px solid #3498db; }
  .popup .emoji { font-size:52px; margin-bottom:8px; }
  .popup .ptitle { font-size:22px; font-weight:bold; margin-bottom:20px; }
  .msgRow { display:flex; align-items:center; gap:10px; background:#1a1f2e; padding:12px; border-radius:10px; margin-bottom:12px; text-align:left; }
  .msgRow .ic { font-size:22px; } .msgRow .tx { font-size:15px; font-weight:500; }
  .startBtn { width:100%; background:#3498db; padding:12px 0; border-radius:25px; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; border:none; margin-top:8px; }

  .savesBox { width:100%; max-width:360px; max-height:76vh; overflow-y:auto; background:#252b3d; border:1px solid #3498db; border-radius:16px; padding:18px; }
  .savesTitle { font-size:16px; font-weight:900; color:#e9d5ff; margin-bottom:12px; }
  .saveItem { background:#1a1f2e; border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .saveRound { font-size:11px; color:#3498db; font-weight:700; margin-bottom:6px; }
  .saveNums { display:flex; gap:5px; flex-wrap:wrap; }
  .sn { width:26px; height:26px; border-radius:13px; background:rgba(192,132,252,0.2); border:1px solid rgba(192,132,252,0.6); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#e9d5ff; }
  .savesEmpty { color:rgba(255,255,255,0.4); text-align:center; padding:18px 0; }
  .closeBtn { width:100%; margin-top:8px; padding:11px 0; border-radius:10px; border:1px solid rgba(192,132,252,0.4); background:rgba(192,132,252,0.14); color:#e9d5ff; font-weight:800; cursor:pointer; }
</style>

<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
    authDomain: "ai-lottosolutions.firebaseapp.com",
    databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ai-lottosolutions",
    storageBucket: "ai-lottosolutions.firebasestorage.app",
    messagingSenderId: "616782090306",
    appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
  };
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var wsubAuth = firebase.auth();
  var wsubDb = firebase.database();
  var wsubMode = "login";
  var wsubPendingSaveAction = null;
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m];}); }

  window.wsubOpenModal = function(){ $("wsubErr").textContent=""; $("wsubModal").classList.add("open"); };
  window.wsubCloseModal = function(){ $("wsubModal").classList.remove("open"); };
  window.wsubToggleMode = function(){
    wsubMode = (wsubMode==="login")?"signup":"login";
    var s = (wsubMode==="signup");
    $("wsubModalTitle").textContent = s?"회원가입":"로그인";
    $("wsubModalSub").textContent = s?"이메일과 비밀번호로 계정을 만드세요":"이메일과 비밀번호로 로그인하세요";
    $("wsubSubmit").textContent = s?"회원가입":"로그인";
    $("wsubToggle").innerHTML = s
      ? '이미 계정이 있으신가요? <button onclick="wsubToggleMode()">로그인</button>'
      : '계정이 없으신가요? <button onclick="wsubToggleMode()">회원가입</button>';
    $("wsubErr").textContent = "";
  };
  window.wsubSubmit = function(){
    var email = $("wsubEmail").value.trim(), pw = $("wsubPw").value;
    $("wsubErr").textContent = "";
    if(!email||!pw){ $("wsubErr").textContent="이메일과 비밀번호를 입력해 주세요."; return; }
    var p = (wsubMode==="signup")
      ? wsubAuth.createUserWithEmailAndPassword(email, pw)
      : wsubAuth.signInWithEmailAndPassword(email, pw);
    p.catch(function(e){ $("wsubErr").textContent = wsubAuthErr(e); });
  };
  window.wsubLogout = function(){ wsubAuth.signOut(); };
  function wsubAuthErr(e){
    var c=(e&&e.code)||"";
    if(c==="auth/invalid-email") return "이메일 형식이 올바르지 않아요.";
    if(c==="auth/missing-password"||c==="auth/weak-password") return "비밀번호는 6자 이상이어야 해요.";
    if(c==="auth/email-already-in-use") return "이미 가입된 이메일이에요. 로그인해 주세요.";
    if(c==="auth/invalid-credential"||c==="auth/wrong-password"||c==="auth/user-not-found") return "이메일 또는 비밀번호가 올바르지 않아요.";
    if(c==="auth/too-many-requests") return "잠시 후 다시 시도해 주세요.";
    return "문제가 발생했어요. 다시 시도해 주세요.";
  }
  var toastT=null;
  window.wsubToast = function(msg){
    var t=$("wsubToast"); if(!t) return; t.textContent=msg; t.classList.add("show");
    if(toastT) clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove("show"); }, 2200);
  };

  wsubAuth.onAuthStateChanged(function(user){
    var who=$("wsubWho"), btn=$("wsubAuthBtn");
    if(user){
      who.innerHTML = '<b>'+esc(user.email||"로그인됨")+'</b>';
      btn.textContent="로그아웃"; btn.classList.remove("primary"); btn.onclick=wsubLogout;
      wsubCloseModal();
      if(typeof wsubPendingSaveAction==="function"){ var a=wsubPendingSaveAction; wsubPendingSaveAction=null; a(); }
    }else{
      who.textContent="로그인하면 번호를 내 계정에 저장할 수 있어요";
      btn.textContent="로그인"; btn.classList.add("primary"); btn.onclick=wsubOpenModal;
    }
  });

  // numbers: [3,11,18,24,33,42] 배열 / game: 게임키 / onSuccess: 저장 성공 콜백(선택)
  window.wsubSaveNumbers = function(numbers, game, onSuccess){
    if(!wsubAuth.currentUser){
      wsubPendingSaveAction = function(){ window.wsubSaveNumbers(numbers, game, onSuccess); };
      wsubOpenModal(); return;
    }
    var uid = wsubAuth.currentUser.uid;
    var ref = wsubDb.ref("wsub_saved/"+uid).push();
    ref.set({
      numbers: (numbers||[]).slice().sort(function(a,b){return a-b;}).map(String).join(","),
      game: game,
      savedAt: Date.now()
    }).then(function(){ wsubToast("내 계정에 저장했어요"); if(typeof onSuccess==="function") onSuccess(); })
      .catch(function(e){ console.error(e); wsubToast("저장에 실패했어요. 다시 시도해 주세요."); });
  };
  window.wsubIsLoggedIn = function(){ return !!wsubAuth.currentUser; };

  $("wsubModal").addEventListener("click", function(e){ if(e.target===this) wsubCloseModal(); });
})();
</script>

<script>
(function () {
  'use strict';

  /* =======================================================================
   * [재사용 영역] 순수 로직 (DOM/window/localStorage/fetch/시간·랜덤 직접호출 금지)
   * ===================================================================== */

var COLORS = { cyan:'#00ffff', purple:'#cc00ff', gold:'#ffd700', green:'#00ff00', bg:'#0a0a1a' };
  var HINTS = [
    { key:'hint1', label:'힌트1', color:'#2ecc71' },
    { key:'hint2', label:'힌트2', color:'#e74c3c' },
    { key:'hint3', label:'힌트3', color:'#f39c12' },
    { key:'hint4', label:'힌트4', color:'#1abc9c' },
    { key:'hint5', label:'힌트5', color:'#9b59b6' }
  ];
  var ROWS = 45, MAX_SELECT = 6;

  // Firebase 응답 파싱
  function parseDrawRange(data) {
    if (!data) return null;
    return { start: parseInt(data.start, 10), end: parseInt(data.end, 10), next: parseInt(data.next, 10) };
  }
  function mergeWinning(fallback, fbData) {
    var out = {}; var k;
    for (k in fallback) out[k] = fallback[k];
    if (fbData) {
      Object.keys(fbData).forEach(function (key) {
        var v = fbData[key];
        out[key] = (v && v.numbers) ? v.numbers : v;
      });
    }
    return out;
  }
  function nextDrawDateStr(nextDraw) {
    var BASE = new Date('2002-12-07');
    var d = new Date(BASE.getTime() + (nextDraw - 1) * 7 * 86400000);
    return (d.getFullYear() % 100) + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }
  function drawsList(start, end) { var a = []; for (var i = start; i <= end; i++) a.push(String(i)); return a; }

  function markedPositions(draws, win, cell, header) {
    var p = [];
    draws.forEach(function (d, di) {
      (win[d] || []).forEach(function (n) {
        p.push({ x: di * cell + cell / 2, y: header + (n - 1) * cell + cell / 2, num: n, drawIdx: di });
      });
    });
    return p;
  }
  function coldness(draws, win) {
    var r = {};
    for (var n = 1; n <= 45; n++) {
      var last = -1;
      draws.forEach(function (d, i) { if ((win[d] || []).indexOf(n) >= 0) last = i; });
      r[n] = last === -1 ? draws.length : draws.length - 1 - last;
    }
    return r;
  }
  function coldTop(cold, count) {
    return Object.keys(cold).map(function (k) { return { num: +k, cold: cold[k] }; })
      .sort(function (a, b) { return b.cold - a.cold; }).slice(0, count).map(function (x) { return x.num; });
  }
  // 힌트1: 가까운 당첨셀 연결선 (3칸 이내)
  function hint1Lines(mp, cell) {
    var out = [];
    for (var i = 0; i < mp.length; i++) for (var j = i + 1; j < mp.length; j++) {
      var a = mp[i], b = mp[j], dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (dist <= cell * 3) out.push({ x1: a.x, y1: a.y, x2: b.x, y2: b.y, opacity: Math.max(0.3, 1 - dist / (cell * 3)), thickness: Math.max(2, 6 - dist / (cell * 2)) });
    }
    return out;
  }
  // 힌트2: 당첨셀 3개 둔각삼각형의 두 변 (초록)
  function hint2Lines(mp, cell) {
    var out = [];
    for (var i = 0; i < mp.length; i++) for (var j = i + 1; j < mp.length; j++) for (var k = j + 1; k < mp.length; k++) {
      var p1 = mp[i], p2 = mp[j], p3 = mp[k];
      var d12 = Math.hypot(p2.x - p1.x, p2.y - p1.y), d23 = Math.hypot(p3.x - p2.x, p3.y - p2.y), d13 = Math.hypot(p3.x - p1.x, p3.y - p1.y);
      if (d12 > cell * 4 || d23 > cell * 4 || d13 > cell * 4) continue;
      var cosA = (d12 * d12 + d23 * d23 - d13 * d13) / (2 * d12 * d23);
      var cosB = (d23 * d23 + d13 * d13 - d12 * d12) / (2 * d23 * d13);
      var cosC = (d13 * d13 + d12 * d12 - d23 * d23) / (2 * d13 * d12);
      if (Math.min(cosA, cosB, cosC) < -0.1) {
        out.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y });
        out.push({ x1: p2.x, y1: p2.y, x2: p3.x, y2: p3.y });
      }
    }
    return out.sort(function (a, b) { return a.x1 - b.x1; });
  }
  // 힌트3: 당첨셀 주변 연결 수만큼 커지는 주황 원
  function hint3Circles(mp, cell) {
    var NEIGHBOR = cell * 3, out = [];
    for (var i = 0; i < mp.length; i++) {
      var p = mp[i], conn = 0;
      for (var j = 0; j < mp.length; j++) { if (i === j) continue; if (Math.hypot(mp[j].x - p.x, mp[j].y - p.y) <= NEIGHBOR) conn++; }
      if (conn === 0) continue;
      var r = Math.min(cell * 4, Math.max(cell * 1.2, cell * 1.5 + conn * cell * 0.5));
      out.push({ x: p.x, y: p.y, r: r });
    }
    return out;

  // 힌트5: 빈 셀을 당첨 인접도로 점수내어 위험 원(검정/올리브/노랑)
  function hint5Circles(draws, win, mp, cell, header) {
    var circles = [], pushIdx = 0;
    for (var num = 1; num <= 45; num++) for (var di = 0; di < draws.length; di++) {
      var nums = win[draws[di]] || [];
      if (nums.indexOf(num) >= 0) continue;
      var score = 0;
      for (var m = 0; m < mp.length; m++) {
        var rowDiff = Math.abs(num - mp[m].num), colDiff = Math.abs(di - mp[m].drawIdx);
        if (rowDiff === 1 && colDiff === 0) score += 2;
        else if (rowDiff === 0 && colDiff === 1) score += 2;
        else if (rowDiff === 1 && colDiff === 1) score += 1.5;
        else if (rowDiff === 2 && colDiff === 0) score += 1;
        else if (rowDiff === 0 && colDiff === 2) score += 1;
      }
      var cx = di * cell + cell / 2, cy = header + (num - 1) * cell + cell / 2;
      if (score === 0) { pushIdx++; if (pushIdx % 3 === 0) continue; circles.push({ x: cx, y: cy, r: cell * 1.8, color: '#000' }); }
      else if (score <= 1) { pushIdx++; if (pushIdx % 3 === 0) continue; circles.push({ x: cx, y: cy, r: cell * 1.5, color: '#808000' }); }
      else if (score <= 1.5) { pushIdx++; if (pushIdx % 3 === 0) continue; circles.push({ x: cx, y: cy, r: cell * 1.2, color: '#dddd00' }); }
    }
    // 세그먼트 샘플링 (원본과 동일하게 과밀 방지)
    var sorted = circles.slice().sort(function (a, b) { return a.y - b.y; });
    var segCount = 6, per = 5, segSize = Math.ceil(sorted.length / segCount), sampled = [];
    for (var s = 0; s < segCount; s++) {
      sampled = sampled.concat(sorted.slice(s * segSize, (s + 1) * segSize).sort(function (a, b) { return b.r - a.r; }).slice(0, per));
    }
    return sampled;
  }

    if (sel.indexOf(num) >= 0) return sel.filter(function (n) { return n !== num; });
    if (sel.length >= max) return sel;
    return sel.concat([num]);
  }

      });
    } else if(h==='hint2'){
      hint2Lines(mp,cell).forEach(function(l){
        var L2=(Math.hypot(l.x2-l.x1,l.y2-l.y1)||1), dash2=Math.max(7,cell*0.6);

      hint3Circles(mp,cell).forEach(function(c){
        s+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+c.r.toFixed(1)+'" fill="url(#grad3)"><animate attributeName="r" values="'+c.r.toFixed(1)+';'+(c.r*1.3).toFixed(1)+';'+c.r.toFixed(1)+'" dur="2s" repeatCount="indefinite"/></circle>';
      });
    } else if(h==='hint4'){
      // 정적 효과: 예상열/그리드 보라 셰이딩(위에서 처리). 추가 강조 없음(원본 동일)

  function spawn(node){ if(el.shootLayer) el.shootLayer.appendChild(node); return node; }
  function lockPredictCell(num){
    if(num<1 || num>ROWS) return;
    var cell=geo.cell, header=geo.header, px=geo.predictX, pw=cell*2;
    var ry=header+(num-1)*cell;
    var g=svgEl('g',{}); spawn(g);
    var rect=svgEl('rect',{x:px, y:ry, width:pw, height:cell, fill:'rgba(231,76,60,0.45)', stroke:'#ff3b3b','stroke-width':2.5});
    var l1=svgEl('line',{x1:px+pw*0.3, y1:ry+cell*0.25, x2:px+pw*0.7, y2:ry+cell*0.75, stroke:'#fff','stroke-width':2.5,'stroke-linecap':'round'});
    var l2=svgEl('line',{x1:px+pw*0.7, y1:ry+cell*0.25, x2:px+pw*0.3, y2:ry+cell*0.75, stroke:'#fff','stroke-width':2.5,'stroke-linecap':'round'});
    g.appendChild(rect); g.appendChild(l1); g.appendChild(l2);
    vibrate(30);
    // 임팩트 펄스 → 1.1초 유지 → 페이드
    var t0=performance.now();
    (function fr(now){ var raw=(now-t0)/220, p=Math.min(1,raw);
      var sc=1+0.25*(1-p); g.setAttribute('transform','translate('+(px+pw/2)+','+(ry+cell/2)+') scale('+sc.toFixed(3)+') translate('+(-(px+pw/2))+','+(-(ry+cell/2))+')');
      if(p<1) requestAnimationFrame(fr); else {
        var h0=performance.now();
        (function fade(n){ var q=(n-h0)/1100; if(q<0.7){ requestAnimationFrame(fade); return; }
          var f=Math.min(1,(q-0.7)/0.3); g.setAttribute('opacity',(1-f).toFixed(2));
          if(f<1) requestAnimationFrame(fade); else if(g.parentNode) g.parentNode.removeChild(g);
        })(performance.now());
      }
    })(performance.now());
  }
  function markHit(ay){
    var cell=geo.cell, header=geo.header, px=geo.predictX, pw=cell*2, endX=geo.endX;
    var num=Math.round((ay-header-cell/2)/cell)+1;
    if(num>=1 && num<=ROWS){
      var ry=header+(num-1)*cell;
      // 예상칸 황금 번쩍 (확장+페이드)
      var hit=svgEl('rect',{x:px, y:ry, width:pw, height:cell, fill:'rgba(255,215,0,0.55)', stroke:'#ffd700','stroke-width':2.5});
      spawn(hit);
      var t0=performance.now();
      (function f(now){ var p=Math.min(1,(now-t0)/850);
        hit.setAttribute('fill','rgba(255,215,0,'+(0.55*(1-p)).toFixed(3)+')');
        hit.setAttribute('stroke','rgba(255,215,0,'+(1-p).toFixed(3)+')');
        if(p<1) requestAnimationFrame(f); else if(hit.parentNode) hit.parentNode.removeChild(hit);
      })(performance.now());
    }
    // 가장자리 임팩트 점
    var spark=svgEl('circle',{cx:endX, cy:ay, r:Math.max(2,cell*0.16), fill:'#fff'});
    spawn(spark); var s0=performance.now();
    (function f(now){ var p=Math.min(1,(now-s0)/500);
      spark.setAttribute('r', (Math.max(2,cell*0.16)*(1+p*1.6)).toFixed(1));
      spark.setAttribute('opacity', (1-p).toFixed(2));
      if(p<1) requestAnimationFrame(f); else if(spark.parentNode) spark.parentNode.removeChild(spark);
    })(performance.now());
  }
  function animateTranslate(node, sx, sy, tx, ty, dur, blink){
    var t0=performance.now();
    function fr(now){
      var p=Math.min(1, (now-t0)/dur);
      node.setAttribute('transform','translate('+(tx*p).toFixed(1)+','+(ty*p).toFixed(1)+')'+(node.__flip?' scale(-1,1)':''));
      if(blink){ node.setAttribute('opacity', (0.3+0.7*Math.abs(Math.sin((now-t0)/400*Math.PI))).toFixed(2)); }
      if(p<1) requestAnimationFrame(fr);
      else {
        markHit(sy+ty);                       // 예상열 도착 지점 = 맞은 번호 표시
        node.setAttribute('opacity','1');
        var h0=performance.now();             // 짧게 머문 뒤 페이드아웃
        (function fade(now){ var q=Math.min(1,(now-h0)/260);
          node.setAttribute('opacity', (1-q).toFixed(2));
          if(q<1) requestAnimationFrame(fade); else if(node.parentNode) node.parentNode.removeChild(node);
        })(performance.now());
      }
    }
    requestAnimationFrame(fr);
  }
  // 선 방향으로 endX까지 도달하는 (tx,ty) — 원본 수식
  function alongTo(sx, sy, x1, y1, x2, y2, endX){
    var dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len;
    var tx=endX-sx, ty=0;
    if(Math.abs(ux)>1e-4){ var s=(endX-sx)/ux; if(s>=0){ tx=s*ux; ty=s*uy; } }
    return {tx:tx, ty:ty, dur:Math.min(1200,Math.max(280,Math.hypot(tx,ty)*1.1))};
  }
  function runShoot(){
    vibrate(50);
    if(!el.shootLayer) return;
    var draws=drawsList(st.start, st.end), cell=geo.cell, header=geo.header, endX=geo.endX;
    var mp=markedPositions(draws, st.win, cell, header), h=st.activeHint, br=geo.ballR;
    if(h==='hint1'){
      var lines=hint1Lines(mp,cell);
      lines.forEach(function(l,i){ if(i%2!==0) return;
        var c=svgEl('circle',{cx:l.x2, cy:l.y2, r:br, fill:'#fff'});
        spawn(c); var m=alongTo(l.x2,l.y2,l.x1,l.y1,l.x2,l.y2,endX); animateTranslate(c,l.x2,l.y2,m.tx,m.ty,m.dur,false);
      });
    } else if(h==='hint2'){
      hint2Lines(mp,cell).slice(0,40).forEach(function(l){
        var mx=(l.x1+l.x2)/2, my=(l.y1+l.y2)/2;
        var t=svgEl('text',{x:mx, y:my, 'font-size':Math.max(10,cell*0.6), 'text-anchor':'middle','dominant-baseline':'central'}); t.textContent='💫';
        spawn(t); var m=alongTo(mx,my,l.x1,l.y1,l.x2,l.y2,endX); animateTranslate(t,mx,my,m.tx,m.ty,m.dur,false);
      });
    } else if(h==='hint3'){
      hint3Circles(mp,cell).sort(function(a,b){return b.r-a.r;}).slice(0,30).forEach(function(c){
        var t=svgEl('text',{x:c.x, y:c.y, 'font-size':Math.max(12,cell*0.8), 'text-anchor':'middle','dominant-baseline':'central'}); t.textContent='🦕'; t.__flip=true;
        t.setAttribute('transform','scale(-1,1)'); spawn(t); animateTranslate(t, c.x, c.y, endX-c.x, 0, 5000, true);
      });
    } else if(h==='hint4'){
      coldTop(coldness(draws,st.win),15).forEach(function(num){
        var cy=header+(num-1)*cell+cell/2;
        var t=svgEl('text',{x:0, y:cy, 'font-size':Math.max(12,cell*0.8), 'text-anchor':'middle','dominant-baseline':'central'}); t.textContent='🦖'; t.__flip=true;
        t.setAttribute('transform','scale(-1,1)'); spawn(t); animateTranslate(t, 0, cy, endX-0, 0, 4000, true);
      });
    } else if(h==='hint5'){
      // 차단/봉인: 위험 번호(주의 원이 걸린 행) → 예상칸으로 🚫 날아가 ✕ 잠금
      var circles=hint5Circles(draws, st.win, mp, cell, header);
      var dangerRows={};
      circles.forEach(function(c){ var num=Math.round((c.y-header-cell/2)/cell)+1; if(num>=1&&num<=ROWS) dangerRows[num]=true; });
      var rows=Object.keys(dangerRows).map(Number).sort(function(a,b){return a-b;});
      // 붉은 화면 점멸
      var flash=svgEl('rect',{x:0,y:0,width:geo.gridW,height:geo.gridH,fill:'rgba(255,40,40,0.14)'});
      spawn(flash); var t0=performance.now();
      (function fr(now){ var p=Math.min(1,(now-t0)/420); flash.setAttribute('opacity',(1-p).toFixed(2)); if(p<1) requestAnimationFrame(fr); else if(flash.parentNode) flash.parentNode.removeChild(flash); })(performance.now());
      // 각 위험 행: 🚫가 왼쪽에서 예상칸까지 날아가 박힘
      rows.forEach(function(num, i){
        var cy=header+(num-1)*cell+cell/2;
        var t=svgEl('text',{x:0, y:cy, 'font-size':Math.max(12,cell*0.8), 'text-anchor':'middle','dominant-baseline':'central'}); t.textContent='🚫';
        spawn(t);
        var t0b=performance.now()+i*40, DUR=620, sx=0;
        (function fr(now){ var raw=Math.min(1,Math.max(0,(now-t0b)/DUR)), p=1-Math.pow(1-raw,3);
          t.setAttribute('transform','translate('+((endX-sx)*p).toFixed(1)+',0)');
          if(raw<1) requestAnimationFrame(fr); else { lockPredictCell(num); var h0=performance.now();
            (function fade(n){ var q=Math.min(1,(n-h0)/240); t.setAttribute('opacity',(1-q).toFixed(2)); if(q<1) requestAnimationFrame(fade); else if(t.parentNode) t.parentNode.removeChild(t); })(performance.now()); }
        })(performance.now());
      });
    }
  }

  /* ---------- UI 갱신 ---------- */
  function renderHintButtons(){
    var s='';
    HINTS.forEach(function(hh){ s+='<div class="hintBtn'+(st.activeHint===hh.key?' active':'')+'" data-hint="'+hh.key+'" style="background:'+hh.color+'">'+hh.label+'</div>'; });
    el.hintRow.innerHTML=s;
  }
  function updateSaveBtn(){ var can=st.selected.length===6 && st.end!=null; el.saveBtn.classList.toggle('dim', !can); }
  function updateShootBtn(){
    var on=st.activeHint!=='none';
    el.shootFab.classList.toggle('is-shown', on);
    el.shootBtn.className='shootBtn'+(st.activeHint==='hint4'?' violet':(st.activeHint==='hint5'?' yellow':''));
  }
  function refreshSavedBtn(){
    el.savedViewBtn.classList.add('is-shown');
    el.savedViewBtn.textContent='내 저장 번호 보기';
  }
  function selectNumber(num){ st.selected=toggleSelect(st.selected, num, MAX_SELECT); buildGridSvg(); updateSaveBtn(); }
  function setHint(key){ st.activeHint=(st.activeHint===key)?'none':key; renderHintButtons(); updateShootBtn(); buildGridSvg(); }
  function doSave(){
    if(st.selected.length!==6 || st.end==null){ alert('번호 6개를 모두 선택하고 회차 정보를 기다려 주세요.'); return; }
    if(!window.wsubSaveNumbers){ alert('저장 기능을 불러오지 못했어요. 새로고침 후 다시 시도해 주세요.'); return; }
    window.wsubSaveNumbers(st.selected.slice(), 'predict', function(){
      st.selected=[]; buildGridSvg(); updateSaveBtn();
    });
  }
  function openSaves(){
    location.href = '/mynumbers.html';
  }

  function bindElements(){
    el.root=document.getElementById('predict-root');
    el.loading=document.getElementById('loading');
    el.main=document.getElementById('main');
    el.hintRow=document.getElementById('hintRow');
    el.dateText=document.getElementById('dateText');
    el.turnText=document.getElementById('turnText');
    el.gridScroll=document.getElementById('gridScroll');
    el.gridSvg=document.getElementById('gridSvg');
    el.shootFab=document.getElementById('shootFab');
    el.shootBtn=document.getElementById('shootBtn');
    el.saveBtn=document.getElementById('saveBtn');
    el.savedViewBtn=document.getElementById('savedViewBtn');
    el.introMask=document.getElementById('introMask');
    el.introStart=document.getElementById('introStart');
    el.savesMask=document.getElementById('savesMask');
    el.savesList=document.getElementById('savesList');
    el.savesClose=document.getElementById('savesClose');
  }
  function bindEvents(){
    el.hintRow.addEventListener('click', function(ev){ var b=ev.target.closest?ev.target.closest('.hintBtn'):null; if(b&&b.dataset.hint) setHint(b.dataset.hint); });
    el.gridSvg.addEventListener('click', function(ev){ var t=ev.target; if(t&&t.classList&&t.classList.contains('ecell')) selectNumber(parseInt(t.getAttribute('data-num'),10)); });
    el.shootBtn.addEventListener('click', runShoot);
    el.saveBtn.addEventListener('click', doSave);
    el.savedViewBtn.addEventListener('click', openSaves);
    el.introStart.addEventListener('click', function(){ el.introMask.classList.remove('is-shown'); });
    el.savesClose.addEventListener('click', function(){ el.savesMask.classList.remove('is-shown'); });
    el.savesMask.addEventListener('click', function(ev){ if(ev.target===el.savesMask) el.savesMask.classList.remove('is-shown'); });
    var rT=null; window.addEventListener('resize', function(){ if(rT)clearTimeout(rT); rT=setTimeout(function(){ setupGeometry(); buildGridSvg(); }, 160); });
  }

  function startPredictApp(){
    bindElements(); if(!el.root) return; bindEvents();
    el.introMask.classList.add('is-shown');
    loadData().then(function(res){
      st.start=res.range.start; st.end=res.range.end; st.next=res.range.next; st.win=res.win;
      st.nextDateStr=nextDrawDateStr(st.next);
      el.loading.style.display='none'; el.main.style.display='';
      el.dateText.textContent=st.nextDateStr+' 추첨';
      el.turnText.textContent=(st.end+1)+'회차 예측';
      setupGeometry(); renderHintButtons(); updateShootBtn(); updateSaveBtn(); refreshSavedBtn(); buildGridSvg();
    });
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', startPredictApp);
  else startPredictApp();
  if(typeof window!=='undefined') window.startPredictApp=startPredictApp;
})();
</script>
</body>
