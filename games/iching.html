<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>주역 64괘 로또</title>
<style>
  :root { --cyan:#00ffff; --purple:#cc00ff; --gold:#ffd700; --green:#00ff00; --bg:#0a0a1a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); }
  body {
    font-family:'Courier New',ui-monospace,monospace; color:#fff; min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(204,0,255,0.10), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(0,255,255,0.07), transparent 40%),
      var(--bg);
    padding:18px 14px 40px; overflow-x:hidden;
  }
  .wrap { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  .eyebrow { font-size:11px; letter-spacing:4px; color:var(--gold); opacity:.85; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:1px; text-shadow:0 0 12px var(--gold),0 0 24px rgba(255,215,0,.35); }
  .sub { font-size:12px; color:#a99; letter-spacing:1px; }
  .card {
    background:#0d0d2b; border:1px solid rgba(255,215,0,.22); border-radius:14px; padding:16px; margin-bottom:16px;
    box-shadow:0 0 18px rgba(204,0,255,.10), inset 0 0 30px rgba(255,215,0,.03);
  }
  .label { font-size:12px; letter-spacing:2px; color:var(--gold); margin-bottom:12px; text-transform:uppercase; }

  /* 동전 */
  .coins { display:flex; justify-content:center; gap:16px; margin:6px 0 16px; height:54px; align-items:center; }
  .coin {
    width:46px; height:46px; border-radius:50%; border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold;
    background:radial-gradient(circle at 35% 30%, #2a2a16, #0d0d05); color:var(--gold);
    box-shadow:0 0 12px rgba(255,215,0,.35);
  }
  /* 괘 (아래에서 위로 쌓임) */
  .hexagram { display:flex; flex-direction:column-reverse; align-items:center; gap:7px; min-height:120px; justify-content:center; }
  .gline { display:flex; gap:8px; height:11px; opacity:0; transition:opacity .3s; }
  .gline.show { opacity:1; }
  .seg { width:60px; height:11px; border-radius:2px; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  .gline.yin .seg { width:26px; }      /* 음: 끊긴 두 막대 */
  .gline.yang .seg { width:60px; }     /* 양: 이어진 한 막대 (두번째 seg 숨김) */
  .gline.yang .seg:nth-child(2) { display:none; }

  .throw-btn {
    width:100%; margin-top:4px; background:linear-gradient(180deg,#241a0a,#140d05);
    border:1.5px solid var(--gold); color:#fff; border-radius:12px; padding:16px;
    font-family:inherit; font-size:17px; font-weight:bold; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,215,0,.3); text-shadow:0 0 10px var(--gold); transition:all .15s;
  }
  .throw-btn:active { transform:scale(.98); }
  .throw-btn:disabled { opacity:.5; cursor:default; box-shadow:none; }

  .hex-name { text-align:center; font-size:22px; color:var(--gold); text-shadow:0 0 12px rgba(255,215,0,.5); letter-spacing:2px; }
  .hex-hanja { text-align:center; font-size:13px; color:#9ab; margin-top:2px; }
  .hex-fortune { text-align:center; font-size:14px; color:#dde; line-height:1.7; margin:14px 4px; }

  .balls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:6px 0 4px; }
  .ball {
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:bold; color:var(--bg); background:var(--cyan);
    box-shadow:0 0 14px var(--cyan); animation:pop .4s ease backwards;
  }
  .ball:nth-child(1){animation-delay:.05s}.ball:nth-child(2){animation-delay:.12s}
  .ball:nth-child(3){animation-delay:.19s}.ball:nth-child(4){animation-delay:.26s}
  .ball:nth-child(5){animation-delay:.33s}.ball:nth-child(6){animation-delay:.40s}
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .meta { text-align:center; font-size:12px; color:#9ab; letter-spacing:1px; margin-top:4px; }
  .meta b { color:var(--gold); }
  .save-btn {
    width:100%; margin-top:14px; background:#0a0a2e; border:1.5px solid var(--gold); color:var(--gold);
    border-radius:12px; padding:14px; font-family:inherit; font-size:15px; letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,215,0,.3); text-shadow:0 0 8px rgba(255,215,0,.6); transition:all .15s;
  }
  .save-btn:active { transform:scale(.98); }
  .save-btn.done { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(0,255,0,.3); text-shadow:0 0 8px var(--green); }
  .hidden { display:none !important; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#0d0d2b;
    border:1px solid var(--gold); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px;
    letter-spacing:1px; box-shadow:0 0 18px rgba(255,215,0,.4); opacity:0; transition:opacity .25s; z-index:50;
  }
  .toast.show { opacity:1; }
.ball.power{background:#ff2d55;color:#fff;box-shadow:0 0 14px #ff2d55,0 0 30px rgba(255,45,85,.5);}
  .plus{color:#ff2d55;font-size:22px;font-weight:bold;align-self:center;text-shadow:0 0 8px #ff2d55;}
  .balls{align-items:center;}
  </style>
<!-- Firebase SDK (CDN, 이 파일 자체완결 유지) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  /* ===== 로그인 바 + 모달 (Wsub 공통) ===== */
  .wsub-auth-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:8px 12px;border-radius:10px;margin:10px auto 0;max-width:520px;
    border:1px solid rgba(212,175,55,.3);background:rgba(20,15,40,.55);font-size:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  .wsub-auth-bar .s{color:#94a3b8;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wsub-auth-bar .s b{color:#d4af37;}
  .wsub-auth-bar button{flex:0 0 auto;padding:7px 12px;border-radius:8px;cursor:pointer;
    border:1px solid rgba(212,175,55,.5);background:rgba(212,175,55,.1);color:#f5e6c8;font-weight:800;font-size:12px;}
  .wsub-modal{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.7);padding:20px;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  .wsub-modal.hide{display:none;}
  .wsub-modal .box{width:100%;max-width:360px;border-radius:16px;padding:22px;
    border:1px solid rgba(212,175,55,.4);background:#0f0c23;display:flex;flex-direction:column;gap:12px;}
  .wsub-modal .t{font-size:18px;font-weight:900;color:#d4af37;text-align:center;margin:0;}
  .wsub-modal .sub{font-size:12px;color:#94a3b8;text-align:center;margin:0 0 4px;line-height:18px;}
  .wsub-modal input{width:100%;padding:12px;border-radius:10px;font-size:15px;
    border:1px solid rgba(212,175,55,.35);background:rgba(10,10,30,.8);color:#f5e6c8;box-sizing:border-box;}
  .wsub-modal .mbtn{width:100%;padding:13px 0;border-radius:10px;border:2px solid rgba(212,175,55,.7);
    background:rgba(80,60,20,.5);color:#fff8e7;font-weight:900;font-size:15px;cursor:pointer;}
  .wsub-modal .mbtn:disabled{opacity:.5;}
  .wsub-modal .tog{text-align:center;font-size:12px;color:#a78bfa;cursor:pointer;padding:4px;}
  .wsub-modal .msg{font-size:12px;text-align:center;min-height:16px;color:#f87171;}
  .wsub-modal .cls{background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;padding:4px;text-align:center;}
</style>
</head>

<body>
  <div class="wsub-auth-bar" id="wsubAuthBar">
    <span class="s" id="wsubAuthStatus">로그인하면 번호를 저장할 수 있어요</span>
    <button id="wsubAuthBtn">로그인</button>
  </div>
  <div class="wsub-modal hide" id="wsubModal">
    <div class="box">
      <h2 class="t" id="wsubModalTitle">로그인</h2>
      <p class="sub" id="wsubModalSub">저장한 번호를 어디서든 다시 볼 수 있어요.</p>
      <input id="wsubEmail" type="email" placeholder="이메일" autocomplete="email">
      <input id="wsubPass" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
      <div class="msg" id="wsubMsg"></div>
      <button class="mbtn" id="wsubDoAuth">로그인</button>
      <div class="tog" id="wsubTog">계정이 없으신가요? 회원가입</div>
      <button class="cls" id="wsubClose">닫기</button>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="eyebrow">I Ching · 64 Hexagrams</div>
      <h1>🀄 주역 64괘 로또</h1>
      <div class="sub">동전을 여섯 번 던져 괘를 세우고 번호를 얻습니다</div>
    </header>

    <div class="card">
      <div class="label">동전점</div>
      <div class="coins" id="ichCoins"></div>
      <div class="hexagram" id="ichHex"></div>
      <button class="throw-btn" id="ichThrowBtn">동전 던지기</button>
    </div>

    <div class="card hidden" id="ichResultCard">
      <div class="hex-name" id="ichName">-</div>
      <div class="hex-hanja" id="ichHanja">-</div>
      <div class="hex-fortune" id="ichFortune">-</div>
      <div class="label">추천 번호</div>
      <div class="balls" id="ichBalls"></div>
      <div class="meta"><b id="ichRoundTxt">-</b> · 괘 기반 추출</div>
      <button class="save-btn" id="ichSaveBtn">나의 번호에 저장</button>
    </div>
  </div>
  <div class="toast" id="ichToast"></div>

    "화산려|火山旅|나그네처럼 떠도는 때다. 처신을 바르게 하면 무탈하다.",
    "중풍손|重風巽|부드럽게 따르고 스며든다. 겸손히 청하면 통한다.",
    "중택태|重澤兌|기쁨이 거듭되는 때다. 진실한 즐거움이 복을 부른다.",
    "풍수환|風水渙|흩어진 것을 다시 모은다. 마음을 합치면 위기를 넘는다.",
    "수택절|水澤節|절제하면 형통한다. 마디를 지켜 지나치지 말라.",
    "풍택중부|風澤中孚|마음의 믿음이 통한다. 진실하면 멀리까지 미친다.",
    "뇌산소과|雷山小過|작은 일은 되나 큰일은 무리다. 분수껏 처신하라.",
    "수화기제|水火既濟|이미 이룬 때다. 방심 말고 끝까지 마무리하라.",
    "화수미제|火水未濟|아직 이루지 못했으나 가능성은 크다. 신중히 건너라."
  ];

  // 동전 3개(앞=1) → 효 (양=1, 음=0). 앞면 수가 홀수면 양.
  function lineFromCoins(coins) {
    var heads = 0; for (var i = 0; i < coins.length; i++) heads += coins[i] ? 1 : 0;
    return heads % 2;
  }
  // 효 6개(아래→위) → 괘번호(1~64)
  function hexFromLines(lines) {
    var lower = lines[0] + lines[1] * 2 + lines[2] * 4;
    var upper = lines[3] + lines[4] * 2 + lines[5] * 4;
    return BIN2KW[lower + upper * 8];
  }
  // 괘번호 → 데이터 {name, hanja, fortune}
  function hexInfo(num) {
    var parts = HEX[num - 1].split('|');
    return { num: num, name: parts[0], hanja: parts[1], fortune: parts[2] };
  }

  function makeRng(seed) {
    var s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function pickPowerball(rng) {
    var wp = {}, white = [];
    while (white.length < 6) { var n = 1 + Math.floor(rng() * 45); if (!wp[n]) { wp[n] = true; white.push(n); } }
    white.sort(function (a, b) { return a - b; });
    return { white: white, power: 0 };
  }
  function makeSavedEntry(numbers, powerball, nextRound, nowMs, id) {
    return { id: id, savedAt: new Date(nowMs).toISOString(), round: nextRound > 0 ? nextRound : 0, numbers: numbers.slice(), powerball: powerball, matchCount: 0, type: GAME_KEY, source: GAME_KEY };
  }
  function isDuplicate(savedArr, numbers, powerball, type) {
    var key = numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + powerball;
    for (var i = 0; i < savedArr.length; i++) {
      var e = savedArr[i];
      if (e && e.type === type && Array.isArray(e.numbers)) {
        var ek = e.numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + (e.powerball || 0);
        if (ek === key) return true;
      }
    }
    return false;
  }
  function trimSavedByType(arr, maxPerType) {
    var groups={}; for(var i=0;i<arr.length;i++){var t=arr[i].type||'_';(groups[t]=groups[t]||[]).push(arr[i]);}
    var out=[]; Object.keys(groups).forEach(function(t){
      var g=groups[t].slice().sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);});
      if(g.length>maxPerType) g=g.slice(g.length-maxPerType); out=out.concat(g); });
    out.sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);}); return out;
  }
  function parseMaxRound(json) {
    var mx=0; if(json&&typeof json==='object') Object.keys(json).forEach(function(k){var r=parseInt(k,10);if(!isNaN(r)&&r>mx)mx=r;}); return mx;
  }

  // ===================================================================
  // ===== [HTML 전용] 화면/애니메이션/이벤트/저장/fetch ===============
  // ===================================================================
  var FIREBASE_URL = 'https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app';
  var el = {};
  var state = { lines: [], numbers: [], hex: null, nextRound: 0, finished: false, busy: false };

  function genId(p) { return p + '-' + Date.now() + '_' + Math.random().toString(36).slice(2, 10); }

  function bindElements() {
    el.coins = document.getElementById('ichCoins');
    el.hex = document.getElementById('ichHex');
    el.throwBtn = document.getElementById('ichThrowBtn');
    el.resultCard = document.getElementById('ichResultCard');
    el.name = document.getElementById('ichName');
    el.hanja = document.getElementById('ichHanja');
    el.fortune = document.getElementById('ichFortune');
    el.balls = document.getElementById('ichBalls');
    el.roundTxt = document.getElementById('ichRoundTxt');
    el.saveBtn = document.getElementById('ichSaveBtn');
    el.toast = document.getElementById('ichToast');
  }
  function showToast(msg) { el.toast.textContent=msg; el.toast.classList.add('show'); setTimeout(function(){el.toast.classList.remove('show');},1800); }

  function buildCoins() {
    el.coins.innerHTML = '';
    el.coinEls = [];
    for (var i = 0; i < 3; i++) {
      var c = document.createElement('div'); c.className = 'coin'; c.textContent = '?';
      el.coins.appendChild(c); el.coinEls.push(c);
    }
  }
  function buildHexSlots() {
    el.hex.innerHTML = '';
    el.lineEls = [];
    for (var i = 0; i < 6; i++) {
      var ln = document.createElement('div'); ln.className = 'gline';
      ln.innerHTML = '<div class="seg"></div><div class="seg"></div>';
      el.hex.appendChild(ln); el.lineEls.push(ln);
    }
  }

  // 한 효 던지기: 동전 3개 회전 애니메이션 후 효 확정
  function throwLine(idx, done) {
    var coins = [Math.random() < 0.5 ? 1 : 0, Math.random() < 0.5 ? 1 : 0, Math.random() < 0.5 ? 1 : 0]; // ← 비순수
    var start = null, DURATION = 600;
    function frame(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / DURATION, 1);
      el.coinEls.forEach(function (c, k) {
        if (p < 1) c.textContent = (Math.floor((ts / 60) + k) % 2) ? '陽' : '陰';
        else c.textContent = coins[k] ? '陽' : '陰';
      });
      if (p < 1) requestAnimationFrame(frame);
      else {
        var line = lineFromCoins(coins);            // ← 순수
        state.lines.push(line);
        var ln = el.lineEls[idx];
        ln.classList.add('show', line ? 'yang' : 'yin');
        done();
      }
    }
    requestAnimationFrame(frame);
  }

  function fetchNextRound(cb) {
    fetch(FIREBASE_URL + '/winningNumbers.json')
      .then(function (r) { return r.json(); })
      .then(function (j) { cb(parseMaxRound(j) + 1); })
      .catch(function () { cb(0); });
  }

  function finish() {
    var num = hexFromLines(state.lines);            // ← 순수
    var info = hexInfo(num);                         // ← 순수
    var rng = makeRng((num * 2654435761) >>> 0);     // ← 순수 RNG (괘번호 시드)
    var __pbr = pickPowerball(rng); var numbers = __pbr.white; var power = __pbr.power;                  // ← 순수
    state.hex = info; state.numbers = numbers; state.power = power; state.finished = true;

    el.name.textContent = info.num + '. ' + info.name;
    el.hanja.textContent = info.hanja;
    el.fortune.textContent = info.fortune;
    el.balls.innerHTML = '';
    numbers.forEach(function (n) { var d = document.createElement('div'); d.className = 'ball'; d.textContent = n; el.balls.appendChild(d); });
    el.saveBtn.textContent = '나의 번호에 저장'; el.saveBtn.className = 'save-btn'; el.saveBtn.disabled = false;
    el.resultCard.classList.remove('hidden');
    el.throwBtn.disabled = false; el.throwBtn.textContent = '다시 던지기';

    el.roundTxt.textContent = '한국 로또 방식';
  }

  function startThrow() {
    if (state.busy) return;
    state.busy = true; state.lines = []; state.finished = false;
    el.resultCard.classList.add('hidden');
    el.throwBtn.disabled = true; el.throwBtn.textContent = '점치는 중...';
    buildCoins(); buildHexSlots();

    var i = 0;
    function next() {
      if (i < 6) { throwLine(i, function () { i++; setTimeout(next, 180); }); }
      else { state.busy = false; finish(); }
    }
    next();
  }

  function loadSaved() { try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; } }
  function saveResult() {
    if (!state.finished) return;
    var nums = state.numbers;
    if (!window.wsubIsLoggedIn()) {
      // 로그인 후 자동 저장
      window.wsubPendingSaveAction = function(){ doFirebaseSave(nums); };
      window.wsubSaveNumbers(nums); // 모달 띄움
      return;
    }
    doFirebaseSave(nums);
  }
  function doFirebaseSave(nums) {
    el.saveBtn.disabled = true; el.saveBtn.textContent = '저장 중...';
    window.wsubSaveNumbers(nums).then(function(){
      el.saveBtn.textContent = '✓ 저장 완료'; el.saveBtn.className = 'save-btn done'; el.saveBtn.disabled = true;
      showToast('나의 번호에 저장했어요');
    }).catch(function(err){
      if (err === 'not-logged-in') { el.saveBtn.disabled = false; el.saveBtn.textContent = '나의 번호에 저장'; return; }
      el.saveBtn.disabled = false; el.saveBtn.textContent = '나의 번호에 저장';
      showToast('저장에 실패했어요');
    });
  }

  function startIchingApp() {
    bindElements(); buildCoins(); buildHexSlots();
    el.throwBtn.onclick = startThrow;
    el.saveBtn.onclick = saveResult;
  }
  window.startIchingApp = startIchingApp;

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startIchingApp);
  else startIchingApp();
})();
</script>
<script>
/* ===== Wsub Firebase 로그인+저장 (자체완결) ===== */
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
    authDomain: "ai-lottosolutions.firebaseapp.com",
    databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ai-lottosolutions",
    storageBucket: "ai-lottosolutions.firebasestorage.app",
    messagingSenderId: "616782090306",
    appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
  };
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.database();
  var THIS_GAME = 'iching';

  var pendingSave = false, mode = 'login';
  function $(id){ return document.getElementById(id); }

  function openModal(){ mode='login'; updateUI(); $('wsubEmail').value=''; $('wsubPass').value=''; $('wsubMsg').textContent=''; $('wsubModal').classList.remove('hide'); }
  function closeModal(){ $('wsubModal').classList.add('hide'); pendingSave=false; }
  function updateUI(){
    var L = mode==='login';
    $('wsubModalTitle').textContent = L?'로그인':'회원가입';
    $('wsubModalSub').textContent = L?'저장한 번호를 어디서든 다시 볼 수 있어요.':'이메일과 비밀번호만 있으면 가입돼요.';
    $('wsubDoAuth').textContent = L?'로그인':'회원가입';
    $('wsubTog').textContent = L?'계정이 없으신가요? 회원가입':'이미 계정이 있으신가요? 로그인';
  }
  function errMsg(c){
    switch(c){
      case 'auth/invalid-email': return '이메일 형식이 올바르지 않아요.';
      case 'auth/email-already-in-use': return '이미 가입된 이메일이에요. 로그인해 주세요.';
      case 'auth/weak-password': return '비밀번호가 너무 약해요 (6자 이상).';
      case 'auth/user-not-found': case 'auth/wrong-password': case 'auth/invalid-credential': return '이메일 또는 비밀번호가 맞지 않아요.';
      case 'auth/too-many-requests': return '시도가 많아요. 잠시 후 다시 해주세요.';
      case 'auth/network-request-failed': return '네트워크 연결을 확인해 주세요.';
      default: return '오류가 발생했어요. 다시 시도해 주세요.';
    }
  }
  function doAuth(){
    var email = $('wsubEmail').value.trim(), pass = $('wsubPass').value, msg = $('wsubMsg'), btn = $('wsubDoAuth');
    if(!email||!pass){ msg.textContent='이메일과 비밀번호를 입력해 주세요.'; return; }
    if(pass.length<6){ msg.textContent='비밀번호는 6자 이상이어야 해요.'; return; }
    btn.disabled=true; var o=btn.textContent; btn.textContent='처리 중...';
    var p = mode==='signup' ? auth.createUserWithEmailAndPassword(email,pass) : auth.signInWithEmailAndPassword(email,pass);
    p.then(function(){ $('wsubModal').classList.add('hide'); }).catch(function(e){ msg.textContent=errMsg(e.code); btn.disabled=false; btn.textContent=o; });
  }

  // Firebase 저장 (전역 노출: 게임의 saveResult가 호출)
  window.wsubSaveNumbers = function(numbers){
    var user = auth.currentUser;
    if(!user){ pendingSave = true; openModal(); return Promise.reject('not-logged-in'); }
    var ref = db.ref('wsub_saved/' + user.uid).push();
    return ref.set({
      numbers: numbers.slice().sort(function(a,b){return a-b;}).join(','),
      game: THIS_GAME,
      savedAt: Date.now()
    });
  };
  window.wsubIsLoggedIn = function(){ return !!auth.currentUser; };

  auth.onAuthStateChanged(function(user){
    var st = $('wsubAuthStatus'), btn = $('wsubAuthBtn');
    if(user){
      var name = user.email ? user.email.split('@')[0] : '회원';
      st.innerHTML = '<b>'+name+'</b>님 로그인됨';
      btn.textContent = '로그아웃';
      if(pendingSave){ pendingSave=false; if(window.wsubPendingSaveAction) window.wsubPendingSaveAction(); }
    }else{
      st.textContent = '로그인하면 번호를 저장할 수 있어요';
      btn.textContent = '로그인';
    }
  });

  document.addEventListener('DOMContentLoaded', function(){
    $('wsubAuthBtn').addEventListener('click', function(){
      if(auth.currentUser){ if(confirm('로그아웃 하시겠어요?')) auth.signOut(); }
      else openModal();
    });
    $('wsubDoAuth').addEventListener('click', doAuth);
    $('wsubTog').addEventListener('click', function(){ mode = mode==='login'?'signup':'login'; $('wsubMsg').textContent=''; updateUI(); });
    $('wsubClose').addEventListener('click', closeModal);
    $('wsubPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doAuth(); });
  });
})();
</script>
