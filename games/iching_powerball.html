<style>
  :root { --cyan:#00ffff; --purple:#cc00ff; --gold:#ffd700; --green:#00ff00; --bg:#0a0a1a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); }
  body {
    font-family:'Courier New',ui-monospace,monospace; color:#fff; min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(204,0,255,0.10), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(0,255,255,0.07), transparent 40%),
      var(--bg);
    padding:18px 14px 40px; overflow-x:hidden;
  }
  .wrap { max-width:560px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  .eyebrow { font-size:11px; letter-spacing:4px; color:var(--gold); opacity:.85; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:1px; text-shadow:0 0 12px var(--gold),0 0 24px rgba(255,215,0,.35); }
  .sub { font-size:12px; color:#a99; letter-spacing:1px; }
  .card {
    background:#0d0d2b; border:1px solid rgba(255,215,0,.22); border-radius:14px; padding:16px; margin-bottom:16px;
    box-shadow:0 0 18px rgba(204,0,255,.10), inset 0 0 30px rgba(255,215,0,.03);
  }
  .label { font-size:12px; letter-spacing:2px; color:var(--gold); margin-bottom:12px; text-transform:uppercase; }

  /* 동전 */
  .coins { display:flex; justify-content:center; gap:16px; margin:6px 0 16px; height:54px; align-items:center; }
  .coin {
    width:46px; height:46px; border-radius:50%; border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold;
    background:radial-gradient(circle at 35% 30%, #2a2a16, #0d0d05); color:var(--gold);
    box-shadow:0 0 12px rgba(255,215,0,.35);
  }
  /* 괘 (아래에서 위로 쌓임) */
  .hexagram { display:flex; flex-direction:column-reverse; align-items:center; gap:7px; min-height:120px; justify-content:center; }
  .gline { display:flex; gap:8px; height:11px; opacity:0; transition:opacity .3s; }
  .gline.show { opacity:1; }
  .seg { width:60px; height:11px; border-radius:2px; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  .gline.yin .seg { width:26px; }      /* 음: 끊긴 두 막대 */
  .gline.yang .seg { width:60px; }     /* 양: 이어진 한 막대 (두번째 seg 숨김) */
  .gline.yang .seg:nth-child(2) { display:none; }

  .throw-btn {
    width:100%; margin-top:4px; background:linear-gradient(180deg,#241a0a,#140d05);
    border:1.5px solid var(--gold); color:#fff; border-radius:12px; padding:16px;
    font-family:inherit; font-size:17px; font-weight:bold; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,215,0,.3); text-shadow:0 0 10px var(--gold); transition:all .15s;
  }
  .throw-btn:active { transform:scale(.98); }
  .throw-btn:disabled { opacity:.5; cursor:default; box-shadow:none; }

  .hex-name { text-align:center; font-size:22px; color:var(--gold); text-shadow:0 0 12px rgba(255,215,0,.5); letter-spacing:2px; }
  .hex-hanja { text-align:center; font-size:13px; color:#9ab; margin-top:2px; }
  .hex-fortune { text-align:center; font-size:14px; color:#dde; line-height:1.7; margin:14px 4px; }

  .balls { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:6px 0 4px; }
  .ball {
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:bold; color:var(--bg); background:var(--cyan);
    box-shadow:0 0 14px var(--cyan); animation:pop .4s ease backwards;
  }
  .ball:nth-child(1){animation-delay:.05s}.ball:nth-child(2){animation-delay:.12s}
  .ball:nth-child(3){animation-delay:.19s}.ball:nth-child(4){animation-delay:.26s}
  .ball:nth-child(5){animation-delay:.33s}.ball:nth-child(6){animation-delay:.40s}
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .meta { text-align:center; font-size:12px; color:#9ab; letter-spacing:1px; margin-top:4px; }
  .meta b { color:var(--gold); }
  .save-btn {
    width:100%; margin-top:14px; background:#0a0a2e; border:1.5px solid var(--gold); color:var(--gold);
    border-radius:12px; padding:14px; font-family:inherit; font-size:15px; letter-spacing:2px; cursor:pointer;
    box-shadow:0 0 16px rgba(255,215,0,.3); text-shadow:0 0 8px rgba(255,215,0,.6); transition:all .15s;
  }
  .save-btn:active { transform:scale(.98); }
  .save-btn.done { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(0,255,0,.3); text-shadow:0 0 8px var(--green); }
  .hidden { display:none !important; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#0d0d2b;
    border:1px solid var(--gold); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px;
    letter-spacing:1px; box-shadow:0 0 18px rgba(255,215,0,.4); opacity:0; transition:opacity .25s; z-index:50;
  }
  .toast.show { opacity:1; }
.ball.power{background:#ff2d55;color:#fff;box-shadow:0 0 14px #ff2d55,0 0 30px rgba(255,45,85,.5);}
  .plus{color:#ff2d55;font-size:22px;font-weight:bold;align-self:center;text-shadow:0 0 8px #ff2d55;}
  .balls{align-items:center;}
  </style>

<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyBme5XW9mHy87Y-dwjQzY0DCuC7k2478aw",

  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var wsubAuth = firebase.auth();
  var wsubDb = firebase.database();
  var wsubMode = "login";
  var wsubPendingSaveAction = null;

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m];}); }

  var toastTimer = null;
  function wsubToast(msg){
    var t = $("wsubToast"); if(!t) return;
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  window.wsubOpenModal = function(){ $("wsubErr").textContent=""; $("wsubModal").classList.add("open"); };
  window.wsubCloseModal = function(){ $("wsubModal").classList.remove("open"); };
  window.wsubToggleMode = function(){
    wsubMode = (wsubMode==="login") ? "signup" : "login";
    var s = wsubMode==="signup";
    $("wsubModalTitle").textContent = s ? "Sign up" : "Log in";
    $("wsubModalSub").textContent = s ? "Create an account with email and password" : "Sign in with your email and password";
    $("wsubSubmit").textContent = s ? "Sign up" : "Log in";
    $("wsubToggle").innerHTML = s
      ? 'Already have an account? <button onclick="wsubToggleMode()">Log in</button>'
      : 'No account yet? <button onclick="wsubToggleMode()">Sign up</button>';
    $("wsubErr").textContent = "";
  };
  function authErr(e){
    var c = (e && e.code) || "";
    if (c==="auth/invalid-email") return "That email address is invalid.";
    if (c==="auth/missing-password" || c==="auth/weak-password") return "Password must be at least 6 characters.";
    if (c==="auth/email-already-in-use") return "This email is already registered. Please log in.";
    if (c==="auth/invalid-credential" || c==="auth/wrong-password" || c==="auth/user-not-found") return "Email or password is incorrect.";
    if (c==="auth/too-many-requests") return "Too many attempts. Please try again later.";
    return "Something went wrong. Please try again.";
  }
  window.wsubSubmit = function(){
    var email = $("wsubEmail").value.trim(), pw = $("wsubPw").value, err = $("wsubErr");
    err.textContent = "";
    if (!email || !pw){ err.textContent = "Please enter your email and password."; return; }
    var p = (wsubMode==="signup")
      ? wsubAuth.createUserWithEmailAndPassword(email, pw)
      : wsubAuth.signInWithEmailAndPassword(email, pw);
    p.catch(function(e){ err.textContent = authErr(e); });
  };
  window.wsubLogout = function(){ wsubAuth.signOut(); };

  wsubAuth.onAuthStateChanged(function(user){
    var who = $("wsubWho"), btn = $("wsubAuthBtn");
    if (user){
      who.innerHTML = '<b>' + esc(user.email || "Logged in") + '</b>';
      btn.textContent = "Log out"; btn.classList.remove("primary"); btn.onclick = window.wsubLogout;
      wsubCloseModal();
      if (typeof wsubPendingSaveAction === "function"){ var a = wsubPendingSaveAction; wsubPendingSaveAction = null; a(); }
    } else {
      who.textContent = "Log in to save numbers to your account";
      btn.textContent = "Log in"; btn.classList.add("primary"); btn.onclick = window.wsubOpenModal;
    }
  });

  // 저장: white = 화이트볼 배열(5개), powerball = 파워볼 숫자, game = 게임키.
  // 미로그인 시 모달 → 로그인 후 자동 저장.
  window.wsubSavePowerball = function(white, powerball, game){
    if (!wsubAuth.currentUser){
      wsubPendingSaveAction = function(){ window.wsubSavePowerball(white, powerball, game); };
      wsubOpenModal();
      return;
    }
    var uid = wsubAuth.currentUser.uid;
    var ref = wsubDb.ref("wsub_saved/" + uid).push();
    ref.set({
      white: (white || []).slice().map(String).join(","),
      powerball: powerball,
      game: game,
      savedAt: Date.now()
    })
      .then(function(){ wsubToast("Saved to your account"); })
      .catch(function(e){ console.error(e); wsubToast("Save failed. Try again."); });
  };
  window.wsubIsLoggedIn = function(){ return !!wsubAuth.currentUser; };

  var modalEl = $("wsubModal");
  if (modalEl) modalEl.addEventListener("click", function(e){ if (e.target === this) wsubCloseModal(); });
})();
</script>

    "Small Excess|雷山小過|Small matters succeed, but big ones overreach. Act within your measure.",
    "After Completion|水火既濟|A time when it is already done. Don't relax; finish all the way through.",
    "Before Completion|火水未濟|Not yet done, but the potential is great. Cross over with care."
  ];

  // 동전 3개(앞=1) → 효 (양=1, 음=0). 앞면 수가 홀수면 양.
  function lineFromCoins(coins) {
    var heads = 0; for (var i = 0; i < coins.length; i++) heads += coins[i] ? 1 : 0;
    return heads % 2;
  }
  // 효 6개(아래→위) → 괘번호(1~64)
  function hexFromLines(lines) {
    var lower = lines[0] + lines[1] * 2 + lines[2] * 4;
    var upper = lines[3] + lines[4] * 2 + lines[5] * 4;
    return BIN2KW[lower + upper * 8];
  }
  // 괘번호 → 데이터 {name, hanja, fortune}
  function hexInfo(num) {
    var parts = HEX[num - 1].split('|');
    return { num: num, name: parts[0], hanja: parts[1], fortune: parts[2] };
  }

  function makeRng(seed) {
    var s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function pickPowerball(rng) {
    var wp = {}, white = [];
    while (white.length < 5) { var n = 1 + Math.floor(rng() * 69); if (!wp[n]) { wp[n] = true; white.push(n); } }
    white.sort(function (a, b) { return a - b; });
    return { white: white, power: 1 + Math.floor(rng() * 26) };
  }
  function makeSavedEntry(numbers, powerball, nextRound, nowMs, id) {
    return { id: id, savedAt: new Date(nowMs).toISOString(), round: nextRound > 0 ? nextRound : 0, numbers: numbers.slice(), powerball: powerball, matchCount: 0, type: GAME_KEY, source: GAME_KEY };
  }
  function isDuplicate(savedArr, numbers, powerball, type) {
    var key = numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + powerball;
    for (var i = 0; i < savedArr.length; i++) {
      var e = savedArr[i];
      if (e && e.type === type && Array.isArray(e.numbers)) {
        var ek = e.numbers.slice().sort(function (a, b) { return a - b; }).join(',') + '|' + (e.powerball || 0);
        if (ek === key) return true;
      }
    }
    return false;
  }
  function trimSavedByType(arr, maxPerType) {
    var groups={}; for(var i=0;i<arr.length;i++){var t=arr[i].type||'_';(groups[t]=groups[t]||[]).push(arr[i]);}
    var out=[]; Object.keys(groups).forEach(function(t){
      var g=groups[t].slice().sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);});
      if(g.length>maxPerType) g=g.slice(g.length-maxPerType); out=out.concat(g); });
    out.sort(function(a,b){return a.savedAt<b.savedAt?-1:(a.savedAt>b.savedAt?1:0);}); return out;
  }
  function parseMaxRound(json) {
    var mx=0; if(json&&typeof json==='object') Object.keys(json).forEach(function(k){var r=parseInt(k,10);if(!isNaN(r)&&r>mx)mx=r;}); return mx;
  }

  // ===================================================================
  // ===== [HTML 전용] 화면/애니메이션/이벤트/저장/fetch ===============
  // ===================================================================
  var FIREBASE_URL = 'https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app';
  var el = {};
  var state = { lines: [], numbers: [], hex: null, nextRound: 0, finished: false, busy: false };

  function genId(p) { return p + '-' + Date.now() + '_' + Math.random().toString(36).slice(2, 10); }

  function bindElements() {
    el.coins = document.getElementById('ichCoins');
    el.hex = document.getElementById('ichHex');
    el.throwBtn = document.getElementById('ichThrowBtn');
    el.resultCard = document.getElementById('ichResultCard');
    el.name = document.getElementById('ichName');
    el.hanja = document.getElementById('ichHanja');
    el.fortune = document.getElementById('ichFortune');
    el.balls = document.getElementById('ichBalls');
    el.roundTxt = document.getElementById('ichRoundTxt');
    el.saveBtn = document.getElementById('ichSaveBtn');
    el.toast = document.getElementById('ichToast');
  }
  function showToast(msg) { el.toast.textContent=msg; el.toast.classList.add('show'); setTimeout(function(){el.toast.classList.remove('show');},1800); }

  function buildCoins() {
    el.coins.innerHTML = '';
    el.coinEls = [];
    for (var i = 0; i < 3; i++) {
      var c = document.createElement('div'); c.className = 'coin'; c.textContent = '?';
      el.coins.appendChild(c); el.coinEls.push(c);
    }
  }
  function buildHexSlots() {
    el.hex.innerHTML = '';
    el.lineEls = [];
    for (var i = 0; i < 6; i++) {
      var ln = document.createElement('div'); ln.className = 'gline';
      ln.innerHTML = '<div class="seg"></div><div class="seg"></div>';
      el.hex.appendChild(ln); el.lineEls.push(ln);
    }
  }

  // 한 효 던지기: 동전 3개 회전 애니메이션 후 효 확정
  function throwLine(idx, done) {
    var coins = [Math.random() < 0.5 ? 1 : 0, Math.random() < 0.5 ? 1 : 0, Math.random() < 0.5 ? 1 : 0]; // ← 비순수
    var start = null, DURATION = 600;
    function frame(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / DURATION, 1);
      el.coinEls.forEach(function (c, k) {
        if (p < 1) c.textContent = (Math.floor((ts / 60) + k) % 2) ? '陽' : '陰';
        else c.textContent = coins[k] ? '陽' : '陰';
      });
      if (p < 1) requestAnimationFrame(frame);
      else {
        var line = lineFromCoins(coins);            // ← 순수
        state.lines.push(line);
        var ln = el.lineEls[idx];
        ln.classList.add('show', line ? 'yang' : 'yin');
        done();
      }
    }
    requestAnimationFrame(frame);
  }

  function fetchNextRound(cb) {
    fetch(FIREBASE_URL + '/winningNumbers.json')
      .then(function (r) { return r.json(); })
      .then(function (j) { cb(parseMaxRound(j) + 1); })
      .catch(function () { cb(0); });
  }

  function finish() {
    var num = hexFromLines(state.lines);            // ← 순수
    var info = hexInfo(num);                         // ← 순수
    var rng = makeRng((num * 2654435761) >>> 0);     // ← 순수 RNG (괘번호 시드)
    var __pbr = pickPowerball(rng); var numbers = __pbr.white; var power = __pbr.power;                  // ← 순수
    state.hex = info; state.numbers = numbers; state.power = power; state.finished = true;

    el.name.textContent = info.num + '. ' + info.name;
    el.hanja.textContent = info.hanja;
    el.fortune.textContent = info.fortune;
    el.balls.innerHTML = '';
    numbers.forEach(function (n) { var d = document.createElement('div'); d.className = 'ball'; d.textContent = n; el.balls.appendChild(d); });var __pl=document.createElement('div');__pl.className='plus';__pl.textContent='+';el.balls.appendChild(__pl);var __pbb=document.createElement('div');__pbb.className='ball power';__pbb.textContent=state.power;el.balls.appendChild(__pbb);
    el.saveBtn.textContent = 'Save my numbers'; el.saveBtn.className = 'save-btn'; el.saveBtn.disabled = false;
    el.resultCard.classList.remove('hidden');
    el.throwBtn.disabled = false; el.throwBtn.textContent = 'Toss again';

    el.roundTxt.textContent = 'US Powerball method';
  }

  function startThrow() {
    if (state.busy) return;
    state.busy = true; state.lines = []; state.finished = false;
    el.resultCard.classList.add('hidden');
    el.throwBtn.disabled = true; el.throwBtn.textContent = 'Casting…';
    buildCoins(); buildHexSlots();

    var i = 0;
    function next() {
      if (i < 6) { throwLine(i, function () { i++; setTimeout(next, 180); }); }
      else { state.busy = false; finish(); }
    }
    next();
  }

  function loadSaved() { try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; } }
  function saveResult() {
    if (!state.finished) return;
    var saved = loadSaved();
    if (isDuplicate(saved, state.numbers, state.power, GAME_KEY)) { showToast('Already saved'); return; }
    var entry = makeSavedEntry(state.numbers, state.power, state.nextRound, Date.now(), genId(GAME_KEY));
    saved.push(entry);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trimSavedByType(saved, MAX_PER_TYPE)));
      if(window.wsubSavePowerball) window.wsubSavePowerball(state.numbers, state.power, GAME_KEY);
      el.saveBtn.textContent = '✓ Saved'; el.saveBtn.className = 'save-btn done'; el.saveBtn.disabled = true;
      showToast('Saved to your account');
    } catch (e) { showToast('Storage is full'); }
  }

  function startIchingApp() {
    bindElements(); buildCoins(); buildHexSlots();
    el.throwBtn.onclick = startThrow;
    el.saveBtn.onclick = saveResult;
  }
  window.startIchingApp = startIchingApp;

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startIchingApp);
  else startIchingApp();
})();
</script>
</body>
